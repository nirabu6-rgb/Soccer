<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — משרד הפרסום האוטונומי</title>
<meta name="theme-color" content="#0a0a09">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a09'/%3E%3Cpath d='M16 6 L26 25 L6 25 Z' stroke='%23c9a24c' stroke-width='1.6' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M16 6 L16 25' stroke='%23c9a24c' stroke-width='0.8' opacity='0.5'/%3E%3Ccircle cx='16' cy='6' r='1.8' fill='%23e6c877'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a09'/%3E%3Cpath d='M16 6 L26 25 L6 25 Z' stroke='%23c9a24c' stroke-width='1.6' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M16 6 L16 25' stroke='%23c9a24c' stroke-width='0.8' opacity='0.5'/%3E%3Ccircle cx='16' cy='6' r='1.8' fill='%23e6c877'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,560;9..144,680&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0a0a09; --surface:#141412; --surface-2:#1c1c19; --line:#2a2a25;
  --gold:#c9a24c; --gold-bright:#e6c877; --text:#f1efe7; --muted:#8c897d;
  --good:#7fbf8f; --warn:#d98b5f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
.apex-root{
  background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
  min-height:100vh; width:100%; max-width:420px; margin:0 auto; position:relative; overflow-x:hidden;
  font-size:15.5px;
}
.apex-root ::selection{background:var(--gold);color:#0a0a09;}
.mono{font-family:'JetBrains Mono',monospace;}
.serif{font-family:'Fraunces',serif;}

.apex-header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 75%,transparent);padding:10px 14px 5px;}
.brand-row{display:flex;align-items:center;gap:8px;}
.apex-mark{width:24px;height:24px;flex-shrink:0;}

.apex-splash{position:fixed;inset:0;z-index:999;max-width:420px;margin:0 auto;background:radial-gradient(circle at 50% 38%,#1c1c19,#0a0a09 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease;}
.apex-splash.fading{opacity:0;pointer-events:none;}
.splash-mark{animation:splashJump 1s cubic-bezier(.34,1.56,.64,1) infinite;filter:drop-shadow(0 0 26px rgba(201,162,76,.5));}
.splash-title{margin-top:16px;font-family:'Fraunces',serif;font-weight:680;font-size:31.5px;letter-spacing:2px;color:var(--gold-bright);animation:splashFadeIn .6s .25s both;}
.splash-sub{margin-top:6px;font-size:13px;color:var(--muted);animation:splashFadeIn .6s .4s both;}
@keyframes splashJump{0%,100%{transform:translateY(0) scale(1);}45%{transform:translateY(-16px) scale(1.05);}70%{transform:translateY(0) scale(0.98);}}
@keyframes splashFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.header-title{font-family:'Fraunces',serif;font-weight:560;font-size:16px;}
.pulse-wrap{width:100%;height:9px;margin-top:5px;opacity:.85;}
.pulse-path{stroke:var(--gold);stroke-width:1.2;fill:none;stroke-dasharray:340;stroke-dashoffset:340;animation:pulseflow 3.2s linear infinite;}
@keyframes pulseflow{0%{stroke-dashoffset:340;opacity:.35;}50%{stroke-dashoffset:0;opacity:1;}100%{stroke-dashoffset:-340;opacity:.35;}}

.notif-wrap{position:relative;flex-shrink:0;}
.notif-bell{position:relative;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--surface-2);color:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:#d9584f;border:1.5px solid var(--surface-2);}
.notif-panel{position:absolute;top:calc(100% + 8px);left:0;z-index:25;width:260px;max-width:78vw;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 14px 32px rgba(0,0,0,.5);}
.notif-panel-title{font-size:11px;color:var(--muted);padding:4px 6px 8px;letter-spacing:.5px;text-transform:uppercase;}
.notif-item{display:flex;gap:8px;padding:8px 6px;border-top:1px solid var(--line);}
.notif-item:first-of-type{border-top:none;}
.notif-icon{width:24px;height:24px;border-radius:7px;background:rgba(201,162,76,.12);color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.notif-text{font-size:12px;line-height:1.4;}
.notif-time{font-size:10px;color:var(--muted);margin-top:2px;}

.screen{padding:10px 14px 82px;}
.eyebrow{font-size:10.5px;letter-spacing:1.6px;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.h1{font-family:'Fraunces',serif;font-weight:560;font-size:20px;line-height:1.2;margin:0 0 4px;}
.sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 12px;}

.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:10px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px;}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--gold-bright);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.stage{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:9/16;max-height:46vh;border:1px solid var(--line);margin:0 auto;}
.stage video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.grid-overlay{position:absolute;inset:0;pointer-events:none;}
.grid-overlay .v-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(230,200,119,.22);}
.grid-overlay .h-line{position:absolute;left:0;right:0;height:1px;background:rgba(230,200,119,.22);}
.face-guide{position:absolute;left:50%;top:38%;width:44%;aspect-ratio:3/4;border:1.5px dashed rgba(230,200,119,.5);border-radius:50% / 45%;transform:translate(-50%,-50%);pointer-events:none;}
.badges{position:absolute;top:8px;left:8px;right:8px;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.badge{display:flex;align-items:center;gap:5px;align-self:flex-start;background:rgba(10,10,9,.72);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:16px;padding:4px 9px;font-size:11px;}
.badge.good{color:var(--good);} .badge.warn{color:var(--warn);}
.rec-timer{position:absolute;top:8px;right:8px;background:rgba(10,10,9,.72);border:1px solid var(--line);border-radius:16px;padding:4px 9px;font-size:11px;display:flex;gap:5px;align-items:center;}
.rec-dot{width:6px;height:6px;border-radius:50%;background:#d9584f;animation:blinkdot 1.1s infinite;}
@keyframes blinkdot{50%{opacity:.25;}}
.teleprompter{position:absolute;top:34px;left:12px;right:12px;max-height:54px;overflow:hidden;background:rgba(10,10,9,.55);border-radius:7px;padding:6px 8px;pointer-events:none;}
.teleprompter p{font-family:'Fraunces',serif;font-size:13px;color:var(--gold-bright);line-height:1.4;margin:0;animation:scrollup 14s linear infinite;}
@keyframes scrollup{0%{transform:translateY(50px);}100%{transform:translateY(-140%);}}

.controls-row{display:flex;align-items:center;justify-content:center;gap:20px;padding:12px 0 4px;}
.rec-btn{width:54px;height:54px;border-radius:50%;border:2px solid var(--gold);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.rec-btn .inner{width:22px;height:22px;border-radius:50%;background:#d9584f;transition:all .2s;}
.rec-btn.recording .inner{border-radius:5px;width:18px;height:18px;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
.icon-btn.on{border-color:var(--gold);color:var(--gold);}

.btn-primary{width:100%;padding:12px;border-radius:9px;border:none;background:var(--gold);color:#0a0a09;font-weight:600;font-size:14.5px;cursor:pointer;transition:background .2s;}
.btn-primary:disabled{background:var(--surface-2);color:var(--muted);cursor:not-allowed;}
.btn-primary:not(:disabled):hover{background:var(--gold-bright);}
.btn-ghost{width:100%;padding:11px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:13.5px;cursor:pointer;margin-top:6px;}
.actions{margin-top:4px;}
.back-link{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:12.5px;margin-bottom:10px;cursor:pointer;width:fit-content;}

.checklist-item{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13.5px;color:var(--muted);}
.checklist-item.done{color:var(--text);}
.check-circle{width:17px;height:17px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-circle.done{background:var(--good);border-color:var(--good);color:#0a0a09;}
.spinner{width:10px;height:10px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--gold);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.variations{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.variation-card{position:relative;flex:0 0 auto;width:96px;border-radius:10px;border:1.5px solid var(--line);overflow:hidden;cursor:pointer;background:var(--surface-2);}
.variation-card.selected{border-color:var(--gold);}
.variation-card video, .video-placeholder{width:100%;aspect-ratio:9/16;object-fit:cover;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#1c1c19,#0a0a09 70%);color:var(--muted);}
.media-frame-wrap{display:contents;}
.media-watermark{position:absolute;bottom:6px;left:6px;opacity:.6;pointer-events:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7));z-index:2;}
.variation-meta{padding:6px;font-size:10.5px;color:var(--muted);}
.variation-card.selected .variation-meta{color:var(--gold-bright);}

.goal-pills{display:flex;gap:6px;margin-bottom:12px;}
.pill{flex:1;text-align:center;padding:8px 4px;border-radius:8px;border:1px solid var(--line);font-size:12.5px;cursor:pointer;color:var(--muted);}
.pill.active{border-color:var(--gold);color:var(--gold-bright);background:rgba(201,162,76,.08);}
.budget-input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:11px;font-family:'JetBrains Mono',monospace;font-size:21.5px;color:var(--text);text-align:center;}
.onboarding-input{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;}
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line);font-size:12.5px;color:var(--muted);cursor:pointer;}
.chip.active{border-color:var(--gold);color:var(--gold-bright);background:rgba(201,162,76,.08);}
.platform-row{margin-bottom:11px;}
.platform-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
.platform-cpl{color:var(--muted);}
.bar-track{height:6px;background:var(--surface-2);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:5px;transition:width 1s ease;}
.bar-fill.off{background:var(--line);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px dashed var(--line);margin-top:3px;}

.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lib-card{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--surface-2);cursor:pointer;}
.lib-card video, .lib-card .video-placeholder{aspect-ratio:1/1;}
.lib-meta{padding:7px;}
.lib-meta .t{font-size:12.5px;font-weight:600;}
.status-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:9px;border:1px solid var(--line);color:var(--muted);margin-top:4px;}

.carousel{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:16px calc(50% - 90px) 22px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.carousel::-webkit-scrollbar{display:none;}
.carousel-item{flex:0 0 auto;width:180px;scroll-snap-align:center;transition:transform .12s ease-out, opacity .12s ease-out;will-change:transform,opacity;}
.carousel-item .lib-card{width:100%;box-shadow:0 14px 30px rgba(0,0,0,.45);}
.carousel-item .lib-card video, .carousel-item .lib-card .video-placeholder{aspect-ratio:3/4;}
.carousel-item .lib-meta .t{font-size:14px;}

.view-switch-row{display:flex;justify-content:flex-end;margin-bottom:10px;}
.view-switch-wrap{position:relative;}
.view-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:15;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:0 12px 26px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:2px;min-width:118px;}
.view-menu-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;text-align:right;font-family:'Inter',sans-serif;}
.view-menu-item.active{color:var(--gold-bright);background:rgba(201,162,76,.1);}

.lib-list-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:8px;cursor:pointer;}
.lib-list-row .thumb{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.lib-list-row .thumb video, .lib-list-row .thumb .video-placeholder{width:100%;height:100%;object-fit:cover;aspect-ratio:auto;}
.lib-list-row .info{flex:1;min-width:0;}
.lib-list-row .info .t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.masonry{column-count:2;column-gap:8px;}
.masonry .lib-card, .masonry .post-card{display:inline-block;width:100%;break-inside:avoid;margin-bottom:8px;}

.group-label{font-size:10.5px;letter-spacing:1.2px;color:var(--gold);text-transform:uppercase;margin:14px 0 6px;}
.group-label:first-child{margin-top:0;}

.lead-row{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;background:var(--surface);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer;}
.lead-name{font-size:13.5px;font-weight:600;}
.lead-status{font-size:11px;color:var(--muted);margin-top:2px;}

.settings-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);}
.settings-row:last-child{border-bottom:none;}
.settings-value{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--text);}
.settings-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin:8px 0 18px;cursor:pointer;}
.settings-avatar{width:78px;height:78px;border-radius:50%;background:var(--surface-2);border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);overflow:hidden;}
.settings-avatar img{width:100%;height:100%;object-fit:cover;}
.settings-avatar-label{font-size:12px;color:var(--muted);}
.lang-toggle-row{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.lang-current{display:flex;align-items:center;gap:6px;color:var(--gold-bright);font-size:14px;}
.lang-list{margin-top:10px;border-top:1px solid var(--line);padding-top:6px;}
.lang-row{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--line);}
.lang-row:last-child{border-bottom:none;}
.lang-row.active{color:var(--gold-bright);}

.post-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:10px;}
.post-media{width:100%;aspect-ratio:9/16;max-height:220px;object-fit:cover;display:block;}
.post-body{padding:10px 11px;}
.post-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.post-platform{font-size:11px;color:var(--gold-bright);letter-spacing:.4px;}
.post-date{font-size:11px;color:var(--muted);}
.post-caption{font-size:13.5px;font-weight:600;margin-bottom:9px;}
.post-metrics{display:flex;gap:16px;}
.post-metric{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--muted);}
.post-metric .mono{color:var(--text);}

.chat-scroll{display:flex;flex-direction:column;gap:8px;min-height:180px;}
.bubble{max-width:78%;padding:8px 11px;border-radius:12px;font-size:13.5px;line-height:1.45;}
.bubble.lead{align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:3px;}
.bubble.bot{align-self:flex-end;background:rgba(201,162,76,.14);border:1px solid rgba(201,162,76,.35);border-bottom-right-radius:3px;color:var(--text);}
.typing{align-self:flex-start;display:flex;gap:4px;padding:8px 11px;}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:tdot 1s infinite;}
.typing span:nth-child(2){animation-delay:.15s;} .typing span:nth-child(3){animation-delay:.3s;}
@keyframes tdot{50%{opacity:.2;transform:translateY(-2px);}}

.push-toast{position:fixed;top:10px;left:10px;right:10px;max-width:396px;margin:0 auto;z-index:40;background:var(--surface);border:1px solid var(--gold);border-radius:12px;padding:11px;display:flex;gap:10px;box-shadow:0 12px 30px rgba(0,0,0,.5);animation:toastin .5s ease;}
@keyframes toastin{from{transform:translateY(-30px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;display:flex;background:var(--surface);border-top:1px solid var(--line);z-index:30;padding:5px 3px 10px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:12px;padding:7px 2px;cursor:pointer;font-family:'Inter',sans-serif;}
.nav-item.active{color:var(--gold-bright);}

.fab-layer{position:fixed;inset:0;max-width:420px;margin:0 auto;pointer-events:none;z-index:50;}
.fab-btn{position:absolute;width:52px;height:52px;border-radius:50%;border:none;background:var(--gold);color:#0a0a09;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(0,0,0,.5);cursor:grab;pointer-events:auto;touch-action:none;transition:transform .15s ease,background .2s;}
.fab-btn:active{cursor:grabbing;}
.fab-btn.open{transform:rotate(45deg);background:var(--gold-bright);}
.fab-menu{position:absolute;pointer-events:auto;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 14px 32px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:2px;min-width:172px;}
.fab-menu-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;border:none;background:none;color:var(--text);font-size:13.5px;cursor:pointer;text-align:right;font-family:'Inter',sans-serif;}
.fab-menu-item:hover{background:var(--surface-2);}
.fab-menu-item .ic{color:var(--gold);flex-shrink:0;display:flex;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ---------------------------- inline icons ---------------------------- */
function Icon({ size = 16, color, children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color || "currentColor"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {children}
    </svg>
  );

function MediaFrame({ src, style }) {
  const media = !src || src === "demo"
    ? <div className="video-placeholder" style={style}><Video size={17} /></div>

  return (

function useMediaCleanup(stream) {
  useEffect(() => {
    return () => { if (stream) stream.getTracks().forEach((t) => t.stop()); };
  }, [stream]);
}

function BackLink({ onClick, label }) {
  return <div className="back-link" onClick={onClick}><ArrowRight size={12} /> {label}</div>;

/* ------------------------ Module: Director (capture) ----------------------- */

function Director({ onSaveClip, onCancel }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);

  const [stream, setStream] = useState(null);
  const [streaming, setStreaming] = useState(false);
  const [cameraError, setCameraError] = useState(false);
  const [brightness, setBrightness] = useState(120);
  const [audioLevel, setAudioLevel] = useState(40);
  const [stable, setStable] = useState(true);
  const [teleOn, setTeleOn] = useState(false);
  const [teleText, setTeleText] = useState("היום אני רוצה לספר לכם למה הבחירה הזו תשנה את העסק שלכם...");
  const [recording, setRecording] = useState(false);
  const [recordTime, setRecordTime] = useState(0);
  const [recordedURL, setRecordedURL] = useState(null);
  const [checking, setChecking] = useState(false);
  const [qualityOk, setQualityOk] = useState(null);
  const [cleanAudio, setCleanAudio] = useState(true);
  const fileInputRef = useRef(null);

  useMediaCleanup(stream);

  const startCamera = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
      setStream(s);
      setStreaming(true);
      if (videoRef.current) videoRef.current.srcObject = s;
    } catch (e) {
      setCameraError(true);
    }
  };

  const handleGalleryFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setRecordedURL(URL.createObjectURL(file));
    setChecking(true);
    setQualityOk(null);
    setTimeout(() => { setChecking(false); setQualityOk(true); }, 1600);
  };

  useEffect(() => {
    if (!streaming) return;
    const interval = setInterval(() => {
      const video = videoRef.current;
      const canvas = canvasRef.current;
      if (!video || !canvas || video.readyState < 2) return;
      canvas.width = 32; canvas.height = 18;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, 32, 18);
      try {
        const data = ctx.getImageData(0, 0, 32, 18).data;
        let sum = 0;
        for (let i = 0; i < data.length; i += 4) sum += (data[i] + data[i + 1] + data[i + 2]) / 3;
        setBrightness(sum / (data.length / 4));
      } catch (e) {}
    }, 500);
    return () => clearInterval(interval);
  }, [streaming]);

  useEffect(() => {
    if (!stream) return;
    let raf; let audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(data);
        setAudioLevel(data.reduce((a, b) => a + b, 0) / data.length);
        raf = requestAnimationFrame(tick);
      };
      tick();
    } catch (e) {}
    return () => { if (raf) cancelAnimationFrame(raf); if (audioCtx) audioCtx.close(); };
  }, [stream]);

  useEffect(() => {
    if (!streaming) return;
    const interval = setInterval(() => setStable(Math.random() > 0.12), 2200);
    return () => clearInterval(interval);
  }, [streaming]);

  const startRecording = () => {
    if (!stream) return;
    const recorder = new MediaRecorder(stream);
    chunksRef.current = [];
    recorder.ondataavailable = (e) => e.data.size > 0 && chunksRef.current.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunksRef.current, { type: "video/webm" });
      setRecordedURL(URL.createObjectURL(blob));
      setChecking(true);
      setQualityOk(null);
      setTimeout(() => { setChecking(false); setQualityOk(true); }, 1600);
    };
    recorder.start();
    mediaRecorderRef.current = recorder;
    setRecording(true);
    setRecordTime(0);
    timerRef.current = setInterval(() => setRecordTime((t) => t + 1), 1000);
  };

  const stopRecording = () => {
    mediaRecorderRef.current?.stop();
    setRecording(false);
    clearInterval(timerRef.current);
  };

  const retake = () => { setRecordedURL(null); setQualityOk(null); };
  const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

  return (
    <div className="screen">

const BROWSE_VIEWS = [
  { id: "carousel", label: "קרוסלה", Icon: Columns },

  { id: "list", label: "רשימה", Icon: ListIcon },

function ViewSwitch({ view, setView }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    if (!menuOpen) return;
    const onOutside = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener("mousedown", onOutside);
    return () => document.removeEventListener("mousedown", onOutside);
  }, [menuOpen]);

  return (
    <div className="view-switch-row">
      <div className="view-switch-wrap" ref={menuRef}>
        <button className="icon-btn on" onClick={() => setMenuOpen((v) => !v)} title="שנה תצוגה">
          <LayoutGrid size={15} />
        </button>
        {menuOpen && (
          <div className="view-menu">
            {BROWSE_VIEWS.map(({ id, label, Icon }) => (
              <button key={id} className={`view-menu-item ${view === id ? "active" : ""}`} onClick={() => { setView(id); setMenuOpen(false); }}>
                <Icon size={14} /> {label}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const CLIP_STATUS_ORDER = ["פורסם", "מוכן לפרסום", "טיוטה"];

function LibraryBrowser({ items, onSelect, defaultView = "carousel" }) {
  const [view, setView] = useState(defaultView);
  const scrollerRef = useRef(null);
  const itemRefs = useRef([]);

  useEffect(() => {
    if (view !== "carousel") return;
    const el = scrollerRef.current;
    if (!el) return;
    const update = () => {
      const rect = el.getBoundingClientRect();
      const center = rect.left + rect.width / 2;
      itemRefs.current.forEach((node) => {
        if (!node) return;
        const r = node.getBoundingClientRect();
        const dist = Math.abs(r.left + r.width / 2 - center);
        node.style.transform = `scale(${Math.max(0.82, 1 - dist / 700)})`;
        node.style.opacity = Math.max(0.5, 1 - dist / 420);
      });
    };
    update();
    el.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);
    return () => { el.removeEventListener("scroll", update); window.removeEventListener("resize", update); };
  }, [view, items.length]);

  const groups = useMemo(() => {
    const byStatus = {};
    items.forEach((clip) => { (byStatus[clip.status] = byStatus[clip.status] || []).push(clip); });
    const order = CLIP_STATUS_ORDER.filter((s) => byStatus[s]);
    Object.keys(byStatus).forEach((s) => { if (!order.includes(s)) order.push(s); });
    return order.map((status) => ({ label: status, clips: byStatus[status] }));
  }, [items]);

  return (
    <>
      <ViewSwitch view={view} setView={setView} />

      {view === "carousel" && (
        <div className="carousel" ref={scrollerRef}>
          {items.map((clip, i) => (
            <div key={clip.id} className="carousel-item" ref={(node) => (itemRefs.current[i] = node)}>
              <div className="lib-card" onClick={() => onSelect(clip.id)}>
                <MediaFrame src={clip.url} />
                <div className="lib-meta">
                  <div className="t">{clip.label}</div>
                  <div className="status-badge">{clip.status}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {view === "grid" && (
        <div className="lib-grid">
          {items.map((clip) => (
            <div key={clip.id} className="lib-card" onClick={() => onSelect(clip.id)}>
              <MediaFrame src={clip.url} />
              <div className="lib-meta">
                <div className="t">{clip.label}</div>
                <div className="status-badge">{clip.status}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {view === "list" && (
        <div>
          {items.map((clip) => (
            <div key={clip.id} className="lib-list-row" onClick={() => onSelect(clip.id)}>
              <div className="thumb"><MediaFrame src={clip.url} /></div>
              <div className="info">
                <div className="t">{clip.label}</div>
                <div className="status-badge">{clip.status}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {view === "masonry" && (
        <div className="masonry">
          {items.map((clip) => (
            <div key={clip.id} className="lib-card" onClick={() => onSelect(clip.id)}>
              <MediaFrame src={clip.url} style={{ aspectRatio: clip.id.length % 2 ? "3/4" : "4/5" }} />
              <div className="lib-meta">
                <div className="t">{clip.label}</div>
                <div className="status-badge">{clip.status}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {view === "grouped" && (
        <div>
          {groups.map((group) => (
            <div key={group.label}>
              <div className="group-label">{group.label}</div>
              {group.clips.map((clip) => (
                <div key={clip.id} className="lib-list-row" onClick={() => onSelect(clip.id)}>
                  <div className="thumb"><MediaFrame src={clip.url} /></div>
                  <div className="info"><div className="t">{clip.label}</div></div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function EditorFlow({ clip, onDone }) {
  const [prompt, setPrompt] = useState("");
  const [listening, setListening] = useState(false);
  const [running, setRunning] = useState(false);
  const [stepsDone, setStepsDone] = useState(0);
  const [ready, setReady] = useState(false);
  const [selected, setSelected] = useState(null);
  const [aiError, setAiError] = useState(false);
  const [variations, setVariations] = useState([
    { id: "a", ratio: "9:16", duration: "15 שנ׳", style: "אינסטוריז מהיר", caption: "לא תאמינו מה קרה עכשיו" },
    { id: "b", ratio: "4:5", duration: "30 שנ׳", style: "פיד קלאסי", caption: "כל מה שצריך לדעת, בקצרה" },
    { id: "c", ratio: "9:16", duration: "60 שנ׳", style: "ריל מעמיק", caption: "הסיפור המלא מאחורי הקלעים" },
  ]);
  const recognitionRef = useRef(null);
  const pipeline = ["ניקוי שתיקות ורעשי רקע", "הטמעת כתוביות בעברית", "הוספת מוזיקת רקע תואמת", "רינדור שלוש גרסאות"];

  const toggleMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    if (listening) { recognitionRef.current?.stop(); setListening(false); return; }
    const r = new SR();
    r.lang = "he-IL";
    r.onresult = (e) => setPrompt((p) => (p ? p + " " : "") + e.results[0][0].transcript);
    r.onend = () => setListening(false);
    recognitionRef.current = r;
    r.start();
    setListening(true);
  };

  const generateVariations = async (promptText) => {
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: 'אתה עורך וידאו AI במערכת APEX. בעל עסק נתן את הוראת העריכה הבאה: "' + promptText +
              '". צור בדיוק 3 גרסאות עריכה שונות עבור אינסטגרם/טיקטוק. החזר אך ורק JSON תקין ללא טקסט נוסף וללא Markdown, במבנה: [{"ratio":"9:16","duration":"15 שנ׳","style":"עד 4 מילים בעברית","caption":"כתובית פתיחה קצרה, עד 8 מילים"},{"ratio":"4:5","duration":"30 שנ׳","style":"...","caption":"..."},{"ratio":"9:16","duration":"60 שנ׳","style":"...","caption":"..."}]',
          }],
        }),
      });
      const data = await response.json();
      const text = (data.content || []).map((b) => b.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (Array.isArray(parsed) && parsed.length === 3) return parsed.map((v, i) => ({ id: ["a", "b", "c"][i], ...v }));
      return null;
    } catch (e) { return null; }
  };

  const runPipeline = () => {
    setRunning(true); setStepsDone(0); setAiError(false);
    pipeline.forEach((_, i) => setTimeout(() => setStepsDone(i + 1), (i + 1) * 850));
    const minTime = new Promise((res) => setTimeout(res, pipeline.length * 850 + 300));
    Promise.all([generateVariations(prompt), minTime]).then(([result]) => {
      if (result) setVariations(result); else setAiError(true);
      setRunning(false); setReady(true);
    });
  };

  return (
    <div className="screen">
      <BackLink label="חזרה לספריית הסרטונים" onClick={onDone} />
      <div className="eyebrow">אולפן העריכה</div>
      <h1 className="h1">תן הוראה, קבל שלוש גרסאות</h1>
      <p className="sub">כתוב או דבר, והאולפן עורך ומכתיב בהתאם.</p>

      <div className="card"><MediaFrame src={clip.url} style={{ width: "100%", borderRadius: 8, aspectRatio: "9/16", objectFit: "cover" }} /></div>

      {!ready && (
        <div className="card">
          <textarea value={prompt} onChange={(e) => setPrompt(e.target.value)}
            placeholder="לדוגמה: תערוך את זה לסרטון מצחיק לאינסטגרם, שים כתוביות בזהב" rows={3}
            style={{ width: "100%", background: "transparent", border: "none", color: "var(--text)", fontSize: 13.5, resize: "none", outline: "none" }} />
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <button className={`icon-btn ${listening ? "on" : ""}`} onClick={toggleMic}>{listening ? <MicOff size={14} /> : <Mic size={14} />}</button>
          </div>
        </div>
      )}

      {running && (
        <div className="card">
          {pipeline.map((label, i) => (
            <div key={label} className={`checklist-item ${i < stepsDone ? "done" : ""}`}>
              <div className={`check-circle ${i < stepsDone ? "done" : ""}`}>{i < stepsDone ? <Check size={10} /> : i === stepsDone ? <div className="spinner" /> : null}</div>
              {label}
            </div>
          ))}
        </div>
      )}

      {ready && (
        <>
          <p className="sub" style={{ marginBottom: 8 }}>{aiError ? "לא הצלחנו להתחבר ל-AI כרגע — הצגנו גרסאות לדוגמה:" : "ה-AI ניתח את ההוראה שלך ובנה 3 גרסאות:"}</p>
          <div className="variations">
            {variations.map((v) => (
              <div key={v.id} className={`variation-card ${selected === v.id ? "selected" : ""}`} onClick={() => setSelected(v.id)}>
                <MediaFrame src={clip.url} />
                <div className="variation-meta">
                  <div className="mono">{v.ratio} · {v.duration}</div>
                  <div style={{ margin: "2px 0" }}>{v.style}</div>
                  <div style={{ color: "var(--gold-bright)", fontFamily: "Fraunces, serif" }}>"{v.caption}"</div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      <div className="actions">
        {!running && !ready && (
          <button className="btn-primary" disabled={!prompt.trim()} onClick={runPipeline}>
            <Sparkles size={12} style={{ marginLeft: 5, verticalAlign: "-2px" }} /> שלח לעריכה
          </button>
        )}
        {ready && <button className="btn-primary" disabled={!selected} onClick={onDone}>שמור גרסה נבחרת</button>}
      </div>
    </div>
  );
}

function CampaignCreate({ onDone, onCancel }) {
  const [goal, setGoal] = useState("leads");
  const [budget, setBudget] = useState(2000);
  const [launched, setLaunched] = useState(false);
  const [tick, setTick] = useState(0);
  const [platforms, setPlatforms] = useState([
    { name: "פייסבוק", pct: 25, cpl: 42, off: false },
    { name: "אינסטגרם", pct: 25, cpl: 38, off: false },
    { name: "טיקטוק", pct: 25, cpl: 61, off: false },
    { name: "גוגל", pct: 25, cpl: 47, off: false },
  ]);
  const goals = [{ id: "messages", label: "הודעות" }, { id: "leads", label: "לידים" }, { id: "sales", label: "מכירות" }];

  useEffect(() => {
    if (!launched || tick > 5) return;
    const t = setTimeout(() => {
      setTick((v) => v + 1);
      setPlatforms((prev) => {
        const next = prev.map((p) => ({ ...p, cpl: Math.max(18, p.cpl + (Math.random() * 14 - 8)) }));
        if (tick === 3) {
          const worstIdx = next.reduce((wi, p, i, arr) => (p.cpl > arr[wi].cpl ? i : wi), 0);
          next[worstIdx].off = true;
        }
        const active = next.filter((p) => !p.off);
        const share = 100 / active.length;
        return next.map((p) => (p.off ? { ...p, pct: 0 } : { ...p, pct: share }));
      });
    }, 1300);
    return () => clearTimeout(t);
  }, [launched, tick]);

  const activeP = platforms.filter((p) => !p.off);
  const avgCpl = (activeP.reduce((s, p) => s + p.cpl, 0) / activeP.length).toFixed(0);

  return (
    <div className="screen">
      <BackLink label="חזרה לרשימת הקמפיינים" onClick={onCancel} />
      <div className="eyebrow">קמפיין חדש</div>
      <h1 className="h1">מנהל הקמפיינים הרובוטי</h1>
      <p className="sub">תקציב אחד, פיזור אוטומטי, וכיבוי מיידי של מה שלא מייצר החזר.</p>

      {!launched && (
        <>
          <div className="goal-pills">
            {goals.map((g) => <div key={g.id} className={`pill ${goal === g.id ? "active" : ""}`} onClick={() => setGoal(g.id)}>{g.label}</div>)}
          </div>
          <div className="card">
            <p className="sub" style={{ marginBottom: 6 }}>תקציב כולל (₪)</p>
            <input className="budget-input mono" type="number" value={budget} onChange={(e) => setBudget(Number(e.target.value))} />
          </div>
        </>
      )}

      {launched && (
        <div className="card">
          {platforms.map((p) => (
            <div className="platform-row" key={p.name}>
              <div className="platform-top"><span>{p.name}{p.off && " · כובה אוטומטית"}</span><span className="platform-cpl mono">{p.off ? "—" : `₪${p.cpl.toFixed(0)} לליד`}</span></div>
              <div className="bar-track"><div className={`bar-fill ${p.off ? "off" : ""}`} style={{ width: `${p.pct}%` }} /></div>
            </div>
          ))}
          <div className="stat-row">
            <span className="sub" style={{ margin: 0 }}>עלות ליד ממוצעת</span>
            <span className="mono" style={{ color: "var(--good)", display: "flex", alignItems: "center", gap: 4 }}><TrendingDown size={12} /> ₪{avgCpl}</span>
          </div>
        </div>
      )}

      <div className="actions">
        {!launched && <button className="btn-primary" onClick={() => setLaunched(true)}>הפעל קמפיין</button>}
        {launched && tick >= 5 && (
          <button className="btn-primary" onClick={() => onDone({ goal: goals.find((g) => g.id === goal).label, budget, avgCpl: Number(avgCpl) })}>
            שמור קמפיין
          </button>
        )}
      </div>
    </div>
  );
}

function ChatView({ leadName, onBack }) {
  const script = [
    { who: "lead", text: `היי, ראיתי את המודעה שלכם. כמה עולה החבילה?` },
    { who: "bot", text: `היי ${leadName}! שמחים שפנית. לפני המחיר — זה עבור עסק קטן או ליווי אישי?` },
    { who: "lead", text: "עסק קטן, יש לי 4 עובדים" },
    { who: "bot", text: "מעולה, בדיוק בשבילכם בנינו את החבילה. אפשר לקבוע 15 דקות ביום שלישי 14:00?" },
    { who: "lead", text: "בטח, מתאים לי" },
  ];
  const [shown, setShown] = useState([]);
  const [typing, setTyping] = useState(false);
  const [pushVisible, setPushVisible] = useState(false);
  const [done, setDone] = useState(false);

  useEffect(() => {
    let i = 0;
    function step() {
      if (i >= script.length) { setTimeout(() => setPushVisible(true), 500); return; }
      const msg = script[i];
      if (msg.who === "bot") setTyping(true);
      setTimeout(() => {
        setTyping(false);
        setShown((s) => [...s, msg]);
        i += 1;
        setTimeout(step, 700);
      }, msg.who === "bot" ? 900 : 300);
    }
    step();
  }, []);

  return (
    <div className="screen">
      <BackLink label="חזרה לרשימת הלידים" onClick={onBack} />
      <div className="eyebrow">שיחה עם {leadName}</div>
      <h1 className="h1">סוכן המכירות סוגר בשבילך</h1>

      {pushVisible && !done && (
        <div className="push-toast">
          <Bell size={16} color="var(--gold)" style={{ flexShrink: 0, marginTop: 2 }} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 2 }}>ליד מוכן לסגירה — {leadName}</div>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>מבקש פגישה ביום שלישי, 14:00</div>
            <div style={{ display: "flex", gap: 6 }}>
              <button className="btn-primary" style={{ padding: "7px 10px", fontSize: 12.5 }} onClick={() => setDone(true)}>
                <Calendar size={11} style={{ marginLeft: 4, verticalAlign: "-2px" }} /> אשר פגישה
              </button>
              <button className="icon-btn" style={{ width: 28, height: 28 }} onClick={() => setPushVisible(false)}><X size={12} /></button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <div className="chat-scroll">
          {shown.map((m, idx) => <div key={idx} className={`bubble ${m.who}`}>{m.text}</div>)}
          {typing && <div className="typing"><span /><span /><span /></div>}
        </div>
      </div>

      {done && (
        <div className="card" style={{ textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 6 }}><MessageCircle size={18} color="var(--gold)" /></div>
          <div className="header-title" style={{ fontSize: 14.5, marginBottom: 3 }}>פגישה נקבעה</div>
          <p className="sub" style={{ marginBottom: 0 }}>ללא סוכנות, ללא עורך, ללא נציג מכירות.</p>
        </div>
      )}
    </div>
  );
}

function fmtCount(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return String(n);
}

function fmtMoney(n) {
  return n.toLocaleString("en-US");
}

function PostCard({ p }) {

          <span className="post-metric"><Heart size={12} /> <span className="mono">{fmtCount(p.likes)}</span></span>
          <span className="post-metric"><MessageCircle size={12} /> <span className="mono">{fmtCount(p.comments)}</span></span>
        </div>
      </div>
    </div>
  );
}

function PostBrowser({ posts }) {
  const [view, setView] = useState("list");
  const scrollerRef = useRef(null);
  const itemRefs = useRef([]);

  useEffect(() => {
    if (view !== "carousel") return;
    const el = scrollerRef.current;
    if (!el) return;
    const update = () => {
      const rect = el.getBoundingClientRect();
      const center = rect.left + rect.width / 2;
      itemRefs.current.forEach((node) => {
        if (!node) return;
        const r = node.getBoundingClientRect();
        const dist = Math.abs(r.left + r.width / 2 - center);
        node.style.transform = `scale(${Math.max(0.82, 1 - dist / 700)})`;
        node.style.opacity = Math.max(0.5, 1 - dist / 420);
      });
    };
    update();
    el.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);
    return () => { el.removeEventListener("scroll", update); window.removeEventListener("resize", update); };
  }, [view, posts.length]);

  const groups = useMemo(() => {
    const byPlatform = {};
    posts.forEach((p) => { (byPlatform[p.platform] = byPlatform[p.platform] || []).push(p); });
    return Object.keys(byPlatform).map((platform) => ({ label: platform, posts: byPlatform[platform] }));
  }, [posts]);

  return (
    <>
      <ViewSwitch view={view} setView={setView} />

      {view === "list" && posts.map((p) => <PostCard key={p.id} p={p} />)}

      {view === "grid" && (
        <div className="lib-grid">
          {posts.map((p) => (
            <div key={p.id} className="lib-card">
              <MediaFrame src={p.url} />
              <div className="lib-meta">
                <div className="t">{p.platform}</div>
                <div className="status-badge">{fmtCount(p.views)} צפיות</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {view === "carousel" && (
        <div className="carousel" ref={scrollerRef}>
          {posts.map((p, i) => (
            <div key={p.id} className="carousel-item" ref={(node) => (itemRefs.current[i] = node)}>
              <PostCard p={p} />
            </div>
          ))}
        </div>
      )}

      {view === "masonry" && (
        <div className="masonry">
          {posts.map((p) => <PostCard key={p.id} p={p} />)}
        </div>
      )}

      {view === "grouped" && groups.map((group) => (
        <div key={group.label}>
          <div className="group-label">{group.label}</div>
          {group.posts.map((p) => <PostCard key={p.id} p={p} />)}
        </div>
      ))}
    </>
  );
}

function TrendChart({ data, max }) {
  const barW = 100 / data.length;
  return (
    <svg viewBox="0 0 100 40" preserveAspectRatio="none" style={{ width: "100%", height: 70 }}>
      {data.map((v, i) => {
        const h = (v / max) * 34;
        const last = i === data.length - 1;
        return <rect key={i} x={i * barW + barW * 0.15} y={38 - h} width={barW * 0.7} height={h} rx="1" fill={last ? "var(--gold-bright)" : "var(--gold)"} opacity={last ? 1 : 0.55} />;
      })}
    </svg>
  );
}

/* ------------------------------- Floating quick-nav ------------------------------- */

const FAB_ITEMS = [
  { id: "video", label: "סרטונים אחרונים", Icon: Video },
  { id: "publications", label: "פרסומים", Icon: PlaySquare },
  { id: "reports", label: "דוחות", Icon: ChartIcon },
  { id: "subscription", label: "המנוי שלך", Icon: CreditCard },
  { id: "settings", label: "הגדרות", Icon: SettingsIcon },
];

function FabMenu({ onNavigate }) {
  const [pos, setPos] = useState({ x: 9999, y: 9999 });
  const [open, setOpen] = useState(false);
  const btnRef = useRef(null);
  const wrapRef = useRef(null);
  const dragRef = useRef({ dragging: false, moved: false, startX: 0, startY: 0, origX: 0, origY: 0 });

  useEffect(() => {
    const clamp = () => {
      const maxX = Math.min(window.innerWidth, 420) - 60;
      const maxY = window.innerHeight - 180;
      setPos((p) => ({ x: Math.min(Math.max(p.x, 8), maxX), y: Math.min(Math.max(p.y, 70), maxY) }));
    };
    clamp();
    window.addEventListener("resize", clamp);
    return () => window.removeEventListener("resize", clamp);
  }, []);

  useEffect(() => {
    if (!open) return;
    const onOutside = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("pointerdown", onOutside);
    return () => document.removeEventListener("pointerdown", onOutside);
  }, [open]);

  const onPointerDown = (e) => {
    dragRef.current = { dragging: true, moved: false, startX: e.clientX, startY: e.clientY, origX: pos.x, origY: pos.y };
    btnRef.current.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current.dragging) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragRef.current.moved = true;
    const maxX = Math.min(window.innerWidth, 420) - 60;
    const maxY = window.innerHeight - 70;
    setPos({
      x: Math.min(Math.max(dragRef.current.origX + dx, 8), maxX),
      y: Math.min(Math.max(dragRef.current.origY + dy, 70), maxY),
    });
  };
  const onPointerUp = () => {
    if (!dragRef.current.moved) setOpen((v) => !v);
    dragRef.current.dragging = false;
  };

  const menuHeight = FAB_ITEMS.length * 38 + 12;
  const menuTop = pos.y - menuHeight - 10 > 60 ? pos.y - menuHeight - 10 : pos.y + 60;
  const menuLeft = Math.min(Math.max(pos.x - 118, 8), Math.min(window.innerWidth, 420) - 190);

  return (
    <div className="fab-layer">
      <div ref={wrapRef}>
        {open && (
          <div className="fab-menu" style={{ left: menuLeft, top: menuTop }}>
            {FAB_ITEMS.map(({ id, label, Icon }) => (
              <button key={id} className="fab-menu-item" onClick={() => { onNavigate(id); setOpen(false); }}>
                <span className="ic"><Icon size={14} /></span> {label}
              </button>
            ))}
          </div>
        )}
        <button
          ref={btnRef}
          className={`fab-btn ${open ? "open" : ""}`}
          style={{ left: pos.x, top: pos.y }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
        >
          <Plus size={22} />
        </button>
      </div>
    </div>
  );
}
