<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AthleteIQ</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0b0f1a; --card:#141b2d; --card2:#1b2438; --accent:#22d3ee; --accent2:#a78bfa;
  --good:#34d399; --warn:#fbbf24; --bad:#f87171; --text:#e7ecf5; --sub:#8b96ad;
  --nav:64px; --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{
  margin:0;height:100%;height:-webkit-fill-available;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  background:linear-gradient(160deg,#0b0f1a,#10162a 60%,#0b0f1a);
  color:var(--text);direction:rtl;overflow-x:hidden;
}
#login{min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{font-size:48px;margin-bottom:6px}
.brand{font-size:28px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px}
.tag{color:var(--sub);font-size:13px;margin-bottom:28px}
.field{width:100%;max-width:340px;margin-bottom:12px;text-align:right}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px}
input,select{
  width:100%;padding:13px 14px;border-radius:12px;border:1px solid #28304a;
  background:var(--card);color:var(--text);font-size:15px;outline:none;
}
input:focus,select:focus{border-color:var(--accent)}
.sportgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:340px;margin-bottom:6px}
.sport{background:var(--card);border:2px solid #28304a;border-radius:14px;padding:10px 4px;text-align:center;cursor:pointer;font-size:22px}
.sport.sel{border-color:var(--accent);background:var(--card2)}
.sport span{display:block;font-size:10px;color:var(--sub);margin-top:4px}
.modegrid{display:flex;gap:10px;width:100%;max-width:340px;margin-bottom:18px}
.mode{flex:1;background:var(--card);border:2px solid #28304a;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer}
.mode.sel{border-color:var(--accent2);background:var(--card2)}
.mode .ic{font-size:24px}
.mode .t{font-size:13px;font-weight:700;margin-top:4px}
.mode .d{font-size:11px;color:var(--sub);margin-top:2px}
.btn{
  width:100%;max-width:340px;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04111a;
  font-weight:800;font-size:15px;cursor:pointer;margin-top:4px;
}
.btn.ghost{background:transparent;border:1px solid #28304a;color:var(--text);font-weight:600}
.btn:disabled{opacity:.4}
.link{color:var(--accent);font-size:13px;margin-top:14px;cursor:pointer}

#app{display:none;height:100vh;height:-webkit-fill-available;flex-direction:column}
.topbar{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar .who{display:flex;align-items:center;gap:8px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#04111a}
.who .n{font-size:14px;font-weight:700}
.who .s{font-size:11px;color:var(--sub)}
.badge-plan{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--card2);border:1px solid #28304a;color:var(--accent)}

.content{flex:1;overflow-y:auto;padding:6px 14px calc(var(--nav) + var(--sab) + 14px);-webkit-overflow-scrolling:touch}
.section-title{font-size:18px;font-weight:800;margin:14px 0 10px}
.card{background:var(--card);border:1px solid #1f2740;border-radius:16px;padding:16px;margin-bottom:12px}
.card.tap{cursor:pointer;transition:transform .1s}
.card.tap:active{transform:scale(.98)}
.row{display:flex;align-items:center;justify-content:space-between}
.muted{color:var(--sub);font-size:12px}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;background:var(--card2);border:1px solid #28304a;margin-left:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:var(--card2);border-radius:12px;padding:12px;text-align:center}
.stat .v{font-size:20px;font-weight:800}
.stat .l{font-size:11px;color:var(--sub);margin-top:2px}
.bar-outer{height:8px;border-radius:5px;background:#222b42;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.upload-box{border:2px dashed #2c3656;border-radius:16px;padding:30px 16px;text-align:center;color:var(--sub);margin-bottom:14px}
.upload-box .ic{font-size:34px;margin-bottom:8px}
.tabs-mini{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.tab-mini{padding:7px 14px;border-radius:20px;background:var(--card);border:1px solid #28304a;font-size:12px;white-space:nowrap;cursor:pointer}
.tab-mini.sel{background:var(--accent);color:#04111a;font-weight:700;border-color:var(--accent)}
.plan-day{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1f2740}
.plan-day:last-child{border-bottom:none}
.daydot{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.daydot.done{background:var(--good);color:#04201a}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1f2740}
.player-row:last-child{border-bottom:none}
.player-row .pavatar{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.badge-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.badge-item{flex-shrink:0;width:72px;text-align:center}
.badge-item .ic{font-size:30px;background:var(--card2);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.badge-item.locked .ic{opacity:.3}
.badge-item .t{font-size:10px;color:var(--sub)}
.plan-card{border:1px solid #28304a;border-radius:16px;padding:16px;margin-bottom:12px}
.plan-card.featured{border-color:var(--accent);background:linear-gradient(160deg,#15233a,#141b2d)}
.plan-card .price{font-size:26px;font-weight:800;margin:8px 0}
.plan-card .price span{font-size:13px;color:var(--sub);font-weight:400}
.plan-card ul{padding-right:18px;margin:10px 0;font-size:13px;color:var(--text)}
.plan-card li{margin-bottom:6px}
.crown{position:absolute;top:-10px;right:16px;background:var(--warn);color:#241a00;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}

.nav{
  position:relative;flex-shrink:0;display:flex;
  height:calc(var(--nav) + var(--sab));padding-bottom:var(--sab);
  background:rgba(15,20,33,.95);border-top:1px solid #1f2740;backdrop-filter:blur(10px);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sub);font-size:10px;cursor:pointer;border:none;background:none}
.nav-btn .ic{font-size:19px}
.nav-btn.sel{color:var(--accent)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal h3{margin-top:0}
.close-x{position:absolute;left:16px;top:16px;font-size:20px;color:var(--sub);cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ===================== LOGIN / ONBOARDING ===================== -->
<div id="login">
  <div class="logo">🏆</div>
  <div class="brand">AthleteIQ</div>
  <div class="tag">בנה את הספורטאי הבא בגרסה הטובה ביותר שלו</div>

  <div id="step1">
    <div class="field"><label>שם מלא</label><input id="regName" placeholder="לדוגמה: דין כהן"></div>
    <div class="field">
      <label>בחר ענף ספורט</label>
      <div class="sportgrid" id="sportGrid"></div>
    </div>
    <div class="field">
      <label>מצב שימוש</label>
      <div class="modegrid" id="modeGrid">
        <div class="mode sel" data-mode="player"><div class="ic">🏃</div><div class="t">שחקן</div><div class="d">פרופיל אישי ומעקב</div></div>
        <div class="mode" data-mode="coach"><div class="ic">👨‍💼</div><div class="t">מאמן</div><div class="d">ניהול קבוצה</div></div>
      </div>
    </div>
    <button class="btn" id="btnEnter">כניסה ל-AthleteIQ</button>
    <div class="link" id="btnDemo">המשך כאורח לדמו מהיר</div>
  </div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="app">
  <div class="topbar">
    <div class="who">
      <div class="avatar" id="hdrAvatar">A</div>
      <div>
        <div class="n" id="hdrName">שחקן</div>
        <div class="s" id="hdrSport">⚽ כדורגל</div>
      </div>
    </div>
    <div class="badge-plan" id="hdrPlan">חינם</div>
  </div>

  <div class="content" id="content"></div>

  <div class="nav">
    <button class="nav-btn sel" data-tab="0"><div class="ic">📊</div>דשבורד</button>
    <button class="nav-btn" data-tab="1"><div class="ic">🎥</div>וידאו</button>
    <button class="nav-btn" data-tab="2"><div class="ic">📋</div>אימונים</button>
    <button class="nav-btn" data-tab="3"><div class="ic">👨‍💼</div>מאמן</button>
    <button class="nav-btn" data-tab="4"><div class="ic">💳</div>מינוי</button>
  </div>
</div>

<!-- generic modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ---------------- Firebase ---------------- */
var firebaseConfig = {apiKey:"AIzaSyBKOCyFdiy95SxddD_Iy6Gkq4aBsqkrFdE",authDomain:"soccer-26e99.firebaseapp.com",projectId:"soccer-26e99",storageBucket:"soccer-26e99.firebasestorage.app",messagingSenderId:"870862038298",appId:"1:870862038298:web:a58fde35acf1e79b9738a3"};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var P = 'ath_'; // collection prefix for AthleteIQ

/* ---------------- State ---------------- */
var SPORTS = [
  {id:'soccer',ic:'⚽',t:'כדורגל'},{id:'basket',ic:'🏀',t:'כדורסל'},
  {id:'tennis',ic:'🎾',t:'טניס'},{id:'swim',ic:'🏊',t:'שחייה'},
  {id:'run',ic:'🏃',t:'ריצה'},{id:'volley',ic:'🏐',t:'כדורעף'},
  {id:'fit',ic:'🏋️',t:'פיטנס'},{id:'other',ic:'🥇',t:'אחר'}
];
var ME = {uid:'', name:'', sport:'soccer', mode:'player', plan:'free'};
var TAB = 0;
var selSport = 'soccer', selMode = 'player';

var MOCK_PLAYERS = [
  {name:'יואב לוי',pos:'חלוץ',age:14,rating:82,trend:'up'},
  {name:'עומר כהן',pos:'מגן',age:13,rating:75,trend:'up'},
  {name:'איתי שרון',pos:'קשר',age:15,rating:88,trend:'down'},
  {name:'נועם דהן',pos:'שוער',age:14,rating:79,trend:'flat'}
];

var BADGES = [
  {ic:'🔥',t:'שבוע רצוף',got:true},{ic:'⚡',t:'מהירות+',got:true},
  {ic:'🎯',t:'דיוק מסירות',got:true},{ic:'🏅',t:'10 אימונים',got:false},
  {ic:'💪',t:'כוח מתפרץ',got:false},{ic:'👑',t:'שחקן החודש',got:false}
];

var TRAINING_PLAN = {
  daily:[
    {d:'ראשון',t:'חימום + ספרינטים',done:true},
    {d:'שני',t:'כוח פלג גוף תחתון',done:true},
    {d:'שלישי',t:'מנוחה אקטיבית',done:true},
    {d:'רביעי',t:'טכניקת כדרור ומסירות',done:false},
    {d:'חמישי',t:'אימון מהירות וכוח נפץ',done:false},
    {d:'שישי',t:'משחק תרגיל קבוצתי',done:false},
    {d:'שבת',t:'מנוחה',done:false}
  ],
  weekly:'שבוע 6 מתוך 12 — שלב בניית כוח בסיס',
  seasonal:'עונת אביב 2026 — מטרה: שיפור מהירות 8%, כוח נפץ 12%'
};

/* ---------------- Sport grid build ---------------- */
(function buildSportGrid(){
  var g = document.getElementById('sportGrid');
  SPORTS.forEach(function(s){
    var d = document.createElement('div');
    d.className = 'sport' + (s.id===selSport?' sel':'');
    d.dataset.id = s.id;
    d.innerHTML = s.ic + '<span>'+s.t+'</span>';
    d.onclick = function(){
      selSport = s.id;
      document.querySelectorAll('.sport').forEach(function(el){el.classList.remove('sel')});
      d.classList.add('sel');
    };
    g.appendChild(d);
  });
})();
document.querySelectorAll('.mode').forEach(function(el){
  el.onclick = function(){
    selMode = el.dataset.mode;
    document.querySelectorAll('.mode').forEach(function(m){m.classList.remove('sel')});
    el.classList.add('sel');
  };
});

/* ---------------- Login ---------------- */
function sportInfo(id){ return SPORTS.filter(function(s){return s.id===id})[0] || SPORTS[0]; }

function doLogin(name, asGuest){
  name = (name||'').trim();
  if(!name) name = 'אורח';
  ME.name = name;
  ME.sport = selSport;
  ME.mode = selMode;
  ME.uid = localStorage.getItem('ath_uid') || ('u_' + Math.random().toString(36).slice(2,10));
  localStorage.setItem('ath_uid', ME.uid);
  localStorage.setItem('ath_name', ME.name);
  localStorage.setItem('ath_sport', ME.sport);
  localStorage.setItem('ath_mode', ME.mode);
  enterApp();
}

document.getElementById('btnEnter').onclick = function(){
  doLogin(document.getElementById('regName').value, false);
};
document.getElementById('btnDemo').onclick = function(){
  selSport = 'soccer'; selMode = 'player';
  doLogin('שחקן דמו', true);
};

function enterApp(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('hdrName').textContent = ME.name;
  document.getElementById('hdrAvatar').textContent = ME.name.charAt(0);
  document.getElementById('hdrSport').textContent = sportInfo(ME.sport).ic + ' ' + sportInfo(ME.sport).t;
  document.getElementById('hdrPlan').textContent = ME.mode==='coach' ? 'מצב מאמן' : (ME.plan==='premium'?'פרימיום':'חינם');
  renderTab(0);
}

/* auto-login if returning user */
(function autoLogin(){
  var uid = localStorage.getItem('ath_uid');
  if(uid){
    ME.uid = uid;
    ME.name = localStorage.getItem('ath_name') || 'שחקן';
    ME.sport = localStorage.getItem('ath_sport') || 'soccer';
    ME.mode = localStorage.getItem('ath_mode') || 'player';
    enterApp();
  }
})();

/* ---------------- Nav ---------------- */
document.querySelectorAll('.nav-btn').forEach(function(btn){
  btn.onclick = function(){
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('sel')});
    btn.classList.add('sel');
    renderTab(parseInt(btn.dataset.tab,10));
  };
});

function renderTab(i){
  TAB = i;
  var c = document.getElementById('content');
  if(i===0) c.innerHTML = tplDashboard();
  else if(i===1) c.innerHTML = tplVideo();
  else if(i===2) c.innerHTML = tplTraining();
  else if(i===3) c.innerHTML = tplCoach();
  else if(i===4) c.innerHTML = tplSub();
  wireTab(i);
}

/* ---------------- TAB 0: Dashboard ---------------- */
function tplDashboard(){
  return ''+
  '<div class="section-title">היי '+ME.name.split(' ')[0]+' 👋</div>'+
  '<div class="grid3" style="margin-bottom:14px">'+
    '<div class="stat"><div class="v">82</div><div class="l">דירוג כללי</div></div>'+
    '<div class="stat"><div class="v">23</div><div class="l">אימונים</div></div>'+
    '<div class="stat"><div class="v">+8%</div><div class="l">שיפור החודש</div></div>'+
  '</div>'+
  '<div class="card">'+
    '<div class="row"><b>התקדמות עונתית</b><span class="muted">שלב 6/12</span></div>'+
    '<div class="bar-outer"><div class="bar-fill" style="width:50%"></div></div>'+
  '</div>'+
  '<div class="section-title" style="font-size:15px">יכולות מרכזיות</div>'+
  capRow('מהירות',78)+capRow('כוח',65)+capRow('טכניקה',84)+capRow('סיבולת',70)+
  '<div class="section-title" style="font-size:15px">תגים</div>'+
  '<div class="badge-row">'+BADGES.map(function(b){
    return '<div class="badge-item '+(b.got?'':'locked')+'"><div class="ic">'+b.ic+'</div><div class="t">'+b.t+'</div></div>';
  }).join('')+'</div>'+
  '<div class="card tap" id="goCompare" style="margin-top:14px">'+
    '<div class="row"><div><b>📊 השוואה לקבוצת השווים</b><div class="muted">איך אני מדורג מול שחקנים בני גילי</div></div><div>›</div></div>'+
  '</div>';
}
function capRow(label,val){
  return '<div class="card" style="padding:12px 16px;margin-bottom:8px"><div class="row"><span style="font-size:13px">'+label+'</span><span class="muted">'+val+'%</span></div><div class="bar-outer"><div class="bar-fill" style="width:'+val+'%"></div></div></div>';
}

/* ---------------- TAB 1: Video AI (UI shell only, no real processing) ---------------- */
function tplVideo(){
  return ''+
  '<div class="section-title">🎥 ניתוח וידאו AI</div>'+
  '<div class="upload-box" id="uploadBox"><div class="ic">📹</div>העלה סרטון אימון או משחק<br><span class="muted" style="font-size:11px">MP4 · עד 5 דקות</span></div>'+
  '<button class="btn" id="btnUpload">בחר סרטון להעלאה</button>'+
  '<div class="card" style="margin-top:16px;text-align:center;color:var(--sub);font-size:13px">'+
    '🚧 ניתוח הווידאו האוטומטי ב-AI נמצא בפיתוח ויושק בקרוב.<br>בינתיים תוכל להעלות סרטונים ולשמור אותם בפרופיל שלך.'+
  '</div>'+
  '<div class="section-title" style="font-size:15px">סרטונים שהועלו</div>'+
  '<div class="card"><div class="row"><span>🎬 אימון כדרור — 12.6</span><span class="pill">ממתין</span></div></div>'+
  '<div class="card"><div class="row"><span>🎬 משחק מול הפועל — 5.6</span><span class="pill">ממתין</span></div></div>';
}

/* ---------------- TAB 2: Training plans ---------------- */
function tplTraining(){
  return ''+
  '<div class="section-title">📋 תוכנית אימונים</div>'+
  '<div class="tabs-mini">'+
    '<div class="tab-mini sel" data-p="daily">יומי</div>'+
    '<div class="tab-mini" data-p="weekly">שבועי</div>'+
    '<div class="tab-mini" data-p="seasonal">עונתי</div>'+
    '<div class="tab-mini" data-p="teams">מאגר קבוצות</div>'+
  '</div>'+
  '<div id="planArea"></div>';
}
function renderPlanArea(p){
  var a = document.getElementById('planArea');
  if(!a) return;
  if(p==='daily'){
    a.innerHTML = '<div class="card">'+TRAINING_PLAN.daily.map(function(d,i){
      return '<div class="plan-day"><div class="daydot '+(d.done?'done':'')+'">'+(i+1)+'</div><div style="flex:1"><b>'+d.d+'</b><div class="muted">'+d.t+'</div></div>'+(d.done?'✅':'⬜')+'</div>';
    }).join('')+'</div>';
  } else if(p==='weekly'){
    a.innerHTML = '<div class="card"><div class="row"><b>תוכנית שבועית</b><span class="pill">AI</span></div><div class="muted" style="margin-top:8px">'+TRAINING_PLAN.weekly+'</div><div class="bar-outer"><div class="bar-fill" style="width:50%"></div></div></div>'+
    '<div class="card"><b>מיקוד השבוע</b><ul style="padding-right:18px;font-size:13px;color:var(--text);margin-top:8px"><li>3 אימוני כוח</li><li>2 אימוני טכניקה</li><li>1 יום מנוחה מלא</li></ul></div>';
  } else if(p==='seasonal'){
    a.innerHTML = '<div class="card"><div class="row"><b>תוכנית עונתית</b><span class="pill">AI</span></div><div class="muted" style="margin-top:8px">'+TRAINING_PLAN.seasonal+'</div><div class="bar-outer"><div class="bar-fill" style="width:50%"></div></div></div>'+
    '<div class="card"><b>שלבי העונה</b>'+
      ['בניית בסיס','בניית כוח','עצימות גבוהה','שיא לקראת תחרות'].map(function(s,i){
        return '<div class="plan-day"><div class="daydot '+(i<1?'done':'')+'">'+(i+1)+'</div><div>'+s+'</div></div>';
      }).join('')+'</div>';
  } else {
    a.innerHTML = '<div class="card"><b>🌍 מאגר קבוצות עולמי</b><div class="muted" style="margin-top:6px">תוכניות אימון מבוססות נתונים מקבוצות מובילות בעולם</div></div>'+
    ['מנצ׳סטר סיטי - אקדמיה','באיירן מינכן - אקדמיה','אייאקס - אקדמיה'].map(function(t){
      return '<div class="card tap"><div class="row"><span>⚽ '+t+'</span><span>›</span></div></div>';
    }).join('');
  }
}

/* ---------------- TAB 3: Coach mode ---------------- */
function tplCoach(){
  if(ME.mode !== 'coach'){
    return '<div class="section-title">👨‍💼 מצב מאמן</div>'+
    '<div class="card" style="text-align:center">'+
      '<div style="font-size:34px;margin-bottom:8px">🔒</div>'+
      '<b>מצב מאמן נעול</b>'+
      '<div class="muted" style="margin:8px 0">עבור לחשבון מאמן כדי לנהל שחקנים ולבנות תוכניות קבוצתיות</div>'+
      '<button class="btn ghost" id="switchCoach">החלף למצב מאמן</button>'+
    '</div>';
  }
  return ''+
  '<div class="section-title">👨‍💼 ניהול קבוצה</div>'+
  '<div class="grid3" style="margin-bottom:14px">'+
    '<div class="stat"><div class="v">'+MOCK_PLAYERS.length+'</div><div class="l">שחקנים</div></div>'+
    '<div class="stat"><div class="v">81</div><div class="l">ממוצע דירוג</div></div>'+
    '<div class="stat"><div class="v">4</div><div class="l">אימונים השבוע</div></div>'+
  '</div>'+
  '<button class="btn" id="btnAddPlayer" style="margin-bottom:14px">+ הוסף שחקן</button>'+
  '<div class="card">'+MOCK_PLAYERS.map(function(p){
    var trendIc = p.trend==='up'?'📈':p.trend==='down'?'📉':'➖';
    return '<div class="player-row"><div class="pavatar">'+p.name.charAt(0)+'</div><div style="flex:1"><b>'+p.name+'</b><div class="muted">'+p.pos+' · גיל '+p.age+'</div></div><div style="text-align:left"><div><b>'+p.rating+'</b></div><div class="muted">'+trendIc+'</div></div></div>';
  }).join('')+'</div>'+
  '<div class="section-title" style="font-size:15px">תוכנית קבוצתית</div>'+
  '<div class="card tap" id="teamPlanCard"><div class="row"><span>📋 תוכנית אימון לקבוצה — שבוע 6</span><span>›</span></div></div>';
}

/* ---------------- TAB 4: Subscriptions ---------------- */
function tplSub(){
  return ''+
  '<div class="section-title">💳 מינויים</div>'+
  subCard('חינם','0',['פרופיל שחקן בסיסי','דשבורד סטטיסטיקות','תוכנית אימון יומית'],false,false)+
  subCard('פרימיום','39',['כל מה שבחינם','תוכניות עונתיות מלאות','ניתוח וידאו AI (בקרוב)','תגים והשוואות מתקדמות'],true,false)+
  subCard('מאמן','99',['ניהול עד 30 שחקנים','תוכניות קבוצתיות ואישיות','דוחות התקדמות לכל שחקן'],false,false)+
  subCard('מועדון','299',['ניהול בלתי מוגבל של קבוצות','ריבוי מאמנים','דשבורד ניהול מועדון'],false,true);
}
function subCard(title,price,feats,featured,club){
  return '<div class="plan-card '+(featured?'featured':'')+'" style="position:relative">'+
    (featured?'<div class="crown">⭐ מומלץ</div>':'')+
    '<div class="row"><b style="font-size:16px">'+(club?'🏟️ ':featured?'💎 ':'🆓 ')+title+'</b></div>'+
    '<div class="price">₪'+price+'<span> / חודש</span></div>'+
    '<ul>'+feats.map(function(f){return '<li>✓ '+f+'</li>'}).join('')+'</ul>'+
    '<button class="btn '+(price==='0'?'ghost':'')+'" data-plan="'+title+'">'+(price==='0'?'התוכנית הנוכחית':'שדרג עכשיו')+'</button>'+
  '</div>';
}

/* ---------------- Wire interactions per tab ---------------- */
function wireTab(i){
  if(i===1){
    var box = document.getElementById('uploadBox');
    var btn = document.getElementById('btnUpload');
    var go = function(){ openModal('<h3>📤 העלאת סרטון</h3><p class="muted">תכונת העלאת הווידאו וניתוח ה-AI נמצאת בפיתוח ותושק בקרוב. בקרוב תוכל להעלות סרטונים לקבלת דוח יכולות אישי.</p><button class="btn" onclick="closeModal()">הבנתי</button>'); };
    if(box) box.onclick = go;
    if(btn) btn.onclick = go;
  }
  if(i===2){
    renderPlanArea('daily');
    document.querySelectorAll('.tab-mini').forEach(function(el){
      el.onclick = function(){
        document.querySelectorAll('.tab-mini').forEach(function(m){m.classList.remove('sel')});
        el.classList.add('sel');
        renderPlanArea(el.dataset.p);
      };
    });
  }
  if(i===3){
    var sw = document.getElementById('switchCoach');
    if(sw) sw.onclick = function(){
      ME.mode = 'coach';
      localStorage.setItem('ath_mode','coach');
      document.getElementById('hdrPlan').textContent = 'מצב מאמן';
      renderTab(3);
    };
    var addP = document.getElementById('btnAddPlayer');
    if(addP) addP.onclick = function(){
      openModal('<h3>+ הוספת שחקן</h3>'+
        '<div class="field"><label>שם השחקן</label><input id="npName" placeholder="שם מלא"></div>'+
        '<div class="field"><label>תפקיד</label><input id="npPos" placeholder="לדוגמה: חלוץ"></div>'+
        '<div class="field"><label>גיל</label><input id="npAge" type="number" placeholder="14"></div>'+
        '<button class="btn" id="npSave">שמור שחקן</button>');
      document.getElementById('npSave').onclick = function(){
        var n = document.getElementById('npName').value.trim();
        if(!n) return;
        MOCK_PLAYERS.push({name:n,pos:document.getElementById('npPos').value||'שחקן',age:parseInt(document.getElementById('npAge').value,10)||14,rating:70,trend:'flat'});
        closeModal();
        renderTab(3);
      };
    };
    var tpc = document.getElementById('teamPlanCard');
    if(tpc) tpc.onclick = function(){
      openModal('<h3>📋 תוכנית קבוצתית — שבוע 6</h3>'+
        '<div class="muted" style="margin-bottom:10px">שלב בניית כוח בסיס</div>'+
        TRAINING_PLAN.daily.map(function(d){return '<div class="plan-day"><div style="flex:1"><b>'+d.d+'</b><div class="muted">'+d.t+'</div></div></div>'}).join('')+
        '<button class="btn" onclick="closeModal()" style="margin-top:10px">סגור</button>');
    };
  }
  if(i===4){
    document.querySelectorAll('[data-plan]').forEach(function(btn){
      btn.onclick = function(){
        var plan = btn.dataset.plan;
        if(plan==='חינם') return;
        ME.plan = 'premium';
        openModal('<h3>🎉 שדרוג ל'+plan+'</h3><p class="muted">תהליך התשלום יושק בקרוב. לעת עתה זהו תצוגה מקדימה של חוויית השדרוג.</p><button class="btn" onclick="closeModal()">סגור</button>');
      };
    });
  }
  if(i===0){
    var cmp = document.getElementById('goCompare');
    if(cmp) cmp.onclick = function(){
      openModal('<h3>📊 השוואה לקבוצת השווים</h3>'+
        '<div class="card"><div class="row"><span>מהירות</span><span class="muted">אתה: 78% · ממוצע קבוצה: 71%</span></div></div>'+
        '<div class="card"><div class="row"><span>כוח</span><span class="muted">אתה: 65% · ממוצע קבוצה: 68%</span></div></div>'+
        '<div class="card"><div class="row"><span>טכניקה</span><span class="muted">אתה: 84% · ממוצע קבוצה: 75%</span></div></div>'+
        '<button class="btn" onclick="closeModal()">סגור</button>');
    };
  }
}

/* ---------------- Modal helpers ---------------- */
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').onclick = function(e){
  if(e.target === document.getElementById('modalBg')) closeModal();
};

/* ---------------- Firestore (profile sync) ---------------- */
function syncProfile(){
  if(!ME.uid) return;
  db.collection(P+'profiles').doc(ME.uid).set({
    name:ME.name, sport:ME.sport, mode:ME.mode, plan:ME.plan, updatedAt:Date.now()
  }, {merge:true});
}
</script>
