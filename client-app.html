<style>

.hdr{background:#1A56DB;padding:14px 16px 12px;position:sticky;top:0;z-index:20;}
.ct{padding:14px;padding-bottom:90px;background:#F5F6F8;}

      <div style="font-size:22px;font-weight:800;color:#fff;">NIR AVIV</div>

// Load user from localStorage (set by register.html)
var ALL_CLIENTS=[];
var CURRENT_CLIENT_ID=null;
var USER={name:"",plan:"",card:0,max:0,status:"active",branch:"",children:[],phone:"",email:"",dob:""};
(function(){
  try{
    var cur=sessionStorage.getItem("na_current_user")||localStorage.getItem("na_current_user");
    if(cur){
      var ud=JSON.parse(cur);
      if(ud&&ud.name){USER.name=ud.name;USER.phone=ud.phone||"";USER.email=ud.email||"";USER.dob=ud.dob||"";}
    }
    var allCL=localStorage.getItem("na_clients");
    if(allCL){
      ALL_CLIENTS=JSON.parse(allCL);
      var me=ALL_CLIENTS.find(function(c){return c.phone===USER.phone||c.email===USER.email||c.name===USER.name;});
      if(me){
        CURRENT_CLIENT_ID=me.id;
        USER.status=me.arch?"arch":(me.status||"active");
        USER.card=me.card||0;USER.max=me.max||0;USER.plan=me.plan||"";USER.branch=me.branch||"";
        USER.children=ALL_CLIENTS.filter(function(c){return c.parentId===me.id;}).map(function(c){
          return {id:c.id,name:c.name,status:c.arch?"arch":c.status,card:c.card||0,max:c.max||0,plan:c.plan||"",branch:c.branch||USER.branch,dob:c.dob};
        });
      }
    }
  }catch(e){}
  // Auto-switch to first active account
  try{
    // Build all accounts: self + children
    var _allAccounts=[];
    _allAccounts.push({name:USER.name,status:USER.status,card:USER.card,max:USER.max,plan:USER.plan,branch:USER.branch,isChild:false});
    if(USER.children&&USER.children.length>0){
      USER.children.forEach(function(ch){_allAccounts.push(Object.assign({},ch,{isChild:true,parentName:USER.name,parentChildren:USER.children}));});
    }
    // Find first non-archived account
    var _activeAcc=_allAccounts.find(function(a){return a.status!=="arch";});
    if(_activeAcc&&_activeAcc.isChild){
      var _savedChildren=USER.children;
      var _savedParentName=USER.name;
      USER=Object.assign({},_activeAcc);
      USER.children=_savedChildren;
      USER.parentName=_savedParentName;
      USER.isChild=true;
    } else if(!_activeAcc){
      // All archived - stay on parent
    }
  }catch(e){}
})();

];

function el(tag,css,txt){var e=document.createElement(tag);if(css)e.style.cssText=css;if(txt!==undefined)e.textContent=txt;return e;}
function div(css){return el("div",css);}
function ap(){var p=arguments[0];for(var i=1;i<arguments.length;i++)p.appendChild(arguments[i]);return p;}
function setTab(t){tab=t;render();}

// ── HOME ──
function renderHome(){
  var ct=document.getElementById("ct");ct.innerHTML="";
  // Show archived banner if user is archived
  if(USER.status==="arch"){
    var archBanner=document.createElement("div");
    archBanner.style.cssText="background:#FEF2F2;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #FCA5A5;text-align:center;";
    var archTxt=document.createElement("div");
    archTxt.style.cssText="font-size:14px;font-weight:600;color:#B91C1C;margin-bottom:8px;";
    archTxt.textContent="\u05d4\u05d7\u05e9\u05d1\u05d5\u05df \u05d0\u05d9\u05e0\u05d5 \u05e4\u05e2\u05d9\u05dc";
    archBanner.appendChild(archTxt);
    // If has active children - offer to switch
    var activeChildren=USER.children?USER.children.filter(function(c){return c.status!=="arch";}):[];
    if(activeChildren.length>0){
      var switchBtn=document.createElement("button");
      switchBtn.style.cssText="padding:10px 20px;border-radius:10px;border:none;background:#1A56DB;color:#fff;font-size:14px;font-weight:700;cursor:pointer;";
      switchBtn.textContent="\u05e2\u05d1\u05d5\u05e8 \u05dc\u05d7\u05e9\u05d1\u05d5\u05df \u05d9\u05dc\u05d3";
      switchBtn.onclick=function(){openFamilySwitcher();};
      archBanner.appendChild(switchBtn);
    }
    ct.appendChild(archBanner);
  }
  var sub=div("background:linear-gradient(135deg,#1A56DB,#1240A0);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(26,86,219,.3);");
  var top=div("display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;");
  var info=div("");
  ap(info,el("div","font-size:13px;color:rgba(255,255,255,.8);margin-bottom:3px;",USER.name),
          el("div","font-size:26px;font-weight:800;color:#fff;line-height:1.1;",USER.card+"/"+USER.max+" \u05db\u05e0\u05d9\u05e1\u05d5\u05ea"));
  var bdg=el("div","background:rgba(255,255,255,.22);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;",USER.status==="active"?"\u05e4\u05e2\u05d9\u05dc":"\u05de\u05d5\u05e7\u05e4\u05d0");
  ap(top,bdg,info);sub.appendChild(top);
  var pg=div("background:rgba(255,255,255,.22);border-radius:4px;height:6px;overflow:hidden;margin-bottom:6px;");
  var pct=USER.max>0?Math.round(USER.card/USER.max*100):0;
  pg.appendChild(div("height:100%;border-radius:4px;background:#fff;width:"+pct+"%;"));
  ap(sub,pg,el("div","font-size:12px;color:rgba(255,255,255,.7);",USER.plan+" | "+USER.branch));
  ct.appendChild(sub);

  var today=new Date().getDay();
  var branchSess=SESS.filter(function(s){return s.branch===USER.branch;});
  for(var di=0;di<7;di++){
    var dw=(today+di)%7;
    var ss=branchSess.filter(function(s){return s.dow.indexOf(dw)>=0;});
    if(ss.length){
      var ns=ss[0];
      var nc=div("background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;display:flex;align-items:center;gap:12px;");
      nc.onclick=function(){setTab("schedule");};
      ap(nc,div("width:4px;min-height:48px;border-radius:4px;background:"+ns.color+";flex-shrink:0;"));
      var ni=div("flex:1;");
      ap(ni,el("div","font-size:11px;color:#9AA5BE;font-weight:600;margin-bottom:3px;","\u05d4\u05d0\u05d9\u05de\u05d5\u05df \u05d4\u05d1\u05d0"),
             el("div","font-size:17px;font-weight:800;color:#1A1A2E;",ns.group),
             el("div","font-size:13px;color:#6A7A9E;margin-top:2px;",ns.time+" - "+ns.end+" | "+ns.trainer));
      ap(nc,ni);ct.appendChild(nc);break;
    }
  }

  var regBtn=document.createElement("button");
  regBtn.style.cssText="width:100%;padding:16px;border-radius:16px;border:none;background:#1A56DB;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 16px rgba(26,86,219,.35);";
  regBtn.textContent="\uD83C\uDFAB \u05d4\u05d9\u05e8\u05e9\u05dd \u05dc\u05d0\u05d9\u05de\u05d5\u05df";
  regBtn.onclick=function(){setTab("schedule");};

  var stx=document.createElement("span");stx.style.cssText="font-size:15px;font-weight:600;color:#1A1A2E;";stx.textContent="\u05d4\u05d7\u05dc\u05e4\u05ea \u05de\u05e9\u05ea\u05de\u05e9";
  switchRow.appendChild(sic);switchRow.appendChild(stx);

  menu.appendChild(switchRow);

  logoutRow.style.cssText="display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;";
  var lic=document.createElement("span");lic.textContent="\uD83D\uDD11";lic.style.fontSize="18px";
  var ltx=document.createElement("span");ltx.style.cssText="font-size:15px;font-weight:600;color:#EF4444;";ltx.textContent="\u05d4\u05ea\u05e0\u05ea\u05e7\u05d5\u05ea";
  logoutRow.appendChild(lic);logoutRow.appendChild(ltx);
  logoutRow.onclick=function(){
    try{localStorage.removeItem("na_current_user");sessionStorage.removeItem("na_current_user");}catch(e){}
    document.body.removeChild(sh);

  };
  menu.appendChild(logoutRow);
  sh.appendChild(menu);

}

function doClientLogin(){
  var ident=document.getElementById("cl-ident").value.trim();
  var err=document.getElementById("cl-err");
  err.style.display="none";
  if(!ident){err.textContent="נא להזין טלפון או אימייל";err.style.display="block";return;}
  var clients=[];
  try{clients=JSON.parse(localStorage.getItem("na_clients")||"[]");}catch(e){}
  var found=clients.find(function(c){
    return (c.phone&&c.phone.replace(/[-\s]/g,"")===ident.replace(/[-\s]/g,""))||(c.email&&c.email.toLowerCase()===ident.toLowerCase());
  });
  // Also check na_new_user (registered but not yet processed by manager)
  if(!found){
    try{
      var nu=JSON.parse(localStorage.getItem("na_new_user")||"null");
      if(nu&&((nu.phone&&nu.phone.replace(/[-\s]/g,"")===ident.replace(/[-\s]/g,""))||(nu.email&&nu.email.toLowerCase()===ident.toLowerCase()))){
        found={name:nu.name,phone:nu.phone,email:nu.email,dob:nu.dob,status:"active",card:0,max:0,plan:"",id:null};
      }
    }catch(e){}
  }
  if(!found){
    err.textContent="לא נמצא לקוח עם פרטים אלו. האם עדיין לא נרשמת?";
    err.style.display="block";
    return;
  }
  var userData={name:found.name,phone:found.phone,email:found.email,dob:found.dob};
  var remember=document.getElementById("cl-remember").checked;
  try{
    sessionStorage.setItem("na_current_user",JSON.stringify(userData));
    if(remember)localStorage.setItem("na_current_user",JSON.stringify(userData));
  }catch(e){}
  document.getElementById("cl-login").style.display="none";
  // reload user data
  if(userData.name){USER.name=userData.name;USER.phone=userData.phone||"";USER.email=userData.email||"";USER.dob=userData.dob||"";}
  var me=clients.find(function(c){return c.phone===USER.phone||c.email===USER.email;});
  if(me){
    CURRENT_CLIENT_ID=me.id;
    USER.status=me.arch?"arch":(me.status||"active");
    USER.card=me.card||0;USER.max=me.max||0;USER.plan=me.plan||"";USER.branch=me.branch||"";
  }
  var hb=document.getElementById("hbrand");if(hb)hb.textContent=T.brand;
  var gl=document.getElementById("greeting-lbl");if(gl)gl.textContent=USER.name;
  render();
}
document.addEventListener("keydown",function(e){if(e.key==="Enter"&&document.getElementById("cl-login").style.display!=="none")doClientLogin();});
