<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>

<title>NIR AVIV</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NIR AVIV"/>
<meta name="theme-color" content="#1A56DB"/>
<link rel="manifest" href="manifest.json"/>
<style>
:root{--blue:#1A56DB;--blue-dark:#1240A0;--bg:#F2F2F7;--card:#fff;--label:#1C1C1E;--label2:#3C3C43;--label3:#8E8E93;--sep:rgba(60,60,67,.12);--nav-h:56px;}
html,body{color-scheme:light only;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--label);direction:rtl;-webkit-tap-highlight-color:transparent;}
*{box-sizing:border-box;}
.hdr{background:rgba(255,255,255,.82);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--sep);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));position:sticky;top:0;z-index:20;}
.ct{padding:16px;padding-bottom:calc(var(--nav-h) + 24px + env(safe-area-inset-bottom));}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--sep);display:flex;z-index:100;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding:0;padding-bottom:env(safe-area-inset-bottom);align-items:stretch;}
#nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;cursor:pointer;color:var(--label3);padding:6px 0;min-height:44px;}
#nav button .ic{font-size:22px;line-height:1;}
#nav button .lb{font-size:10px;font-weight:600;letter-spacing:.1px;}
#nav button.on{color:var(--blue);}
#nav button.on .ic{transform:scale(1.08);}
.card{background:var(--card);border-radius:16px;padding:0;margin-bottom:12px;overflow:hidden;}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--sep);}
.card-row:last-child{border-bottom:none;}
.card-row .rl{font-size:13px;color:var(--label3);display:flex;align-items:center;gap:6px;}
.card-row .rv{font-size:15px;font-weight:600;color:var(--label);}
.sec-hdr{font-size:13px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.4px;padding:0 4px;margin:20px 0 6px;}
</style>

function openFamilySwitcher(){
  // Build family list - parent + children, no duplicates
  var members=[];
  // Find the parent (could be current user or stored in parentName)
  if(USER.isChild){
    // Current user is a child - add parent first (archived)
    members.push({name:USER.parentName||"\u05d4\u05d5\u05e8\u05d0",active:false,isParent:true,arch:true,data:null});
    // Add current child as active
    members.push({name:USER.name,active:USER.status!=="arch",isParent:false,arch:USER.status==="arch",data:null,isCurrent:true});
    // Add other siblings
    if(USER.children&&USER.children.length>0){
      USER.children.forEach(function(ch){
        if(ch.name!==USER.name){
          members.push({name:ch.name,active:ch.status!=="arch",isParent:false,arch:ch.status==="arch",data:ch});
        }
      });
    }
  } else {
    // Current user is parent
    members.push({name:USER.name,active:USER.status!=="arch",isParent:true,arch:USER.status==="arch",isCurrent:true});
    if(USER.children&&USER.children.length>0){
      USER.children.forEach(function(ch){
        members.push({name:ch.name,active:ch.status!=="arch",isParent:false,arch:ch.status==="arch",data:ch});
      });
    }
  }
  if(members.length<=1){showToastClient("\u05d0\u05d9\u05df \u05d1\u05e0\u05d9 \u05de\u05e9\u05e4\u05d7\u05d4 \u05de\u05e7\u05d5\u05e9\u05e8\u05d9\u05dd");return;}
  var sh=document.createElement("div");sh.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;";
  var inner=document.createElement("div");inner.style.cssText="background:#fff;border-radius:22px 22px 0 0;padding:20px 16px 34px;width:100%;";
  var hdl=document.createElement("div");hdl.style.cssText="width:36px;height:4px;border-radius:2px;background:#E0E3EA;margin:0 auto 16px;";inner.appendChild(hdl);
  var ttl=document.createElement("div");ttl.style.cssText="font-size:17px;font-weight:800;color:#1A1A2E;margin-bottom:14px;";ttl.textContent="\u05d1\u05d7\u05e8 \u05dc\u05e7\u05d5\u05d7";inner.appendChild(ttl);
  members.forEach(function(m){
    var row=document.createElement("div");row.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #F0F2F6;cursor:pointer;";
    var left=document.createElement("div");
    var nm=document.createElement("div");nm.style.cssText="font-size:15px;font-weight:700;color:#1A1A2E;";
    nm.textContent=m.name;
      var statusLbl=document.createElement("div");statusLbl.style.cssText="font-size:12px;margin-top:2px;font-weight:600;color:"+(m.arch?"#EF4444":m.active?"#059669":"#8A9ABE")+";";
      statusLbl.textContent=m.arch?"(\u05d0\u05e8\u05db\u05d9\u05d5\u05df)":m.active?"(\u05e4\u05e2\u05d9\u05dc)":"(\u05dc\u05d0 \u05e4\u05e2\u05d9\u05dc)";
      left.appendChild(statusLbl);
    var sub=document.createElement("div");sub.style.cssText="font-size:12px;color:#8A9ABE;margin-top:2px;";sub.textContent=m.isParent?"\u05d4\u05d5\u05e8\u05d0":"\u05d9\u05dc\u05d3";
    left.appendChild(nm);left.appendChild(sub);
    var check=document.createElement("div");check.style.cssText="width:22px;height:22px;border-radius:50%;background:"+(m.name===USER.name?"#1A56DB":"#F0F2F6")+";display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;";
    if(m.name===USER.name)check.textContent="\u2713";
    row.appendChild(left);row.appendChild(check);
    (function(mem){
    row.onclick=function(){
      if(mem.data){
        // Switch to child account
        var prev=USER;
        USER=Object.assign({},mem.data);
        USER.children=prev.children;
        USER.isChild=true;
        USER.parentName=prev.name;
      } else {
        // Switch back to parent
        if(USER.isChild){
          var savedChildren=USER.children;
          try{var par=ALL_CLIENTS.find(function(c){return c.name===USER.parentName;});if(par){USER.name=par.name;USER.card=par.card||0;USER.max=par.max||0;USER.status=par.arch?"arch":par.status;USER.plan=par.plan||"";USER.children=savedChildren;USER.isChild=false;};}catch(e){}
        }
      }
      document.body.removeChild(sh);render();
    };
  })(m);
    inner.appendChild(row);
  });
  var cb=document.createElement("button");cb.style.cssText="width:100%;padding:13px;border-radius:12px;border:none;background:#F0F2F6;color:#3A4A6A;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;";cb.textContent="\u05e1\u05d2\u05d5\u05e8";cb.onclick=function(){document.body.removeChild(sh);};
  inner.appendChild(cb);sh.appendChild(inner);
  sh.onclick=function(e){if(e.target===sh)document.body.removeChild(sh);};
  document.body.appendChild(sh);
}

  menu.appendChild(logoutRow);

  document.body.appendChild(sh);

function updateHeader(){
  var hb=document.getElementById("hbrand");if(hb)hb.textContent=USER.name||T.brand;
  var av=document.getElementById("hav");if(av)av.textContent=USER.name?USER.name[0]:"?";
  var hr=new Date().getHours();
  var gr=hr>=5&&hr<12?"\u05d1\u05d5\u05e7\u05e8 \u05d8\u05d5\u05d1":hr>=12&&hr<17?"\u05e6\u05d4\u05e8\u05d9\u05d9\u05dd \u05d8\u05d5\u05d1\u05d9\u05dd":hr>=17&&hr<22?"\u05e2\u05e8\u05d1 \u05d8\u05d5\u05d1":"\u05dc\u05d9\u05dc\u05d4 \u05d8\u05d5\u05d1";
  var gl=document.getElementById("greeting-lbl");if(gl)gl.textContent=gr+(USER.name?", "+USER.name+" \uD83D\uDC4B":"");
}

// Auth gate
(function(){
  var cur=sessionStorage.getItem("na_current_user")||localStorage.getItem("na_current_user");
  if(!cur){
    setTimeout(function(){
      var s=document.getElementById("splash");if(s)s.style.display="none";
      var cl=document.getElementById("cl-login");if(cl){cl.style.display="flex";}
    },1200);
    return;
  }
  var ud=JSON.parse(cur);
  // Refresh from Firestore if we have a Firestore ID or phone/email
  var q=null;
  if(ud.firestoreId){q=db.collection("clients").doc(ud.firestoreId).get();}
  else if(ud.phone){q=db.collection("clients").where("phone","==",ud.phone).limit(1).get();}
  else if(ud.email){q=db.collection("clients").where("email","==",ud.email).limit(1).get();}
  function showApp(){setTimeout(function(){var s=document.getElementById("splash");if(s)s.style.display="none";},400);updateHeader();render();}
  if(q){
    q.then(function(res){
      var doc=res.docs?res.docs[0]:res;
      if(doc&&doc.exists){
        var d=doc.data();
        CURRENT_CLIENT_ID=doc.id;
        USER.status=d.arch?"arch":(d.status||"active");
        USER.card=d.card||0;USER.max=d.max||0;USER.plan=d.plan||"";USER.branch=d.branch||"";
      }
      showApp();
    }).catch(function(){showApp();});
  } else {showApp();}
})();


function doClientLogin(){
  var ident=document.getElementById("cl-ident").value.trim();
  var pass=document.getElementById("cl-pass").value;
  var err=document.getElementById("cl-err");
  err.style.display="none";
  if(!ident){err.textContent="נא להזין טלפון או אימייל";err.style.display="block";return;}
  if(!pass){err.textContent="נא להזין סיסמה";err.style.display="block";return;}
  var loginBtn=document.querySelector("#cl-login .login-btn");
  if(loginBtn){loginBtn.disabled=true;loginBtn.textContent="מחפש...";}
  var ident_norm=ident.replace(/[-\s]/g,"");
  Promise.all([
    db.collection("clients").where("phone","==",ident).limit(1).get(),
    db.collection("clients").where("phone","==",ident_norm).limit(1).get(),
    db.collection("clients").where("email","==",ident.toLowerCase()).limit(1).get()
  ]).then(function(results){
    var found=null;
    results.forEach(function(snap){if(!snap.empty&&!found){var d=snap.docs[0];found=Object.assign({id:d.id},d.data());}});
    if(!found){
      err.textContent="לא נמצא לקוח עם פרטים אלו. האם עדיין לא נרשמת?";
      err.style.display="block";
      if(loginBtn){loginBtn.disabled=false;loginBtn.textContent="כניסה";}
      return;
    }
    // Check password (allow login if no password set yet - backwards compat)
    if(found.password&&found.password!==pass){
      err.textContent="סיסמה שגויה";
      err.style.display="block";
      if(loginBtn){loginBtn.disabled=false;loginBtn.textContent="כניסה";}
      return;
    }
    var remember=document.getElementById("cl-remember").checked;
    var userData={name:found.name,phone:found.phone||"",email:found.email||"",dob:found.dob||"",firestoreId:found.id};
    try{sessionStorage.setItem("na_current_user",JSON.stringify(userData));if(remember)localStorage.setItem("na_current_user",JSON.stringify(userData));}catch(e){}
    document.getElementById("cl-login").style.display="none";
    USER.name=found.name;USER.phone=found.phone||"";USER.email=found.email||"";USER.dob=found.dob||"";
    CURRENT_CLIENT_ID=found.id;
    USER.status=found.arch?"arch":(found.status||"active");
    USER.card=found.card||0;USER.max=found.max||0;USER.plan=found.plan||"";USER.branch=found.branch||"";
    updateHeader();render();
  }).catch(function(e){
    console.error(e);
    err.textContent="שגיאת חיבור. בדוק אינטרנט ונסה שנית.";
    err.style.display="block";
    if(loginBtn){loginBtn.disabled=false;loginBtn.textContent="כניסה";}
  });
}
document.addEventListener("keydown",function(e){if(e.key==="Enter"&&document.getElementById("cl-login").style.display!=="none")doClientLogin();});
