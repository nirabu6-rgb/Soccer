    members.push({name:USER.parentName||"\u05d4\u05d5\u05e8\u05d0",active:false,isParent:true,arch:true,data:null});
    // Add current child as active
    members.push({name:USER.name,active:USER.status!=="arch",isParent:false,arch:USER.status==="arch",data:null,isCurrent:true});
    // Add other siblings
    if(USER.children&&USER.children.length>0){
      USER.children.forEach(function(ch){
        if(ch.name!==USER.name){
          members.push({name:ch.name,active:ch.status!=="arch",isParent:false,arch:ch.status==="arch",data:ch});

  if(ud.firestoreId){q=db.collection("clients").doc(ud.firestoreId).get();}
  else if(ud.phone){q=db.collection("clients").where("phone","==",ud.phone).limit(1).get();}
  else if(ud.email){q=db.collection("clients").where("email","==",ud.email).limit(1).get();}
  function showApp(){setTimeout(function(){var s=document.getElementById("splash");if(s)s.style.display="none";},400);updateHeader();render();}
  if(q){
    q.then(function(res){
      var doc=res.docs?res.docs[0]:res;
      if(doc&&doc.exists){
        var d=doc.data();
        CURRENT_CLIENT_ID=doc.id;
        USER.status=d.arch?"arch":(d.status||"active");
        USER.card=d.card||0;USER.max=d.max||0;USER.plan=d.plan||"";USER.branch=d.branch||"";
      }
      showApp();
    }).catch(function(){showApp();});
  } else {showApp();}
})();


function doClientLogin(){
  var ident=document.getElementById("cl-ident").value.trim();
  var err=document.getElementById("cl-err");
  err.style.display="none";
  if(!ident){err.textContent="נא להזין טלפון או אימייל";err.style.display="block";return;}
  var loginBtn=document.querySelector("#cl-login .login-btn");
  if(loginBtn){loginBtn.disabled=true;loginBtn.textContent="מחפש...";}
  var ident_norm=ident.replace(/[-\s]/g,"");
  Promise.all([
    db.collection("clients").where("phone","==",ident).limit(1).get(),
    db.collection("clients").where("phone","==",ident_norm).limit(1).get(),
    db.collection("clients").where("email","==",ident.toLowerCase()).limit(1).get()
  ]).then(function(results){
    var found=null;
    results.forEach(function(snap){if(!snap.empty&&!found){var d=snap.docs[0];found=Object.assign({id:d.id},d.data());}});
    if(!found){
      err.textContent="לא נמצא לקוח עם פרטים אלו. האם עדיין לא נרשמת?";
      err.style.display="block";
      if(loginBtn){loginBtn.disabled=false;loginBtn.textContent="כניסה";}
      return;
    }
    var remember=document.getElementById("cl-remember").checked;
    var userData={name:found.name,phone:found.phone||"",email:found.email||"",dob:found.dob||"",firestoreId:found.id};
    try{sessionStorage.setItem("na_current_user",JSON.stringify(userData));if(remember)localStorage.setItem("na_current_user",JSON.stringify(userData));}catch(e){}
    document.getElementById("cl-login").style.display="none";
    USER.name=found.name;USER.phone=found.phone||"";USER.email=found.email||"";USER.dob=found.dob||"";
    CURRENT_CLIENT_ID=found.id;
    USER.status=found.arch?"arch":(found.status||"active");
    USER.card=found.card||0;USER.max=found.max||0;USER.plan=found.plan||"";USER.branch=found.branch||"";
    updateHeader();render();
  }).catch(function(e){
    console.error(e);
    err.textContent="שגיאת חיבור. בדוק אינטרנט ונסה שנית.";
    err.style.display="block";
    if(loginBtn){loginBtn.disabled=false;loginBtn.textContent="כניסה";}
  });
}
document.addEventListener("keydown",function(e){if(e.key==="Enter"&&document.getElementById("cl-login").style.display!=="none")doClientLogin();});

</script>
