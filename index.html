<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AthleteIQ</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#f5f6f8; --card:#ffffff; --card2:#eef0f3; --accent:#22b8d8; --accent2:#0ea5b8;
  --good:#34d399; --warn:#fbbf24; --bad:#f87171; --text:#1c2230; --sub:#6b7280;
  --nav:64px; --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{
  margin:0;height:100%;height:-webkit-fill-available;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  background:linear-gradient(160deg,#f5f6f8,#eef0f3 60%,#f5f6f8);
  color:var(--text);direction:rtl;overflow-x:hidden;
}
#login{min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{font-size:48px;margin-bottom:6px}
.brand{font-size:28px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px}
.tag{color:var(--sub);font-size:13px;margin-bottom:28px}
.field{width:100%;max-width:340px;margin-bottom:12px;text-align:right}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px}
input,select{
  width:100%;padding:13px 14px;border-radius:12px;border:1px solid #dde1e8;
  background:var(--card);color:var(--text);font-size:15px;outline:none;
}
input:focus,select:focus{border-color:var(--accent)}
.sportgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:340px;margin-bottom:6px}
.sport{background:var(--card);border:2px solid #dde1e8;border-radius:14px;padding:10px 4px;text-align:center;cursor:pointer;font-size:22px}
.sport.sel{border-color:var(--accent);background:var(--card2)}
.sport span{display:block;font-size:10px;color:var(--sub);margin-top:4px}
.modegrid{display:flex;gap:10px;width:100%;max-width:340px;margin-bottom:18px}
.mode{flex:1;background:var(--card);border:2px solid #dde1e8;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer}
.mode.sel{border-color:var(--accent2);background:var(--card2)}
.mode .ic{font-size:24px}
.mode .t{font-size:13px;font-weight:700;margin-top:4px}
.mode .d{font-size:11px;color:var(--sub);margin-top:2px}
.btn{
  width:100%;max-width:340px;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04111a;
  font-weight:800;font-size:15px;cursor:pointer;margin-top:4px;
}
.btn.ghost{background:transparent;border:1px solid #dde1e8;color:var(--text);font-weight:600}
.btn:disabled{opacity:.4}
.link{color:var(--accent);font-size:13px;margin-top:14px;cursor:pointer}

#app{display:none;height:100vh;height:-webkit-fill-available;flex-direction:column}
.topbar{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar .who{display:flex;align-items:center;gap:8px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#04111a}
.who .n{font-size:14px;font-weight:700}
.who .s{font-size:11px;color:var(--sub)}
.badge-plan{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--card2);border:1px solid #dde1e8;color:var(--accent)}
.logout-btn{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;padding:6px;margin-right:4px}
.topbar .right{display:flex;align-items:center}
.week-block{margin-bottom:10px}
.week-head{display:flex;align-items:center;justify-content:space-between;padding:4px 2px}
.week-head b{font-size:13px}
.locked-day{display:flex;align-items:center;gap:8px;padding:7px 0;color:var(--sub);font-size:13px}
.chat-wrap{display:flex;flex-direction:column;max-height:50vh;overflow-y:auto;margin-bottom:10px;gap:8px}
.msg{max-width:80%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.4}
.msg.bot{background:var(--card2);align-self:flex-start}
.msg.me{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04111a;align-self:flex-end}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:11px;padding:6px 10px;border-radius:14px;background:var(--card2);border:1px solid #dde1e8;cursor:pointer}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1}
.jersey{display:inline-flex;width:22px;height:22px;border-radius:5px;background:var(--card2);align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-right:4px}

.content{flex:1;overflow-y:auto;padding:6px 14px calc(var(--nav) + var(--sab) + 14px);-webkit-overflow-scrolling:touch}
.section-title{font-size:18px;font-weight:800;margin:14px 0 10px}
.card{background:var(--card);border:1px solid #e3e6ec;border-radius:16px;padding:16px;margin-bottom:12px}
.card.tap{cursor:pointer;transition:transform .1s}
.card.tap:active{transform:scale(.98)}
.row{display:flex;align-items:center;justify-content:space-between}
.muted{color:var(--sub);font-size:12px}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;background:var(--card2);border:1px solid #dde1e8;margin-left:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:var(--card2);border-radius:12px;padding:12px;text-align:center}
.stat .v{font-size:20px;font-weight:800}
.stat .l{font-size:11px;color:var(--sub);margin-top:2px}
.bar-outer{height:8px;border-radius:5px;background:#e5e8ed;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.upload-box{border:2px dashed #c7cdd8;border-radius:16px;padding:30px 16px;text-align:center;color:var(--sub);margin-bottom:14px}
.upload-box .ic{font-size:34px;margin-bottom:8px}
.tabs-mini{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.tab-mini{padding:7px 14px;border-radius:20px;background:var(--card);border:1px solid #dde1e8;font-size:12px;white-space:nowrap;cursor:pointer}
.tab-mini.sel{background:var(--accent);color:#04111a;font-weight:700;border-color:var(--accent)}
.plan-day{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e3e6ec}
.plan-day:last-child{border-bottom:none}
.daydot{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.daydot.done{background:var(--good);color:#04201a}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e3e6ec;cursor:pointer}
.player-row:last-child{border-bottom:none}
.player-row .pavatar{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.status-tag{font-size:10px;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
textarea{width:100%;padding:13px 14px;border-radius:12px;border:1px solid #dde1e8;background:var(--card);color:var(--text);font-size:14px;outline:none;resize:vertical;font-family:inherit}
textarea:focus{border-color:var(--accent)}
.badge-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.badge-item{flex-shrink:0;width:72px;text-align:center}
.badge-item .ic{font-size:30px;background:var(--card2);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.badge-item.locked .ic{opacity:.3}
.badge-item .t{font-size:10px;color:var(--sub)}
.plan-card{border:1px solid #dde1e8;border-radius:16px;padding:16px;margin-bottom:12px}
.plan-card.featured{border-color:var(--accent);background:linear-gradient(160deg,#eef0f3,#ffffff)}
.plan-card .price{font-size:26px;font-weight:800;margin:8px 0}
.plan-card .price span{font-size:13px;color:var(--sub);font-weight:400}
.plan-card ul{padding-right:18px;margin:10px 0;font-size:13px;color:var(--text)}
.plan-card li{margin-bottom:6px}
.crown{position:absolute;top:-10px;right:16px;background:var(--warn);color:#241a00;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}

.nav{
  position:relative;flex-shrink:0;display:flex;
  height:calc(var(--nav) + var(--sab));padding-bottom:var(--sab);
  background:rgba(255,255,255,.92);border-top:1px solid #e3e6ec;backdrop-filter:blur(10px);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sub);font-size:10px;cursor:pointer;border:none;background:none}
.nav-btn .ic{font-size:19px}
.nav-btn.sel{color:var(--accent)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal h3{margin-top:0}
.close-x{position:absolute;left:16px;top:16px;font-size:20px;color:var(--sub);cursor:pointer}
.hidden{display:none!important}
</style>
</head>

</div>

<!-- ===================== MAIN APP ===================== -->
<div id="app">

  <div class="content" id="content"></div>

</div>

<div class="modal-bg" id="modalBg">

/* ---------------- TAB 2: Player self-built training plan (locked by week) ---------------- */
function genPlayerPlan(goal, freq, duration){
  var weeksByDuration = {daily:1, weekly:4, monthly:8, yearly:24};
  var totalWeeks = weeksByDuration[duration] || 4;
  var focusPool = ['חימום וספרינטים','כוח פלג גוף תחתון','טכניקה ושליטה בכדור','מהירות וכוח נפץ','סיבולת אירובית','מנוחה אקטיבית','משחק תרגיל'];
  var weeks = [];
  for(var w=0; w<totalWeeks; w++){
    var days = [];
    for(var d=0; d<7; d++){
      var isRest = (d===6) || (d===2 && freq<6);
      days.push({d:DAY_NAMES[d], t: isRest ? 'מנוחה' : focusPool[(w+d)%focusPool.length], done:false});
    }
    weeks.push(days);
  }
  return {goal:goal, freq:freq, duration:duration, totalWeeks:totalWeeks, currentWeek:1, weeks:weeks};
}

var SLOT_MIN = 15;
function genTimeSlots(){
  var arr = [];
  for(var h=14;h<=21;h++){
    for(var m=0;m<60;m+=SLOT_MIN){
      arr.push((h<10?'0':'')+h+':'+(m<10?'0':'')+m);
    }
  }
  return arr;
}
var TIME_SLOTS = genTimeSlots();
var MONTH_NAMES = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
function fmtDDMM(d){ return (d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1); }
function startOfWeek(offsetWeeks){
  var d = new Date();
  d.setDate(d.getDate() + offsetWeeks*7);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function weekRangeLabel(offsetWeeks){
  var s = startOfWeek(offsetWeeks);
  var e = new Date(s); e.setDate(s.getDate()+6);
  return (offsetWeeks===0?'השבוע הזה · ':'')+fmtDDMM(s)+' – '+fmtDDMM(e);
}
function monthLabel(offsetMonths){
  var d = new Date();
  d.setMonth(d.getMonth() + offsetMonths);
  return (offsetMonths===0?'החודש הזה · ':'')+MONTH_NAMES[d.getMonth()]+' '+d.getFullYear();
}
function weekNavRow(navAttr, offset){
  return '<div class="row" style="margin-bottom:10px;gap:6px">'+
    '<button class="logout-btn" data-'+navAttr+'="-1" title="שבוע קודם" style="font-size:16px">◀</button>'+
    '<div class="muted" style="flex:1;text-align:center;font-size:12px">'+weekRangeLabel(offset)+'</div>'+
    '<button class="logout-btn" data-'+navAttr+'="1" title="שבוע הבא" style="font-size:16px">▶</button>'+
  '</div>';
}
function weekDayHeader(day, offsetWeeks){
  var idx = DAY_NAMES.indexOf(day);
  var d = startOfWeek(offsetWeeks);
  d.setDate(d.getDate() + idx);
  return '<div style="font-weight:700">'+d.getDate()+'</div><div style="font-size:10px">'+day+'</div>';
}
function monthNavRow(navAttr, offset){
  return '<div class="row" style="margin-bottom:10px;gap:6px">'+
    '<button class="logout-btn" data-'+navAttr+'="-1" title="חודש קודם" style="font-size:16px">◀</button>'+
    '<div class="muted" style="flex:1;text-align:center;font-size:12px">'+monthLabel(offset)+'</div>'+
    '<button class="logout-btn" data-'+navAttr+'="1" title="חודש הבא" style="font-size:16px">▶</button>'+
  '</div>';
}
function addMinutesToTime(start, mins){
  var parts = start.split(':');
  var total = parseInt(parts[0],10)*60 + parseInt(parts[1],10) + mins;
  var h = Math.floor(total/60), m = total%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function shiftClubSchedule(id, dayDelta, slotDelta){
  var s = CLUB_SCHEDULE.filter(function(x){return x.id===id;})[0];
  if(!s) return;
  if(dayDelta){
    var di = DAY_NAMES.indexOf(s.day) + dayDelta;
    if(di<0 || di>=DAY_NAMES.length) return;
    s.day = DAY_NAMES[di];
  }
  if(slotDelta && s.start){
    var si = TIME_SLOTS.indexOf(s.start) + slotDelta;
    if(si<0 || si>=TIME_SLOTS.length) return;
    s.start = TIME_SLOTS[si];
    s.time = s.start + '-' + addMinutesToTime(s.start, s.duration||30);
  }
  db.collection(P+'clubschedule').doc(id).set(s, {merge:true});
  refreshFieldsUI();
}

  if(IN_FIELD_MODAL){ openCalendarSettingsModal(); }
  else { renderTab(TAB===9?9:6); }
}

    html += monthNavRow('fieldmonthnav', CLUB_FIELD_MONTH_OFFSET);

  html += '<div class="muted" style="margin-bottom:8px;font-size:12px">לחיצה ארוכה על תא פנוי תיצור אימון חדש בו · גרור אימון לתא אחר כדי להזיז אותו, או השתמש בחיצים ◀▶ / ▲▼ על הבלוק</div>';
  var fieldRowSkip = {};
  fieldDays.forEach(function(d){ fieldRowSkip[d] = 0; });
  var fieldItemsAll = CLUB_SCHEDULE.filter(function(s){return s.fieldId===field.id;});
  html += '<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;min-width:680px">'+

            return '<td data-droptime="'+slot+'" data-dropday="'+day+'" style="border:1px solid #e3e6ec;padding:2px;vertical-align:top;min-width:90px"></td>';

          return '<td rowspan="'+maxSpan+'" data-droptime="'+slot+'" data-dropday="'+day+'" style="border:1px solid #e3e6ec;padding:2px;vertical-align:top;min-width:90px">'+
            starting.map(function(s){
              return '<div class="card" draggable="true" data-dragsch="'+s.id+'" style="margin:0 0 3px;padding:5px 6px;font-size:11px;cursor:grab;height:100%">'+
                '<div style="font-weight:700">'+s.group+'</div>'+

                '<div class="row" style="margin-top:3px;gap:3px">'+
                  '<button class="logout-btn" data-shiftday="'+s.id+':-1" title="יום קודם" style="font-size:10px;padding:0 4px">◀</button>'+

  var overlapNote = clubOverlapNote(field.id);
  if(overlapNote) html += '<div class="muted" style="margin:10px 0">⚠️ '+overlapNote+'</div>';

function clubOverlapNote(fieldId){
  var byDay = {};
  CLUB_SCHEDULE.filter(function(s){return s.fieldId===fieldId && s.time;}).forEach(function(s){
    var key = s.day+'_'+s.time;
    byDay[key] = byDay[key] || [];
    byDay[key].push(s.group);
  });
  var notes = [];
  Object.keys(byDay).forEach(function(k){
    if(byDay[k].length>1) notes.push(k.replace('_',' · ')+': '+byDay[k].join(' + '));
  });
  return notes.length ? 'יותר מקבוצה אחת מתאמנת באותו זמן — '+notes.join(' | ') : '';
}

function clubGroupsGrid(days, fieldsById, weekOffset){
  weekOffset = weekOffset || 0;
  if(!CLUB_SCHEDULE.length){
    return '<div class="card" style="text-align:center;color:var(--sub)">אין קבוצות מתוזמנות בתצוגה זו</div>';
  }
  var grpRowSkip = {};
  days.forEach(function(d){ grpRowSkip[d] = 0; });
  return '<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;min-width:'+(days.length>1?680:240)+'px">'+
    '<tr><td style="width:50px"></td>'+
      days.map(function(d){ return '<td style="text-align:center;font-size:12px;padding:4px">'+weekDayHeader(d, weekOffset)+'</td>'; }).join('')+
    '</tr>'+
    TIME_SLOTS.map(function(slot){
      return '<tr>'+
        '<td class="muted" style="font-size:11px;padding:2px 4px;vertical-align:top;white-space:nowrap">'+slot+'</td>'+
        days.map(function(day){
          if(grpRowSkip[day] > 0){ grpRowSkip[day]--; return ''; }
          var starting = CLUB_SCHEDULE.filter(function(s){return s.day===day && s.start===slot;});
          if(!starting.length){
            return '<td style="border:1px solid #e3e6ec;padding:2px;vertical-align:top;min-width:90px"></td>';
          }
          var maxSpan = Math.max.apply(null, starting.map(function(s){ return Math.ceil((s.duration||30)/SLOT_MIN); }));
          grpRowSkip[day] = maxSpan - 1;
          return '<td rowspan="'+maxSpan+'" style="border:1px solid #e3e6ec;padding:2px;vertical-align:top;min-width:90px">'+
            starting.map(function(s){
              return '<div class="card" style="margin:0 0 3px;padding:5px 6px;font-size:11px;height:100%">'+
                '<div class="row" style="align-items:flex-start"><div class="tap" data-groupdetail="'+s.group+'" style="flex:1;cursor:pointer">'+
                  '<div style="font-weight:700">'+s.group+'</div>'+
                  '<div class="muted" style="font-size:10px">'+(s.time||s.start)+' · 🏟 '+(fieldsById[s.fieldId]||'-')+'</div>'+
                '</div>'+
                '<button class="logout-btn" data-delsch="'+s.id+'" title="מחק" style="font-size:11px;padding:0 2px">🗑</button></div>'+
              '</div>';
            }).join('')+
          '</td>';
        }).join('')+
      '</tr>';
    }).join('')+
  '</table></div>';
}

function openPositionPicker(draft){
  draft.name = document.getElementById('npName').value;
  draft.age = document.getElementById('npAge').value;
  draft.jersey = document.getElementById('npJersey').value;
  draft.group = document.getElementById('npGroup').value;

  openModal('<h3>בחר תפקיד/ים על המגרש</h3>'+

        return '<div class="sport'+(sel?' sel':'')+'" data-pos="'+pos+'" style="font-size:13px;padding:12px 6px'+(sel?';outline:2px solid var(--accent)':'')+'">'+pos+'</div>';
      }).join('')+
    '</div>'+
    '<button class="btn" id="posPickDone" style="margin-top:14px">אישור</button>');
  document.querySelectorAll('[data-pos]').forEach(function(el){
    el.onclick = function(){

function genCode(len, chars){
  var s = '';
  for(var i=0;i<len;i++) s += chars.charAt(Math.floor(Math.random()*chars.length));
  return s;
}

  'ריצות עליה/תאוצה קצרות (10 מ\') + מתיחות גמישות'
];
var COOLDOWN_LIBRARY = [
  'הליכה קלה + מתיחות סטטיות לשרירי הרגליים',
  'תרגילי נשימה והרפיה + מתיחות לגב התחתון',
  'מתיחות זוגיות מודרכות + סיכום קצר עם הקבוצה'
];
function pickFromLibrary(lib, seed){
  var h = 0;
  for(var i=0;i<seed.length;i++) h += seed.charCodeAt(i);
  return lib[h % lib.length];
}
function markPlanUpdated(){
  if(!ME.subCoach) return;

function sessionBreakdown(focus, seed){
  seed = seed || focus;
  var total = TEAM_SETTINGS.duration || 60;
  var warm = Math.max(Math.round(total*0.15),5);
  var cool = Math.max(Math.round(total*0.1),5);
  var main = Math.max(total - warm - cool, 10);
  var warmupText = pickFromLibrary(WARMUP_LIBRARY, seed);
  var cooldownText = pickFromLibrary(COOLDOWN_LIBRARY, seed+'_c');
  return 'חימום ('+warm+' דק\'): '+warmupText+' ← '+focus+' ('+main+' דק\', הפסקת מים '+(TEAM_SETTINGS.waterBreakMin||0)+' דק\', מעברים '+(TEAM_SETTINGS.transitionSec||0)+' שנ\' בין תרגילים) ← שחרור ('+cool+' דק\'): '+cooldownText;
}

function genAnalysis(jersey){

    distanceKm: (seeded(4,30,60)/10).toFixed(1), duels: seeded(5,15,40)
  };
}

}

/* ---------------- AI chat assistant — fixed-step wizard, no repeated questions ---------------- */
var CHAT_QUESTIONS = [
  {key:'target', q:'בשביל מי בונים את התוכנית? כתוב שם שחקן מהקבוצה, או "כל הקבוצה".'},
  {key:'goal', q:'מה המטרה המרכזית? (מהירות / כוח / טכניקה / סיבולת)'},
  {key:'freq', q:'כמה ימי אימון בשבוע רוצים?'},
  {key:'injury', q:'יש מגבלה רפואית או פציעה שצריך להתחשב בה? אם לא — כתוב "לא".'}
];
var CHAT_STATE = {step:0, answers:{}, done:false};

function openAiChatModal(){
  if(CHAT_LOG.length===0){
    CHAT_LOG.push({who:'bot', text:'בוא נבנה תוכנית מדויקת. אשאל אותך 4 שאלות קצרות ואז אכין תוכנית.'});
    askNextQuestion();
  }
  renderChatModal();
}
function askNextQuestion(){
  if(CHAT_STATE.step < CHAT_QUESTIONS.length){
    CHAT_LOG.push({who:'bot', text:CHAT_QUESTIONS[CHAT_STATE.step].q});
  }
}
function renderChatModal(){
  var finished = CHAT_STATE.step >= CHAT_QUESTIONS.length;
  openModal(''+
    '<h3>🤖 בניית תוכנית עם AI</h3>'+
    '<div class="chat-wrap" id="chatWrap">'+
      CHAT_LOG.map(function(m){ return '<div class="msg '+(m.who==='me'?'me':'bot')+'">'+m.text+'</div>'; }).join('')+
    '</div>'+
    (finished
      ? '<button class="btn" id="chatRestart">בנה תוכנית נוספת</button>'
      : '<div class="chat-input-row"><input id="chatInput" placeholder="הקלד תשובה..."><button class="btn" id="chatSend" style="width:auto;padding:13px 18px">שלח</button></div>'
    )
  );
  var send = document.getElementById('chatSend');
  if(send) send.onclick = function(){
    var v = document.getElementById('chatInput').value.trim();
    if(!v) return;
    answerChat(v);
  };
  var inp = document.getElementById('chatInput');
  if(inp) inp.onkeydown = function(e){ if(e.key==='Enter') send.click(); };
  var restart = document.getElementById('chatRestart');
  if(restart) restart.onclick = function(){
    CHAT_LOG = []; CHAT_STATE = {step:0, answers:{}, done:false};
    openAiChatModal();
  };
  var wrap = document.getElementById('chatWrap');
  if(wrap) wrap.scrollTop = wrap.scrollHeight;
}
function answerChat(text){
  CHAT_LOG.push({who:'me', text:text});
  CHAT_STATE.answers[CHAT_QUESTIONS[CHAT_STATE.step].key] = text;
  CHAT_STATE.step++;
  if(CHAT_STATE.step < CHAT_QUESTIONS.length){
    askNextQuestion();
  } else {
    CHAT_LOG.push({who:'bot', text:buildPlanFromChat(CHAT_STATE.answers)});
  }
  renderChatModal();
}
function buildPlanFromChat(a){
  var goalMap = {'מהירות':'speed','כוח':'strength','טכניקה':'technique','סיבולת':'endurance'};
  var goalKey = goalMap[a.goal] || 'technique';
  var freq = parseInt(a.freq,10) || 4;
  var plan = genPlayerPlan(goalKey, freq, 'weekly');
  var target = MOCK_PLAYERS.filter(function(p){return p.name===a.target.trim()})[0];
  if(target){
    target.plan = plan.weeks[0];
    target.note = (target.note ? target.note+' | ' : '') + (a.injury && a.injury!=='לא' ? 'הערה מה-AI: '+a.injury : '');
  } else {
    TEAM_PLAN = plan.weeks[0];
  }
  var summary = (target ? 'תוכנית אישית ל'+target.name : 'תוכנית קבוצתית') + ' נבנתה בהצלחה ✅\n'+
    'מטרה: '+a.goal+' · תדירות: '+freq+' בשבוע'+(a.injury && a.injury!=='לא' ? ' · בהתחשב ב: '+a.injury : '')+'.\n'+
    plan.weeks[0].map(function(d){return d.d+': '+d.t;}).join(' | ');
  return summary;
}

}
function wireFieldBoard(){
  var fieldPicker = document.getElementById('fieldPicker');
  if(fieldPicker) fieldPicker.onchange = function(){ CLUB_SELECTED_FIELD = fieldPicker.value; refreshFieldsUI(); };
  document.querySelectorAll('[data-fieldview]').forEach(function(btn){
    btn.onclick = function(){
      CLUB_FIELD_VIEW = btn.dataset.fieldview;
      CLUB_FIELD_WEEK_OFFSET = 0;
      CLUB_FIELD_MONTH_OFFSET = 0;
      if(CLUB_FIELD_VIEW==='daily') CLUB_FIELD_DAY = DAY_NAMES[new Date().getDay()];
      refreshFieldsUI();
    };
  });
  document.querySelectorAll('[data-fielddaytab]').forEach(function(btn){
    btn.onclick = function(){ CLUB_FIELD_DAY = btn.dataset.fielddaytab; refreshFieldsUI(); };
  });
  document.querySelectorAll('[data-fieldweeknav]').forEach(function(btn){
    btn.onclick = function(){ CLUB_FIELD_WEEK_OFFSET += parseInt(btn.dataset.fieldweeknav,10); refreshFieldsUI(); };
  });
  document.querySelectorAll('[data-fieldmonthnav]').forEach(function(btn){
    btn.onclick = function(){ CLUB_FIELD_MONTH_OFFSET += parseInt(btn.dataset.fieldmonthnav,10); refreshFieldsUI(); };
  });
  var addField = document.getElementById('btnAddField');
  if(addField) addField.onclick = openAddFieldModal;
  document.querySelectorAll('[data-delfield]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var id = btn.dataset.delfield;
      db.collection(P+'clubfields').doc(id).delete();
      CLUB_FIELDS = CLUB_FIELDS.filter(function(f){return f.id!==id;});
      CLUB_SCHEDULE = CLUB_SCHEDULE.filter(function(s){return s.fieldId!==id;});
      refreshFieldsUI();
    };
  });
  var addSch = document.getElementById('btnAddSchedule');
  if(addSch) addSch.onclick = openAddScheduleModal;
  document.querySelectorAll('[data-delsch]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var id = btn.dataset.delsch;
      db.collection(P+'clubschedule').doc(id).delete();
      CLUB_SCHEDULE = CLUB_SCHEDULE.filter(function(s){return s.id!==id;});
      refreshFieldsUI();
    };
  });
  document.querySelectorAll('[data-shiftday]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var parts = btn.dataset.shiftday.split(':');
      shiftClubSchedule(parts[0], parseInt(parts[1],10), 0);
    };
  });
  document.querySelectorAll('[data-shifttime]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var parts = btn.dataset.shifttime.split(':');
      shiftClubSchedule(parts[0], 0, parseInt(parts[1],10)/SLOT_MIN);
    };
  });
  document.querySelectorAll('[data-dragsch]').forEach(function(card){
    card.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/plain', card.dataset.dragsch);
    });
  });
  document.querySelectorAll('[data-droptime]').forEach(function(cell){
    cell.addEventListener('dragover', function(e){ e.preventDefault(); });
    cell.addEventListener('drop', function(e){
      e.preventDefault();
      var id = e.dataTransfer.getData('text/plain');
      var s = CLUB_SCHEDULE.filter(function(x){return x.id===id;})[0];
      if(!s) return;
      s.day = cell.dataset.dropday;
      s.start = cell.dataset.droptime;
      s.time = s.start+'-'+addMinutesToTime(s.start, s.duration||30);
      db.collection(P+'clubschedule').doc(id).set(s, {merge:true});
      refreshFieldsUI();
    });
    var lpTimer = null;
    var startLongPress = function(e){
      if(e.target !== cell) return;
      lpTimer = setTimeout(function(){
        lpTimer = null;
        openAddScheduleModal({fieldId: CLUB_SELECTED_FIELD, day: cell.dataset.dropday, start: cell.dataset.droptime});
      }, 500);
    };
    var cancelLongPress = function(){ if(lpTimer){ clearTimeout(lpTimer); lpTimer = null; } };
    cell.addEventListener('mousedown', startLongPress);
    cell.addEventListener('mouseup', cancelLongPress);
    cell.addEventListener('mouseleave', cancelLongPress);
    cell.addEventListener('touchstart', startLongPress, {passive:true});
    cell.addEventListener('touchend', cancelLongPress);
    cell.addEventListener('touchmove', cancelLongPress);
  });
}

/* ---------------- Firestore (profile sync) ---------------- */
function syncProfile(){
  if(!ME.uid) return;
  db.collection(P+'profiles').doc(ME.uid).set({
    name:ME.name, sport:ME.sport, mode:ME.mode, plan:ME.plan, updatedAt:Date.now()
  }, {merge:true});
}
