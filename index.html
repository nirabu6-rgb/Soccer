<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>תקציב משפחתי 💰</title>
<style>
:root{
  --bg:#f1f5f9;--card:#fff;--hdr:#0f172a;
  --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;
  --blue:#2563eb;--blue-bg:#dbeafe;--gold:#d97706;--gold-bg:#fef3c7;
  --purple:#7c3aed;--purple-bg:#ede9fe;--teal:#0891b2;--teal-bg:#cffafe;
  --orange:#ea580c;--orange-bg:#ffedd5;--pink:#db2777;--pink-bg:#fce7f3;
  --text:#0f172a;--label2:#475569;--label3:#94a3b8;--sep:#e2e8f0;
  --shadow:0 1px 8px rgba(0,0,0,.08);--radius:14px;--nav:62px;--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{height:100%;height:-webkit-fill-available;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow:hidden}
/* SPLASH */
#splash{position:fixed;inset:0;background:var(--hdr);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#splash .ico{font-size:4rem}
#splash .ttl{color:#fff;font-size:1.5rem;font-weight:800}
#splash .sub{color:#94a3b8;font-size:.9rem}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--hdr);display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:900}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:32px;width:100%;max-width:360px;text-align:center}
.login-ico{font-size:3.5rem;margin-bottom:12px}
.login-title{color:#fff;font-size:1.4rem;font-weight:800;margin-bottom:6px}
.login-sub{color:#94a3b8;font-size:.88rem;margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:1rem;text-align:right;margin-bottom:12px}
.login-input::placeholder{color:#94a3b8}
.login-input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
/* APP */
#app{display:none;height:100vh;height:-webkit-fill-available;flex-direction:column}
.app-hdr{background:var(--hdr);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-hdr-title{font-size:1rem;font-weight:800}
.app-hdr-sub{font-size:.72rem;color:#94a3b8;margin-top:1px}
.app-hdr-right{display:flex;align-items:center;gap:8px}
.user-dot{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;cursor:pointer;color:#fff}
.content{flex:1;overflow-y:auto;padding:14px 14px calc(var(--nav) + var(--sab) + 14px);-webkit-overflow-scrolling:touch}
/* NAV */
.nav{height:calc(var(--nav) + var(--sab));padding-bottom:var(--sab);background:var(--card);border-top:1px solid var(--sep);display:flex;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.63rem;font-weight:600;color:var(--label3);background:none;border:none;cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn.active .nav-ico{transform:scale(1.1)}
.nav-ico{font-size:1.3rem;transition:transform .15s}
/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-ttl{font-size:.82rem;font-weight:700;color:var(--label2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
/* PERIOD BAR */
.seg-bar{display:flex;background:var(--sep);border-radius:10px;padding:3px;margin-bottom:14px}
.seg-btn{flex:1;padding:7px 4px;border:none;background:none;border-radius:8px;font-size:.8rem;font-weight:600;color:var(--label2);cursor:pointer;transition:all .15s;white-space:nowrap}
.seg-btn.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* SUMMARY GRID */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.kpi.full{grid-column:1/-1}
.kpi-ico{font-size:1.3rem;margin-bottom:5px}
.kpi-val{font-size:1.45rem;font-weight:800;line-height:1}
.kpi-lbl{font-size:.7rem;color:var(--label3);margin-top:3px;font-weight:600}
.kpi.g{border-top:3px solid var(--green)}
.kpi.r{border-top:3px solid var(--red)}
.kpi.b{border-top:3px solid var(--blue)}
/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.month-nav-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--blue);padding:4px 8px;border-radius:8px}
.month-nav-btn:active{background:var(--blue-bg)}
.month-nav-lbl{font-size:.95rem;font-weight:800;color:var(--text)}
/* PERSON TABS */
.person-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.person-tabs{display:flex;background:var(--sep);border-radius:10px;padding:3px;flex:1}
.person-tab{flex:1;padding:7px 4px;border:none;background:none;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--label2);cursor:pointer;transition:all .15s;white-space:nowrap}
.person-tab.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.icon-btn{background:var(--sep);border:none;border-radius:8px;padding:8px 10px;font-size:.9rem;cursor:pointer;flex-shrink:0}
/* FILTER CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:4px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--sep);font-size:.76rem;font-weight:600;cursor:pointer;background:#fff;color:var(--label2);white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
/* SEC HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:4px 0 8px}
.sec-ttl{font-size:.88rem;font-weight:700;color:var(--label2)}
.add-btn{background:var(--blue);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer}
.add-btn.red{background:var(--red)}
/* ENTRY LIST */
.elist{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px}
.eitem{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--sep);cursor:pointer;transition:background .1s}
.eitem:last-child{border-bottom:none}
.eitem:active{background:#f8fafc}
.eico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-left:10px;flex-shrink:0}
.ebody{flex:1;min-width:0}
.edesc{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:.7rem;color:var(--label3);margin-top:2px}
.eamt{font-weight:700;font-size:.92rem;flex-shrink:0}
.inc-c{color:var(--green)}
.exp-c{color:var(--red)}
/* GROUP HEADER */
.grp-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 4px;font-size:.78rem;font-weight:700;color:var(--label2)}
/* INSTALLMENT */
.inst-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.prog-bar{height:6px;background:var(--sep);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px}
.prog-fill.act{background:var(--blue)}
.prog-fill.done{background:var(--green)}
/* FIXED ITEM */
.fitem{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--sep)}
.fitem:last-child{border-bottom:none}
.fday{width:34px;height:34px;border-radius:8px;background:var(--gold-bg);color:var(--gold);font-size:.78rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin-left:10px;flex-shrink:0}
.tog{width:44px;height:24px;background:var(--sep);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;margin-right:8px;flex-shrink:0}
.tog.on{background:var(--green)}
.tog::after{content:'';position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(-20px)}
/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;padding:0 4px;margin-bottom:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px}
.bar{width:45%;border-radius:4px 4px 0 0;min-height:3px}
.bar.gi{background:var(--green)}
.bar.re{background:var(--red)}
.bar-lbl{font-size:.56rem;color:var(--label3);font-weight:600}
/* HBAR */
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hbar-ico{font-size:.95rem;width:22px;text-align:center;flex-shrink:0}
.hbar-lbl{font-size:.74rem;font-weight:600;width:70px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-bg{flex:1;height:8px;background:var(--sep);border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;transition:width .4s}
.hbar-amt{font-size:.72rem;font-weight:700;width:62px;text-align:left;flex-shrink:0}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--sep);border-radius:2px;margin:0 auto 20px}
.modal-ttl{font-size:1.1rem;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.mcls{font-size:1.2rem;color:var(--label3);background:none;border:none;cursor:pointer;padding:4px}
.fg{margin-bottom:14px}
.fl{font-size:.8rem;font-weight:700;color:var(--label2);margin-bottom:6px;display:block}
.fi{width:100%;padding:12px 14px;border:1.5px solid var(--sep);border-radius:10px;font-size:.95rem;color:var(--text);background:#fff;direction:rtl;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-scroll{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.cpill{padding:6px 12px;border-radius:20px;border:1.5px solid var(--sep);font-size:.76rem;font-weight:600;cursor:pointer;background:#fff;color:var(--label2);white-space:nowrap;transition:all .15s}
.cpill.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.bp{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px}
.bd{background:var(--red)}
.brow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.brow .bp{margin-top:0}
/* EMPTY */
.empty{text-align:center;padding:28px 16px;color:var(--label3)}
.empty-ico{font-size:2.2rem;margin-bottom:6px}
/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* CASHFLOW */
.cf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--sep)}
.cf-row:last-child{border-bottom:none}
.cf-lbl{font-size:.82rem;font-weight:600;color:var(--label2)}
.cf-sub{font-size:.68rem;color:var(--label3)}
.cf-amt{font-size:.9rem;font-weight:700}
/* DESKTOP */
@media(min-width:680px){
  .content{max-width:640px;margin:0 auto}
  .kpi-grid{grid-template-columns:1fr 1fr 1fr}
  .modal-overlay{align-items:center}
  .modal-sheet{border-radius:20px;max-width:460px;margin:0 auto;max-height:85vh}
}
</style>
</head>
<body>

<div id="splash"><div class="ico">💰</div><div class="ttl">תקציב משפחתי</div><div class="sub">טוען...</div><div class="spinner"></div></div>

<div id="loginScreen">
  <div class="login-box">

    <input type="text" id="loginName" class="login-input" placeholder="שם פרטי..." maxlength="20">

</div>

<div id="app">

    <div class="brow" id="iBtns"><button class="bp" onclick="saveInc()">שמור</button></div>
  </div>
</div>

<!-- Expense Modal -->
<div class="modal-overlay" id="mExp">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-ttl"><span id="mExpTtl">➕ הוצאה חדשה</span><button class="mcls" onclick="cm('mExp')">✕</button></div>
    <div class="fg"><label class="fl">תיאור</label><input type="text" id="eDesc" class="fi" placeholder="לדוגמה: קניות"></div>
    <div class="frow">
      <div class="fg"><label class="fl">סכום (₪)</label><input type="number" id="eAmt" class="fi" placeholder="0" min="0"></div>
      <div class="fg"><label class="fl">תאריך</label><input type="date" id="eDate" class="fi"></div>
    </div>
    <div class="fg"><label class="fl">קטגוריה</label><div class="cat-scroll" id="eCatPills"></div></div>
    <div class="fg"><label class="fl">אמצעי תשלום</label><div class="cat-scroll" id="ePayPills"></div></div>
    <div class="brow" id="eBtns"><button class="bp bd" onclick="saveExp()">שמור</button></div>
  </div>
</div>

<!-- Installment Modal -->
<div class="modal-overlay" id="mInst">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-ttl"><span id="mInstTtl">💳 תשלומים</span><button class="mcls" onclick="cm('mInst')">✕</button></div>
    <div class="fg"><label class="fl">שם הרכישה</label><input type="text" id="inName" class="fi"></div>
    <div class="frow">
      <div class="fg"><label class="fl">סכום כולל (₪)</label><input type="number" id="inTotal" class="fi" oninput="calcPrev()"></div>

      <span id="inPrevAmt" style="font-size:1.1rem;font-weight:800;color:var(--blue)"></span>
    </div>
    <div class="brow" id="inBtns"><button class="bp" onclick="saveInst()">שמור</button></div>
  </div>
</div>

<!-- Fixed Modal -->
<div class="modal-overlay" id="mFixed">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-ttl"><span id="mFixedTtl">📌 הוצאה קבועה</span><button class="mcls" onclick="cm('mFixed')">✕</button></div>
    <div class="fg"><label class="fl">שם</label><input type="text" id="fxName" class="fi" placeholder="לדוגמה: שכר דירה"></div>

      <div class="fg"><label class="fl">סכום חודשי (₪)</label><input type="number" id="fxAmt" class="fi" placeholder="0"></div>
      <div class="fg"><label class="fl">יום בחודש</label><input type="number" id="fxDay" class="fi" min="1" max="31" placeholder="1"></div>
    </div>
    <div class="fg"><label class="fl">קטגוריה</label><div class="cat-scroll" id="fxCatPills"></div></div>
    <div class="brow" id="fxBtns"><button class="bp bd" onclick="saveFixed()">שמור</button></div>
  </div>
</div>

<!-- Names Modal -->
<div class="modal-overlay" id="mNames">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-ttl"><span>✏️ עריכת שמות</span><button class="mcls" onclick="cm('mNames')">✕</button></div>
    <div class="fg"><label class="fl">שם אדם 1</label><input type="text" id="np1" class="fi" maxlength="20"></div>
    <div class="fg"><label class="fl">שם אדם 2</label><input type="text" id="np2" class="fi" maxlength="20"></div>
    <button class="bp" onclick="saveNames()">שמור</button>
  </div>
</div>

<div id="toast"></div>

  db.collection('bud_fixed').onSnapshot(function(s){FIXED=[];s.forEach(function(d){FIXED.push(Object.assign({id:d.id},d.data()));});FIXED.sort(function(a,b){return (a.day||1)-(b.day||1);});render();});
  db.collection('bud_installments').onSnapshot(function(s){INSTS=[];s.forEach(function(d){INSTS.push(Object.assign({id:d.id},d.data()));});render();});

// ─── HELPERS ───
function today(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function thisMonth(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1);}
function thisYear(){return new Date().getFullYear()+'';}
function p2(n){return n<10?'0'+n:''+n;}
function fmtD(ds){var d=new Date(ds+'T12:00:00');var m=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];return d.getDate()+' '+m[d.getMonth()];}
function fmtM(ym){var p=ym.split('-');var m=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];return m[+p[1]-1]+' '+p[0];}
function fmtA(n){return '₪'+Math.abs(n).toLocaleString('he-IL',{maximumFractionDigits:0});}
function ymDiff(a,b){var x=a.split('-'),y=b.split('-');return (+y[0]-+x[0])*12+(+y[1]-+x[1]);}
function addM(ym,n){var p=ym.split('-');var d=new Date(+p[0],+p[1]-1+n,1);return d.getFullYear()+'-'+p2(d.getMonth()+1);}
function inPeriod(ds,period){if(period==='day')return ds===today();if(period==='month')return ds.startsWith(thisMonth());if(period==='year')return ds.startsWith(thisYear());return true;}
function matchWho(e,pf){if(pf==='all')return true;var w=e.who||'';if(pf==='p1')return w===NAMES.p1||w==='p1';if(pf==='p2')return w===NAMES.p2||w==='p2';return true;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── CALC P&L ───
function calcPL(period){
  var inc=INCOME.filter(function(x){return inPeriod(x.date,period);}).reduce(function(s,x){return s+(+x.amount||0);},0);
  var exp=EXPENSES.filter(function(x){return inPeriod(x.date,period);}).reduce(function(s,x){return s+(+x.amount||0);},0);
  var fx=0,curYM=thisMonth();
  var actFx=FIXED.filter(function(f){return f.active!==false;});
  if(period==='month')actFx.forEach(function(f){fx+=(+f.amount||0);});
  else if(period==='year')actFx.forEach(function(f){fx+=(+f.amount||0)*12;});
  var ins=0;
  INSTS.forEach(function(inst){
    if(!inst.startYM||!inst.n)return;
    var d=ymDiff(inst.startYM,curYM);
    if(d<0||d>=inst.n)return;
    var ma=+(inst.amountPer)||0;
    if(period==='month')ins+=ma;
    else if(period==='year'){var yr=+thisYear(),ac=0;for(var m=1;m<=12;m++){var ym2=yr+'-'+p2(m);var dd=ymDiff(inst.startYM,ym2);if(dd>=0&&dd<inst.n)ac++;}ins+=ma*ac;}
  });
  var totExp=exp+fx+ins;
  return {inc:inc,exp:exp,fx:fx,ins:ins,totExp:totExp,bal:inc-totExp};
}

    html+='<div class="sec-hdr"><span class="sec-ttl">📌 הוצאות קבועות</span><div style="display:flex;align-items:center;gap:8px">';
    if(fxTotal>0)html+='<span style="color:var(--red);font-weight:700;font-size:.82rem">'+fmtA(fxTotal)+'/חודש</span>';
    html+='<button class="add-btn red" onclick="openAddFixed()">+</button></div></div>';
    if(FIXED.length===0){
      html+='<div class="empty"><div class="empty-ico">📌</div><div style="font-size:.84rem">אין הוצאות קבועות</div></div>';
    } else {
      html+='<div class="elist">';
      FIXED.forEach(function(f){
        var cat=EXP_CATS.find(function(c){return c.id===f.cat;})||EXP_CATS[EXP_CATS.length-1];
        var isOn=f.active!==false;
        html+='<div class="fitem" onclick="openEditFixed(\''+f.id+'\')">'+
          '<div class="fday">'+p2(f.day||1)+'</div>'+
          '<div class="eico" style="background:'+cat.bg+';color:'+cat.c+'">'+cat.ico+'</div>'+
          '<div class="ebody"><div class="edesc">'+esc(f.name||'')+'</div><div class="emeta">'+cat.label+' · יום '+p2(f.day||1)+'</div></div>'+
          '<div style="font-weight:700;font-size:.9rem;color:'+(isOn?'var(--red)':'var(--label3)')+'">'+fmtA(f.amount)+'</div>'+
          '<div class="tog'+(isOn?' on':'')+'" onclick="event.stopPropagation();togFixed(\''+f.id+'\','+isOn+')"></div>'+
        '</div>';
      });
      html+='</div>';
    }
  }

  // INSTALLMENTS section
  if(expType==='installment'||expType==='all'){
    var curInsts=INSTS.filter(function(x){var d=ymDiff(x.startYM,curYM2);return d>=0&&d<x.n;});
    var insTotal=curInsts.reduce(function(s,x){return s+(+x.amountPer||0);},0);
    html+='<div class="sec-hdr"><span class="sec-ttl">💳 תשלומים פעילים</span><div style="display:flex;align-items:center;gap:8px">';
    if(insTotal>0)html+='<span style="color:var(--blue);font-weight:700;font-size:.82rem">'+fmtA(insTotal)+'/חודש</span>';
    html+='<button class="add-btn" onclick="openAddInst()">+</button></div></div>';
    if(INSTS.length===0){
      html+='<div class="empty"><div class="empty-ico">💳</div><div style="font-size:.84rem">אין תשלומים</div></div>';
    } else {
      INSTS.forEach(function(inst){
        if(!inst.startYM||!inst.n)return;
        var d=ymDiff(inst.startYM,curYM2);
        var paid=Math.min(Math.max(0,d),inst.n);
        var isDone=paid>=inst.n;
        var pct=Math.round((paid/inst.n)*100);
        html+='<div class="inst-card" onclick="openEditInst(\''+inst.id+'\')">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
            '<div><div style="font-weight:700;font-size:.9rem">'+esc(inst.name||'')+'</div>'+
            '<div style="font-size:.7rem;color:var(--label3);margin-top:2px">'+fmtM(inst.startYM)+' — '+fmtM(addM(inst.startYM,inst.n-1))+'</div></div>'+
            '<div style="text-align:left"><div style="font-weight:700;color:var(--blue)">'+fmtA(inst.amountPer)+'/חודש</div>'+
            '<div style="font-size:.68rem;color:var(--label3)">'+paid+'/'+inst.n+' שולם</div></div>'+
          '</div>'+
          '<div class="prog-bar"><div class="prog-fill '+(isDone?'done':'act')+'" style="width:'+pct+'%"></div></div>'+
          '<div style="font-size:.68rem;color:var(--label3);margin-top:4px;text-align:left">'+pct+'% · נשאר '+fmtA((inst.n-paid)*(+inst.amountPer||0))+'</div>'+
        '</div>';
      });
    }
  }

  // VARIABLE EXPENSES section
  if(expType==='variable'||expType==='all'){
    var varExp=EXPENSES.filter(function(x){return x.date.startsWith(viewYM)&&(expCat==='all'||x.cat===expCat);});
    var varTotal=varExp.reduce(function(s,x){return s+(+x.amount||0);},0);
    html+='<div class="sec-hdr"><span class="sec-ttl">🛒 הוצאות משתנות</span><div style="display:flex;align-items:center;gap:8px">';
    if(varTotal>0)html+='<span style="color:var(--red);font-weight:700;font-size:.82rem">-'+fmtA(varTotal)+'</span>';
    html+='<button class="add-btn red" onclick="openAddExp()">+</button></div></div>';
    if(varExp.length===0){
      html+='<div class="empty"><div class="empty-ico">🛒</div><div style="font-size:.84rem">אין הוצאות '+(expCat!=='all'?'בקטגוריה זו ':'')+' ב'+fmtM(viewYM)+'</div></div>';
    } else {
      html+='<div class="elist">';
      varExp.forEach(function(e){
        var cat=EXP_CATS.find(function(c){return c.id===e.cat;})||EXP_CATS[EXP_CATS.length-1];
        html+='<div class="eitem" onclick="openEditEntry(\'e\',\''+e.id+'\')">'+
          '<div class="eico" style="background:'+cat.bg+';color:'+cat.c+'">'+cat.ico+'</div>'+
          '<div class="ebody"><div class="edesc">'+esc(e.desc||cat.label)+'</div><div class="emeta">'+fmtD(e.date)+' · '+cat.label+payBadge(e.payMethod)+'</div></div>'+
          '<div class="eamt exp-c">-'+fmtA(e.amount)+'</div></div>';
      });
      html+='</div>';
    }
  }
  c.innerHTML=html;
}

// ─── CHARTS TAB ───
function renderCharts(c){
  var html='';
  html+='<div class="seg-bar"><button class="seg-btn'+(PERIOD==='month'?' active':'')+'" onclick="setPeriod(\'month\')">חודש</button><button class="seg-btn'+(PERIOD==='year'?' active':'')+'" onclick="setPeriod(\'year\')">שנה</button></div>';

  // Cash flow table
  var pl=calcPL(PERIOD);
  html+='<div class="card"><div class="card-ttl">תזרים — '+getPLabel(PERIOD)+'</div>';
  html+='<div class="cf-row"><div><div class="cf-lbl">💚 הכנסות</div></div><div class="cf-amt inc-c">+'+fmtA(pl.inc)+'</div></div>';
  html+='<div class="cf-row"><div><div class="cf-lbl">🛒 הוצאות שוטפות</div></div><div class="cf-amt exp-c">-'+fmtA(pl.exp)+'</div></div>';
  if(pl.fx>0)html+='<div class="cf-row"><div><div class="cf-lbl">📌 קבועות</div></div><div class="cf-amt exp-c">-'+fmtA(pl.fx)+'</div></div>';
  if(pl.ins>0)html+='<div class="cf-row"><div><div class="cf-lbl">💳 תשלומים</div></div><div class="cf-amt exp-c">-'+fmtA(pl.ins)+'</div></div>';
  html+='<div class="cf-row" style="border-top:2px solid var(--sep);margin-top:4px;padding-top:12px"><div><div class="cf-lbl" style="font-size:.9rem;font-weight:800">'+(pl.bal>=0?'✅ עודף':'⚠️ גירעון')+'</div></div><div class="cf-amt" style="font-size:1.05rem;color:'+(pl.bal>=0?'var(--green)':'var(--red)')+'">'+fmtA(pl.bal)+'</div></div>';
  html+='</div>';

  // Expense category breakdown
  var expF=EXPENSES.filter(function(x){return inPeriod(x.date,PERIOD);});
  if(expF.length>0){
    var byCat={};
    expF.forEach(function(x){var k=x.cat||'other_ex';byCat[k]=(byCat[k]||0)+(+x.amount||0);});
    var mx=Math.max.apply(null,Object.values(byCat));
    var sorted=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];});
    html+='<div class="card"><div class="card-ttl">הוצאות לפי קטגוריה</div>';
    sorted.forEach(function(cid){
      var cat=EXP_CATS.find(function(c){return c.id===cid;})||EXP_CATS[EXP_CATS.length-1];
      var pct=mx>0?Math.round((byCat[cid]/mx)*100):0;
      html+='<div class="hbar-row"><div class="hbar-ico">'+cat.ico+'</div><div class="hbar-lbl">'+cat.label+'</div><div class="hbar-bg"><div class="hbar-fill" style="width:'+pct+'%;background:'+cat.c+'"></div></div><div class="hbar-amt exp-c">'+fmtA(byCat[cid])+'</div></div>';
    });
    html+='</div>';
  }

  // Income category breakdown
  var incF=INCOME.filter(function(x){return inPeriod(x.date,PERIOD);});
  if(incF.length>0){
    var byCatI={};
    incF.forEach(function(x){var k=x.cat||'other_in';byCatI[k]=(byCatI[k]||0)+(+x.amount||0);});
    var mxI=Math.max.apply(null,Object.values(byCatI));
    var sortedI=Object.keys(byCatI).sort(function(a,b){return byCatI[b]-byCatI[a];});
    html+='<div class="card"><div class="card-ttl">הכנסות לפי קטגוריה</div>';
    sortedI.forEach(function(cid){
      var cat=INC_CATS.find(function(c){return c.id===cid;})||INC_CATS[INC_CATS.length-1];
      var pct=mxI>0?Math.round((byCatI[cid]/mxI)*100):0;
      html+='<div class="hbar-row"><div class="hbar-ico">'+cat.ico+'</div><div class="hbar-lbl">'+cat.label+'</div><div class="hbar-bg"><div class="hbar-fill" style="width:'+pct+'%;background:'+cat.c+'"></div></div><div class="hbar-amt inc-c">'+fmtA(byCatI[cid])+'</div></div>';
    });
    html+='</div>';
  }

  // Person comparison
  var p1i=INCOME.filter(function(x){return inPeriod(x.date,PERIOD)&&matchWho(x,'p1');}).reduce(function(s,x){return s+(+x.amount||0);},0);
  var p2i=INCOME.filter(function(x){return inPeriod(x.date,PERIOD)&&matchWho(x,'p2');}).reduce(function(s,x){return s+(+x.amount||0);},0);
  if(p1i+p2i>0){
    html+='<div class="card"><div class="card-ttl">השוואת הכנסות</div>';
    var pmx=Math.max(p1i,p2i);
    html+='<div class="hbar-row"><div class="hbar-ico">👤</div><div class="hbar-lbl">'+esc(NAMES.p1)+'</div><div class="hbar-bg"><div class="hbar-fill" style="width:'+Math.round((p1i/pmx)*100)+'%;background:var(--green)"></div></div><div class="hbar-amt inc-c">'+fmtA(p1i)+'</div></div>';
    html+='<div class="hbar-row"><div class="hbar-ico">👤</div><div class="hbar-lbl">'+esc(NAMES.p2)+'</div><div class="hbar-bg"><div class="hbar-fill" style="width:'+Math.round((p2i/pmx)*100)+'%;background:var(--blue)"></div></div><div class="hbar-amt" style="color:var(--blue)">'+fmtA(p2i)+'</div></div>';
    html+='</div>';
  }

  // Year bar chart
  if(PERIOD==='year'){html+=renderYearChart();}

  c.innerHTML=html;
}

function renderYearChart(){
  var months=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  var yr=+thisYear(),mx=0;
  var data=months.map(function(_,i){
    var ym=yr+'-'+p2(i+1);
    var inc=INCOME.filter(function(x){return x.date.startsWith(ym);}).reduce(function(s,x){return s+(+x.amount||0);},0);
    var exp=EXPENSES.filter(function(x){return x.date.startsWith(ym);}).reduce(function(s,x){return s+(+x.amount||0);},0);
    var fx=FIXED.filter(function(f){return f.active!==false;}).reduce(function(s,f){return s+(+f.amount||0);},0);
    var ins=0;INSTS.forEach(function(inst){if(!inst.startYM||!inst.n)return;var d=ymDiff(inst.startYM,ym);if(d>=0&&d<inst.n)ins+=(+inst.amountPer||0);});
    var te=exp+fx+ins;mx=Math.max(mx,inc,te);
    return {inc:inc,exp:te,lbl:months[i]};
  });
  if(!mx)return '';
  var html='<div class="card"><div class="card-ttl">גרף שנתי</div><div class="bar-chart">';
  data.forEach(function(d){
    html+='<div class="bar-col"><div class="bar-wrap"><div class="bar gi" style="height:'+Math.round((d.inc/mx)*80)+'px"></div><div class="bar re" style="height:'+Math.round((d.exp/mx)*80)+'px"></div></div><div class="bar-lbl">'+d.lbl+'</div></div>';
  });
  html+='</div><div style="display:flex;gap:12px;margin-top:8px;font-size:.72rem;font-weight:600"><span style="color:var(--green)">■ הכנסות</span><span style="color:var(--red)">■ הוצאות</span></div></div>';
  return html;
}

function buildPills(cid,cats,sel,onsel){
  var el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  cats.forEach(function(cat){
    var p=document.createElement('div');p.className='cpill'+(cat.id===sel?' sel':'');
    p.innerHTML=(cat.ico||'')+' '+(cat.label||cat.id);
    p.onclick=function(){onsel(cat.id);el.querySelectorAll('.cpill').forEach(function(x){x.classList.remove('sel');});p.classList.add('sel');};
    el.appendChild(p);
  });
}

function saveFixed(){
  var name=document.getElementById('fxName').value.trim();
  var amt=+document.getElementById('fxAmt').value;
  var day=+document.getElementById('fxDay').value||1;
  if(!name||!amt){toast('נא למלא שם וסכום');return;}
  var data={name:name,amount:amt,day:Math.max(1,Math.min(31,day)),cat:selFixCat,active:true};
  if(!db){toast('אין חיבור לשרת');return;}
  if(editId)db.collection('bud_fixed').doc(editId).update(data).then(function(){toast('עודכן ✓');cm('mFixed');});
  else db.collection('bud_fixed').add(data).then(function(){toast('נשמר ✓');cm('mFixed');});
}

// ─── DELETE ───
function delEntry(type,id){
  if(!confirm('למחוק?'))return;
  var col=type==='i'?'bud_income':'bud_expenses';
  db.collection(col).doc(id).delete().then(function(){toast('נמחק');cm(type==='i'?'mInc':'mExp');});
}
function delInst(id){if(!confirm('למחוק?'))return;db.collection('bud_installments').doc(id).delete().then(function(){toast('נמחק');cm('mInst');});}
function delFixed(id){if(!confirm('למחוק?'))return;db.collection('bud_fixed').doc(id).delete().then(function(){toast('נמחק');cm('mFixed');});}

// ─── TOAST ───
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function payBadge(method){if(!method)return '';var m=PAY_METHODS.find(function(p){return p.id===method;});return m?' · '+m.ico+' '+m.label:'';}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
