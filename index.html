<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FootballCoach</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#f5f6f8;--card:#ffffff;--card2:#eef0f3;--accent:#22b8d8;--accent2:#0ea5b8;--good:#34d399;--warn:#fbbf24;--bad:#f87171;--text:#1c2230;--sub:#6b7280;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.screen{min-height:100vh;display:flex;flex-direction:column}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{width:100%;max-width:380px;background:var(--card);border-radius:16px;padding:24px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
.box h1{font-size:22px;margin:0 0 6px;text-align:center}
.box p.sub{color:var(--sub);text-align:center;margin:0 0 18px;font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--sub);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid #dde1e7;border-radius:10px;font-size:15px;background:#fff;color:var(--text)}
.btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.btn.ghost{background:transparent;border:1px solid var(--accent);color:var(--accent2)}
.btn.sm{padding:7px 10px;font-size:12px;width:auto;display:inline-block}
.err{color:var(--bad);font-size:13px;margin-top:8px;display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid #e3e6ec}
.topbar b{font-size:16px}
.content{flex:1;padding:14px 16px 90px;overflow-y:auto}
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid #e3e6ec}
.nav-btn{flex:1;border:none;background:none;padding:10px 0;font-size:11px;color:var(--sub);cursor:pointer}
.nav-btn .ic{font-size:20px;margin-bottom:2px}
.nav-btn.sel{color:var(--accent2);font-weight:700}
.section-title{font-size:18px;font-weight:700;margin:6px 0 12px}
.card{background:var(--card);border:1px solid #e3e6ec;border-radius:14px;padding:14px;margin-bottom:12px}
.muted{color:var(--sub);font-size:13px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pitch-wrap{background:var(--card);border-radius:14px;padding:10px;margin-bottom:12px;overflow:hidden}
#pitchSvg{width:100%;height:auto;touch-action:none;background:#2e9e4f;border-radius:10px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.toolbar button{flex:1;min-width:90px;padding:9px 6px;border-radius:8px;border:1px solid #dde1e7;background:#fff;font-size:12px;cursor:pointer}
.toolbar button.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.drill-card{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:10px;padding:8px;margin-bottom:8px}
.drill-card svg{width:60px;height:40px;background:#2e9e4f;border-radius:6px;flex:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.logout-btn{background:transparent;border:none;font-size:16px;cursor:pointer;padding:2px 6px}
</style>
</head>
<body>

<div class="screen" id="loginScreen">
  <div class="center">
    <div class="box">
      <h1>⚽ FootballCoach</h1>
      <p class="sub">כניסה למאמנים ומנהלים מקצועיים</p>
      <div id="stepPhone">
        <div class="field"><label>מספר טלפון</label><input id="phoneInput" type="tel" placeholder="05XXXXXXXX"></div>
        <button class="btn" id="btnSendCode">שלח קוד אימות</button>
        <div class="err" id="phoneErr">אירעה שגיאה בשליחת הקוד. בדוק את המספר ונסה שוב.</div>
      </div>
      <div id="stepCode" style="display:none">
        <div class="field"><label>קוד אימות שנשלח אליך ב-SMS</label><input id="codeInput" type="tel" placeholder="123456" maxlength="6"></div>
        <button class="btn" id="btnVerifyCode">אישור קוד</button>
        <button class="btn ghost" id="btnBackPhone" style="margin-top:8px">חזרה</button>
        <div class="err" id="codeErr">קוד שגוי, נסה שוב.</div>
      </div>
      <div id="stepProfile" style="display:none">
        <div class="field"><label>שם מלא</label><input id="profNameInput" placeholder="שם מלא"></div>
        <div class="field"><label>תפקיד</label><select id="profRoleInput">
          <option value="coach">מאמן</option>
          <option value="manager">מנהל מקצועי</option>
        </select></div>
        <button class="btn" id="btnSaveProfile">המשך לאפליקציה</button>
      </div>
      <div id="recaptcha-container"></div>
    </div>
  </div>
</div>

<div class="screen" id="appScreen" style="display:none">
  <div class="topbar">
    <div><b id="hdrName">-</b><div class="muted" id="hdrRole" style="font-size:12px"></div></div>
    <button class="logout-btn" id="btnLogout" title="התנתקות">🚪</button>
  </div>
  <div class="content" id="content"></div>
  <div class="navbar" id="navBar"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

<script>
var firebaseConfig = {apiKey:"AIzaSyBKOCyFdiy95SxddD_Iy6Gkq4aBsqkrFdE",authDomain:"soccer-26e99.firebaseapp.com",projectId:"soccer-26e99",storageBucket:"soccer-26e99.firebasestorage.app",messagingSenderId:"870862038298",appId:"1:870862038298:web:a58fde35acf1e79b9738a3"};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();
var P = 'fc_';

var ME = {uid:'', phone:'', name:'', role:'coach'};
var TAB = 0;
var NAV_TABS = [
  {id:0, ic:'📋', t:'תוכניות אימון'},
  {id:1, ic:'⚙️', t:'הגדרות'}
];
var TRAINING_PLANS = [];
var TRAINING_PLANS_LOADED = false;
var confirmationResult = null;

/* ---------------- Auth: phone + OTP ---------------- */
function setupRecaptcha(){
  if(window.recaptchaVerifier) return;
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size:'invisible'});
}
document.getElementById('btnSendCode').onclick = function(){
  var phone = document.getElementById('phoneInput').value.trim();
  if(!phone){ return; }
  var formatted = phone.charAt(0)==='+' ? phone : ('+972'+phone.replace(/^0/,''));
  document.getElementById('phoneErr').style.display = 'none';
  setupRecaptcha();
  auth.signInWithPhoneNumber(formatted, window.recaptchaVerifier).then(function(result){
    confirmationResult = result;
    document.getElementById('stepPhone').style.display = 'none';
    document.getElementById('stepCode').style.display = 'block';
  }).catch(function(err){
    console.error(err);
    document.getElementById('phoneErr').style.display = 'block';
  });
};
document.getElementById('btnBackPhone').onclick = function(){
  document.getElementById('stepCode').style.display = 'none';
  document.getElementById('stepPhone').style.display = 'block';
};
document.getElementById('btnVerifyCode').onclick = function(){
  var code = document.getElementById('codeInput').value.trim();
  if(!code || !confirmationResult) return;
  document.getElementById('codeErr').style.display = 'none';
  confirmationResult.confirm(code).then(function(result){
    ME.uid = result.user.uid;
    ME.phone = result.user.phoneNumber || '';
    db.collection(P+'coaches').doc(ME.uid).get().then(function(doc){
      if(doc.exists){
        var data = doc.data();
        ME.name = data.name;
        ME.role = data.role;
        enterApp();
      } else {
        document.getElementById('stepCode').style.display = 'none';
        document.getElementById('stepProfile').style.display = 'block';
      }
    });
  }).catch(function(err){
    console.error(err);
    document.getElementById('codeErr').style.display = 'block';
  });
};
document.getElementById('btnSaveProfile').onclick = function(){
  var n = document.getElementById('profNameInput').value.trim();
  if(!n) return;
  ME.name = n;
  ME.role = document.getElementById('profRoleInput').value;
  db.collection(P+'coaches').doc(ME.uid).set({uid:ME.uid, phone:ME.phone, name:ME.name, role:ME.role}).then(function(){
    enterApp();
  });
};
document.getElementById('btnLogout').onclick = function(){
  auth.signOut().then(function(){
    ME = {uid:'', phone:'', name:'', role:'coach'};
    TRAINING_PLANS = []; TRAINING_PLANS_LOADED = false;
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('stepPhone').style.display = 'block';
    document.getElementById('stepCode').style.display = 'none';
    document.getElementById('stepProfile').style.display = 'none';
    document.getElementById('phoneInput').value = '';
    document.getElementById('codeInput').value = '';
  });
};
auth.onAuthStateChanged(function(user){
  if(user && !ME.uid){
    ME.uid = user.uid;
    ME.phone = user.phoneNumber || '';
    db.collection(P+'coaches').doc(ME.uid).get().then(function(doc){
      if(doc.exists){
        var data = doc.data();
        ME.name = data.name;
        ME.role = data.role;
        enterApp();
      }
    });
  }
});

/* ---------------- TEMP: login disabled, auto-enter with local profile ----------------
   Phone OTP login is built but disabled for now (Firebase Phone provider / billing
   not yet enabled) -- re-enable by removing this block once it's ready. */
var LOGIN_DISABLED = true;
if(LOGIN_DISABLED){
  ME.uid = localStorage.getItem('fc_uid') || ('local_' + Math.random().toString(36).slice(2,10));
  ME.name = localStorage.getItem('fc_name') || 'מאמן';
  ME.role = localStorage.getItem('fc_role') || 'coach';
  localStorage.setItem('fc_uid', ME.uid);
  localStorage.setItem('fc_name', ME.name);
  localStorage.setItem('fc_role', ME.role);
  enterApp();
}

function roleLabel(r){ return r==='manager' ? 'מנהל מקצועי' : 'מאמן'; }
function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('hdrName').textContent = ME.name;
  document.getElementById('hdrRole').textContent = roleLabel(ME.role);
  buildNav();
  renderTab(0);
}
function buildNav(){
  var bar = document.getElementById('navBar');
  bar.innerHTML = NAV_TABS.map(function(tb,i){
    return '<button class="nav-btn'+(i===0?' sel':'')+'" data-tab="'+tb.id+'"><div class="ic">'+tb.ic+'</div>'+tb.t+'</button>';
  }).join('');
  document.querySelectorAll('.nav-btn').forEach(function(btn){
    btn.onclick = function(){
      document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');
      renderTab(parseInt(btn.dataset.tab,10));
    };
  });
}
function renderTab(i){
  TAB = i;
  var c = document.getElementById('content');
  if(i===0) c.innerHTML = tplPlans();
  else if(i===1) c.innerHTML = tplSettings();
  wireTab(i);
}

/* ---------------- Tab 0: Training plans library ---------------- */
function tplPlans(){
  if(!TRAINING_PLANS_LOADED){
    loadPlans();
    return '<div class="section-title">📋 תוכניות אימון</div><div class="muted" style="text-align:center">טוען...</div>';
  }
  return ''+
  '<div class="section-title">📋 תוכניות אימון</div>'+
  '<div class="muted" style="margin-bottom:10px">בנה תוכנית אימון עם סרטוטים אינטראקטיביים על המגרש ושמור אותה לשימוש חוזר</div>'+
  '<button class="btn" id="btnNewPlan" style="margin-bottom:14px">+ תוכנית אימון חדשה</button>'+
  (TRAINING_PLANS.length===0
    ? '<div class="card" style="text-align:center;color:var(--sub)">עדיין לא נוצרו תוכניות אימון</div>'
    : TRAINING_PLANS.map(function(p,i){
        return '<div class="card"><div class="row"><b>'+p.name+'</b><button class="logout-btn" data-delplan="'+i+'" title="מחק">🗑</button></div>'+
          '<div class="muted" style="margin-top:4px">'+(p.drills?p.drills.length:0)+' תרגילים</div>'+
          '<button class="btn ghost sm" data-viewplan="'+i+'" style="margin-top:8px">פתח</button>'+
        '</div>';
      }).join('')
  );
}
function loadPlans(){
  if(!ME.uid) return;
  db.collection(P+'trainingplans').where('coachUid','==',ME.uid).get().then(function(snap){
    TRAINING_PLANS = snap.docs.map(function(d){ return d.data(); });
    TRAINING_PLANS_LOADED = true;
    if(TAB===0) renderTab(0);
  });
}

/* ---------------- Tab 1: Settings ---------------- */
function tplSettings(){
  return ''+
  '<div class="section-title">⚙️ הגדרות</div>'+
  '<div class="card">'+
    '<div class="row"><span>שם</span><span class="muted">'+ME.name+'</span></div>'+
    '<div class="row" style="margin-top:8px"><span>תפקיד</span><span class="muted">'+roleLabel(ME.role)+'</span></div>'+
    '<div class="row" style="margin-top:8px"><span>טלפון</span><span class="muted">'+ME.phone+'</span></div>'+
  '</div>';
}
function wireTab(i){
  if(i===0){
    var nb = document.getElementById('btnNewPlan');
    if(nb) nb.onclick = function(){ openPlanBuilder(null); };
    document.querySelectorAll('[data-viewplan]').forEach(function(btn){
      btn.onclick = function(){ openPlanBuilder(parseInt(btn.dataset.viewplan,10)); };
    });
    document.querySelectorAll('[data-delplan]').forEach(function(btn){
      btn.onclick = function(){
        var idx = parseInt(btn.dataset.delplan,10);
        var p = TRAINING_PLANS[idx];
        if(p && p.id) db.collection(P+'trainingplans').doc(p.id).delete();
        TRAINING_PLANS.splice(idx,1);
        renderTab(0);
      };
    });
  }
}

/* ---------------- Pitch board (drag players + draw arrows) ---------------- */
var BOARD_W = 600, BOARD_H = 380;
var boardState = {players:[], arrows:[]};
var arrowMode = false;
var arrowStart = null;
var editingPlan = null;
var editingDrills = [];

function freshPlayers(){
  var arr = [];
  var positions = [
    [300,350],[120,280],[230,290],[370,290],[480,280],
    [180,190],[300,170],[420,190],[180,80],[300,60],[420,80]
  ];
  for(var i=0;i<11;i++){ arr.push({num:i+1, x:positions[i][0], y:positions[i][1]}); }
  return arr;
}
function pitchSvgMarkup(players, arrows, small){
  var w = small ? 60 : BOARD_W, h = small ? 40 : BOARD_H;
  var sx = small ? 60/BOARD_W : 1, sy = small ? 40/BOARD_H : 1;
  var lines = '<rect x="2" y="2" width="'+(w-4)+'" height="'+(h-4)+'" fill="none" stroke="#fff" stroke-width="'+(small?1:2)+'"/>'+
    '<line x1="'+(w/2)+'" y1="2" x2="'+(w/2)+'" y2="'+(h-2)+'" stroke="#fff" stroke-width="'+(small?1:2)+'"/>'+
    '<circle cx="'+(w/2)+'" cy="'+(h/2)+'" r="'+(small?6:40)+'" fill="none" stroke="#fff" stroke-width="'+(small?1:2)+'"/>';
  var arrowsHtml = arrows.map(function(a){
    return '<line x1="'+(a.x1*sx)+'" y1="'+(a.y1*sy)+'" x2="'+(a.x2*sx)+'" y2="'+(a.y2*sy)+'" stroke="#fff200" stroke-width="'+(small?1.5:3)+'" marker-end="url(#arrowhead)"/>';
  }).join('');
  var playersHtml = players.map(function(p){
    return '<g class="player-token" data-num="'+p.num+'" style="cursor:'+(small?'default':'grab')+'">'+
      '<circle cx="'+(p.x*sx)+'" cy="'+(p.y*sy)+'" r="'+(small?4:14)+'" fill="#1c2230" stroke="#fff" stroke-width="'+(small?0.5:2)+'"/>'+
      (small?'':'<text x="'+(p.x*sx)+'" y="'+(p.y*sy+4)+'" text-anchor="middle" font-size="11" fill="#fff">'+p.num+'</text>')+
    '</g>';
  }).join('');
  return '<svg id="pitchSvg" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#fff200"/></marker></defs>'+
    lines + arrowsHtml + playersHtml +
  '</svg>';
}
function openPlanBuilder(idx){
  editingPlan = idx!==null ? TRAINING_PLANS[idx] : {coachUid:ME.uid, name:'', drills:[]};
  editingDrills = editingPlan.drills ? editingPlan.drills.slice() : [];
  boardState = {players:freshPlayers(), arrows:[]};
  arrowMode = false; arrowStart = null;
  renderPlanBuilderModal();
}
function renderPlanBuilderModal(){
  var html = ''+
  '<h3>'+(editingPlan.name?editingPlan.name:'תוכנית אימון חדשה')+'</h3>'+
  '<div class="field"><label>שם התוכנית</label><input id="planNameInput" value="'+(editingPlan.name||'').replace(/"/g,'&quot;')+'"></div>'+
  '<div class="toolbar">'+
    '<button id="btnModeMove" class="'+(arrowMode?'':'sel')+'">🧍 הזז שחקנים</button>'+
    '<button id="btnModeArrow" class="'+(arrowMode?'sel':'')+'">➡️ ציור חצים</button>'+
    '<button id="btnClearArrows">🧹 נקה חצים</button>'+
    '<button id="btnResetPlayers">↺ אפס שחקנים</button>'+
  '</div>'+
  '<div class="pitch-wrap">'+pitchSvgMarkup(boardState.players, boardState.arrows, false)+'</div>'+
  '<div class="muted" style="margin-bottom:10px">'+(arrowMode?'לחץ נקודת התחלה ואז נקודת סיום על המגרש כדי לצייר חץ תנועה':'גרור שחקן כדי להזיז אותו על המגרש')+'</div>'+
  '<div class="field"><label>הערה לתרגיל הנוכחי</label><textarea id="drillNoteInput" rows="2" placeholder="תיאור התרגיל המצולם בלוח..."></textarea></div>'+
  '<button class="btn ghost" id="btnAddDrill" style="margin-bottom:14px">+ הוסף תרגיל זה לתוכנית</button>'+
  '<div class="section-title" style="font-size:14px">תרגילים בתוכנית ('+editingDrills.length+')</div>'+
  (editingDrills.length===0
    ? '<div class="muted" style="margin-bottom:10px">עדיין לא נוספו תרגילים</div>'
    : editingDrills.map(function(d,i){
        return '<div class="drill-card">'+pitchSvgMarkup(d.players, d.arrows, true)+
          '<div style="flex:1"><div class="muted" style="font-size:12px">'+(d.note||'תרגיל '+(i+1))+'</div></div>'+
          '<button class="logout-btn" data-deldrill="'+i+'" title="מחק">🗑</button>'+
        '</div>';
      }).join(''))+
  '<button class="btn" id="btnSavePlan" style="margin-top:10px">💾 שמור תוכנית אימון</button>'+
  '<button class="btn ghost" onclick="closeModal()" style="margin-top:8px">סגור</button>';
  openModal(html);
  wirePlanBuilderModal();
}
function wirePlanBuilderModal(){
  document.getElementById('btnModeMove').onclick = function(){ arrowMode = false; arrowStart = null; renderPlanBuilderModal(); };
  document.getElementById('btnModeArrow').onclick = function(){ arrowMode = true; renderPlanBuilderModal(); };
  document.getElementById('btnClearArrows').onclick = function(){ boardState.arrows = []; arrowStart = null; renderPlanBuilderModal(); };
  document.getElementById('btnResetPlayers').onclick = function(){ boardState.players = freshPlayers(); renderPlanBuilderModal(); };
  document.getElementById('btnAddDrill').onclick = function(){
    editingDrills.push({
      players: boardState.players.map(function(p){return {num:p.num,x:p.x,y:p.y};}),
      arrows: boardState.arrows.slice(),
      note: document.getElementById('drillNoteInput').value.trim()
    });
    renderPlanBuilderModal();
  };
  document.querySelectorAll('[data-deldrill]').forEach(function(btn){
    btn.onclick = function(){ editingDrills.splice(parseInt(btn.dataset.deldrill,10),1); renderPlanBuilderModal(); };
  });
  document.getElementById('btnSavePlan').onclick = function(){
    var n = document.getElementById('planNameInput').value.trim();
    if(!n){ return; }
    editingPlan.name = n;
    editingPlan.drills = editingDrills;
    editingPlan.coachUid = ME.uid;
    if(!editingPlan.id) editingPlan.id = genCode(8);
    db.collection(P+'trainingplans').doc(editingPlan.id).set(editingPlan).then(function(){
      var existingIdx = TRAINING_PLANS.findIndex(function(p){return p.id===editingPlan.id;});
      if(existingIdx>=0) TRAINING_PLANS[existingIdx] = editingPlan; else TRAINING_PLANS.push(editingPlan);
      closeModal();
      renderTab(0);
    });
  };
  wirePitchSvg();
}
function svgPoint(svg, evt){
  var rect = svg.getBoundingClientRect();
  var vb = svg.viewBox.baseVal;
  var clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  var clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
  var x = (clientX - rect.left) / rect.width * vb.width;
  var y = (clientY - rect.top) / rect.height * vb.height;
  return {x:x, y:y};
}
var pitchDragging = null;
function wirePitchSvg(){
  var svg = document.getElementById('pitchSvg');
  if(!svg) return;
  document.querySelectorAll('.player-token').forEach(function(token){
    token.addEventListener('mousedown', function(e){ startDrag(token); });
    token.addEventListener('touchstart', function(e){ startDrag(token); }, {passive:true});
  });
  svg.addEventListener('click', function(e){
    if(!arrowMode || pitchDragging) return;
    var pt = svgPoint(svg, e);
    if(!arrowStart){
      arrowStart = pt;
    } else {
      boardState.arrows.push({x1:arrowStart.x, y1:arrowStart.y, x2:pt.x, y2:pt.y});
      arrowStart = null;
      renderPlanBuilderModal();
    }
  });
}
function startDrag(token){
  if(arrowMode) return;
  var num = parseInt(token.dataset.num,10);
  pitchDragging = boardState.players.filter(function(p){return p.num===num;})[0];
}
document.addEventListener('mousemove', onPitchDragMove);
document.addEventListener('touchmove', onPitchDragMove, {passive:false});
document.addEventListener('mouseup', onPitchDragEnd);
document.addEventListener('touchend', onPitchDragEnd);
function onPitchDragMove(e){
  if(!pitchDragging) return;
  var svg = document.getElementById('pitchSvg');
  if(!svg) return;
  e.preventDefault();
  var pt = svgPoint(svg, e);
  pitchDragging.x = Math.max(10,Math.min(BOARD_W-10,pt.x));
  pitchDragging.y = Math.max(10,Math.min(BOARD_H-10,pt.y));
  var g = svg.querySelector('.player-token[data-num="'+pitchDragging.num+'"]');
  if(g){
    g.querySelector('circle').setAttribute('cx', pitchDragging.x);
    g.querySelector('circle').setAttribute('cy', pitchDragging.y);
    var t = g.querySelector('text');
    if(t){ t.setAttribute('x', pitchDragging.x); t.setAttribute('y', pitchDragging.y+4); }
  }
}
function onPitchDragEnd(){ pitchDragging = null; }
function genCode(len){
  var chars = 'abcdefghijklmnopqrstuvwxyz0123456789', s = '';
  for(var i=0;i<len;i++) s += chars.charAt(Math.floor(Math.random()*chars.length));
  return s;
}

/* ---------------- Modal helpers ---------------- */
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').onclick = function(e){
  if(e.target === document.getElementById('modalBg')) closeModal();
};
</script>
