<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>תקציב משפחתי 💰</title>
<style>
:root{
  --bg:#f1f5f9;--card:#fff;--hdr:#0f172a;--hdr2:#1e293b;
  --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;
  --blue:#2563eb;--blue-bg:#dbeafe;--gold:#d97706;--gold-bg:#fef3c7;
  --purple:#7c3aed;--purple-bg:#ede9fe;--teal:#0891b2;--teal-bg:#cffafe;
  --text:#0f172a;--label2:#475569;--label3:#94a3b8;--sep:#e2e8f0;
  --shadow:0 1px 8px rgba(0,0,0,.08);--shadow2:0 4px 24px rgba(0,0,0,.12);
  --radius:14px;--nav:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow:hidden}

/* ─── SPLASH ─── */
#splash{position:fixed;inset:0;background:var(--hdr);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#splash .ico{font-size:4rem}
#splash .ttl{color:#fff;font-size:1.5rem;font-weight:800}
#splash .sub{color:#94a3b8;font-size:.9rem}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── LOGIN ─── */
#loginScreen{position:fixed;inset:0;background:var(--hdr);display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:900}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:32px;width:100%;max-width:360px;text-align:center}
.login-ico{font-size:3.5rem;margin-bottom:12px}
.login-title{color:#fff;font-size:1.4rem;font-weight:800;margin-bottom:6px}
.login-sub{color:#94a3b8;font-size:.88rem;margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:1rem;text-align:right;margin-bottom:12px}
.login-input::placeholder{color:#94a3b8}
.login-input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}

/* ─── APP SHELL ─── */
#app{display:none;height:100vh;flex-direction:column}
.app-hdr{background:var(--hdr);color:#fff;padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-hdr-left{display:flex;flex-direction:column}
.app-hdr-title{font-size:1.05rem;font-weight:800}
.app-hdr-sub{font-size:.75rem;color:#94a3b8;margin-top:1px}
.app-hdr-user{font-size:.82rem;color:#94a3b8;display:flex;align-items:center;gap:6px}
.user-dot{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}

.content{flex:1;overflow-y:auto;padding:14px 14px calc(var(--nav)+14px);-webkit-overflow-scrolling:touch}

/* ─── NAV ─── */
.nav{height:var(--nav);background:var(--card);border-top:1px solid var(--sep);display:flex;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.64rem;font-weight:600;color:var(--label3);background:none;border:none;cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn.active .nav-ico{transform:scale(1.1)}
.nav-ico{font-size:1.35rem;transition:transform .15s}

/* ─── CARDS ─── */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:.82rem;font-weight:700;color:var(--label2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.card-title a{font-size:.75rem;color:var(--blue);cursor:pointer;text-decoration:none;font-weight:600}

/* ─── SUMMARY GRID ─── */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sum-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.sum-card.full{grid-column:1/-1}
.sum-card.green{border-top:3px solid var(--green)}
.sum-card.red{border-top:3px solid var(--red)}
.sum-card.blue{border-top:3px solid var(--blue)}
.sum-ico{font-size:1.4rem;margin-bottom:6px}
.sum-amount{font-size:1.5rem;font-weight:800;line-height:1}
.sum-label{font-size:.72rem;color:var(--label3);margin-top:4px;font-weight:600}
.sum-card.balance .sum-amount.pos{color:var(--green)}
.sum-card.balance .sum-amount.neg{color:var(--red)}

/* ─── PERIOD BAR ─── */
.period-bar{display:flex;background:var(--sep);border-radius:10px;padding:3px;margin-bottom:14px}
.period-btn{flex:1;padding:7px 4px;border:none;background:none;border-radius:8px;font-size:.8rem;font-weight:600;color:var(--label2);cursor:pointer;transition:all .15s}
.period-btn.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ─── SECTION HEADER ─── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
.sec-title{font-size:.88rem;font-weight:700;color:var(--label2)}
.add-btn{background:var(--blue);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}

/* ─── ENTRY ITEMS ─── */
.entry-list{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.entry-item{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--sep);cursor:pointer;transition:background .1s}
.entry-item:last-child{border-bottom:none}
.entry-item:active{background:#f8fafc}
.entry-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-left:10px;flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-desc{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:.72rem;color:var(--label3);margin-top:2px}
.entry-right{text-align:left;flex-shrink:0}
.entry-amount{font-weight:700;font-size:.95rem;white-space:nowrap}
.entry-who{font-size:.68rem;color:var(--label3);margin-top:2px}
.amount-inc{color:var(--green)}
.amount-exp{color:var(--red)}

/* ─── INSTALLMENT CARD ─── */
.inst-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.inst-header{display:flex;justify-content:space-between;align-items:flex-start}
.inst-name{font-weight:700;font-size:.92rem}
.inst-monthly{font-size:.82rem;color:var(--blue);font-weight:700}
.inst-detail{display:flex;gap:16px;margin-top:8px;margin-bottom:6px}
.inst-stat{text-align:center}
.inst-stat-val{font-size:.9rem;font-weight:700}
.inst-stat-lbl{font-size:.65rem;color:var(--label3)}
.prog-bar{height:5px;background:var(--sep);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.prog-fill.done{background:var(--green)}
.prog-fill.active{background:var(--blue)}
.inst-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px}
.inst-badge.done{background:var(--green-bg);color:var(--green)}
.inst-badge.active{background:var(--blue-bg);color:var(--blue)}

/* ─── FIXED EXPENSE CARD ─── */
.fixed-item{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--sep);cursor:pointer}
.fixed-item:last-child{border-bottom:none}
.fixed-day{width:36px;height:36px;border-radius:8px;background:var(--gold-bg);color:var(--gold);font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin-left:10px;flex-shrink:0}
.fixed-body{flex:1}
.fixed-name{font-weight:600;font-size:.88rem}
.fixed-cat{font-size:.7rem;color:var(--label3)}
.fixed-amount{font-weight:700;font-size:.92rem;color:var(--red)}
.toggle-sw{width:44px;height:24px;background:var(--sep);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;margin-right:8px;flex-shrink:0}
.toggle-sw.on{background:var(--green)}
.toggle-sw::after{content:'';position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-sw.on::after{transform:translateX(-20px)}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--sep);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{font-size:1.2rem;color:var(--label3);background:none;border:none;cursor:pointer;padding:4px}
.form-group{margin-bottom:14px}
.form-label{font-size:.8rem;font-weight:700;color:var(--label2);margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--sep);border-radius:10px;font-size:.95rem;color:var(--text);background:#fff;direction:rtl;-webkit-appearance:none;appearance:none}
.form-input:focus{outline:none;border-color:var(--blue)}
select.form-input{background-image:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px}
.btn-danger{background:var(--red)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.btn-row .btn-primary{margin-top:0}

/* ─── CATEGORY PILLS ─── */
.cat-scroll{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.cat-pill{padding:6px 12px;border-radius:20px;border:1.5px solid var(--sep);font-size:.78rem;font-weight:600;cursor:pointer;background:#fff;color:var(--label2);white-space:nowrap;transition:all .15s}
.cat-pill.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}

/* ─── CHART BARS ─── */
.chart-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px}
.chart-bar{width:45%;border-radius:4px 4px 0 0;min-height:3px;transition:height .3s}
.chart-bar.inc{background:var(--green)}
.chart-bar.exp{background:var(--red)}
.chart-lbl{font-size:.58rem;color:var(--label3);font-weight:600}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:32px 16px;color:var(--label3)}
.empty-ico{font-size:2.5rem;margin-bottom:8px}
.empty-txt{font-size:.88rem}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:calc(var(--nav)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── DESKTOP ─── */
@media(min-width:680px){
  .content{max-width:640px;margin:0 auto}
  .sum-grid{grid-template-columns:1fr 1fr 1fr}
  .modal-overlay{align-items:center}
  .modal-sheet{border-radius:20px;max-width:460px;margin:0 auto;max-height:85vh}
}
</style>
</head>
<body>

<div id="splash">
  <div class="ico">💰</div>
  <div class="ttl">תקציב משפחתי</div>
  <div class="sub">טוען נתונים...</div>
  <div class="spinner"></div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-ico">💰</div>
    <div class="login-title">תקציב משפחתי</div>
    <div class="login-sub">הזן שם להתחלה</div>
    <input type="text" id="loginName" class="login-input" placeholder="שם פרטי..." maxlength="20">
    <button class="login-btn" onclick="doLogin()">כניסה →</button>

</div>

<div id="app">
  <div class="app-hdr">

  <div class="content" id="mainContent"></div>

    <button class="nav-btn active" data-tab="0"><span class="nav-ico">📊</span>סקירה</button>

    <button class="nav-btn" data-tab="2"><span class="nav-ico">🛒</span>הוצאות</button>
    <button class="nav-btn" data-tab="3"><span class="nav-ico">💳</span>תשלומים</button>

</div>

<!-- Add Income Modal -->
<div class="modal-overlay" id="modalIncome">

      <button class="btn-primary" onclick="saveIncome()">שמור</button>

  </div>
</div>

<!-- Add Expense Modal -->

  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="modalExpTitle">➕ הוצאה חדשה</span>
      <button class="modal-close" onclick="closeModal('modalExpense')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">תיאור</label>
      <input type="text" id="expDesc" class="form-input" placeholder="לדוגמה: קניות סופר">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">סכום (₪)</label>
        <input type="number" id="expAmount" class="form-input" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">תאריך</label>
        <input type="date" id="expDate" class="form-input">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">קטגוריה</label>
      <div class="cat-scroll" id="expCatPills"></div>
    </div>
    <div class="btn-row" id="expBtnRow">
      <button class="btn-primary" onclick="saveExpense()">שמור</button>
    </div>
  </div>
</div>

<!-- Add Installment Modal -->
<div class="modal-overlay" id="modalInst">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="modalInstTitle">💳 רכישה בתשלומים</span>
      <button class="modal-close" onclick="closeModal('modalInst')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">שם המוצר / הרכישה</label>
      <input type="text" id="instName" class="form-input" placeholder="לדוגמה: טלוויזיה סמסונג">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">סכום כולל (₪)</label>
        <input type="number" id="instTotal" class="form-input" placeholder="0" min="0" oninput="calcInstPreview()">
      </div>
      <div class="form-group">

    <div class="form-group">
      <label class="form-label">חודש תחילת תשלומים</label>

    <div class="btn-row" id="instBtnRow">
      <button class="btn-primary" onclick="saveInst()">שמור</button>

<!-- Add Fixed Expense Modal -->

      <div class="form-group">
        <label class="form-label">יום בחודש</label>
        <input type="number" id="fixedDay" class="form-input" placeholder="1" min="1" max="31">

      <label class="form-label">קטגוריה</label>
      <div class="cat-scroll" id="fixedCatPills"></div>
    </div>
    <div class="btn-row" id="fixedBtnRow">
      <button class="btn-primary" onclick="saveFixed()">שמור</button>
    </div>
  </div>
</div>

  ME={uid:uid,name:n};

function startApp(){

  var initials=ME.name.charAt(0).toUpperCase();

// ─── SUBSCRIBE ───
var unsubs=[];
function subscribeData(){
  if(!db){
    render();
    return;
  }
  // Income
  unsubs.push(db.collection('bud_income').onSnapshot(function(snap){
    INCOME=[];
    snap.forEach(function(d){INCOME.push(Object.assign({id:d.id},d.data()));});
    INCOME.sort(function(a,b){return b.date.localeCompare(a.date);});
    render();
  }));
  // Expenses
  unsubs.push(db.collection('bud_expenses').onSnapshot(function(snap){
    EXPENSES=[];
    snap.forEach(function(d){EXPENSES.push(Object.assign({id:d.id},d.data()));});
    EXPENSES.sort(function(a,b){return b.date.localeCompare(a.date);});
    render();
  }));
  // Fixed
  unsubs.push(db.collection('bud_fixed').onSnapshot(function(snap){
    FIXED=[];
    snap.forEach(function(d){FIXED.push(Object.assign({id:d.id},d.data()));});
    FIXED.sort(function(a,b){return (a.day||1)-(b.day||1);});
    render();
  }));
  // Installments
  unsubs.push(db.collection('bud_installments').onSnapshot(function(snap){
    INSTALLMENTS=[];
    snap.forEach(function(d){INSTALLMENTS.push(Object.assign({id:d.id},d.data()));});
    render();
  }));
}

// ─── DATE HELPERS ───
function today(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function thisMonth(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1);}
function thisYear(){return new Date().getFullYear()+''}
function pad(n){return n<10?'0'+n:''+n;}
function fmtDate(ds){
  var d=new Date(ds+'T12:00:00');
  var months=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  return d.getDate()+' '+months[d.getMonth()];
}
function fmtMonth(ym){
  var p=ym.split('-');
  var months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return months[+p[1]-1]+' '+p[0];
}
function fmtAmount(n){
  return '₪'+Math.abs(n).toLocaleString('he-IL',{maximumFractionDigits:0});
}
function ymDiff(ym1,ym2){
  var a=ym1.split('-'),b=ym2.split('-');
  return (+b[0]-+a[0])*12+(+b[1]-+a[1]);
}

// ─── PERIOD FILTER ───
function inPeriod(dateStr,period){
  if(period==='day')return dateStr===today();
  if(period==='month')return dateStr.startsWith(thisMonth());
  if(period==='year')return dateStr.startsWith(thisYear());
  return true;
}
function getPeriodLabel(p){
  if(p==='day')return 'היום, '+fmtDate(today());
  if(p==='month')return fmtMonth(thisMonth());
  if(p==='year')return 'שנת '+thisYear();
}

// ─── CALCULATE P&L ───
function calcPL(period){
  // Manual income
  var incTotal=INCOME.filter(function(x){return inPeriod(x.date,period);}).reduce(function(s,x){return s+(+x.amount||0);},0);
  // Manual expenses
  var expTotal=EXPENSES.filter(function(x){return inPeriod(x.date,period);}).reduce(function(s,x){return s+(+x.amount||0);},0);

  // Fixed expenses
  var fixedTotal=0;
  var activeFixed=FIXED.filter(function(f){return f.active!==false;});
  if(period==='month'||period==='day'){
    // Per month: sum all active fixed
    if(period==='month'){
      activeFixed.forEach(function(f){fixedTotal+=(+f.amount||0);});
    }
    // Per day: show proportional (fixed/30) - or just show 0 for day
  } else if(period==='year'){
    activeFixed.forEach(function(f){fixedTotal+=(+f.amount||0)*12;});
  }

  // Installments
  var instTotal=0;
  var curYM=thisMonth();
  INSTALLMENTS.forEach(function(inst){
    if(!inst.startYM||!inst.n)return;
    var monthsPaid=ymDiff(inst.startYM,curYM);
    if(monthsPaid<0)return; // not started yet
    var monthsRemaining=inst.n-monthsPaid;
    if(monthsRemaining<=0)return; // done
    var monthlyAmt=+(inst.amountPer)||0;
    if(period==='month'){
      instTotal+=monthlyAmt;
    } else if(period==='year'){
      // how many months of this year is it active?
      var yr=+thisYear();
      var active=0;
      for(var m=1;m<=12;m++){
        var ym=yr+'-'+pad(m);
        var diff=ymDiff(inst.startYM,ym);
        if(diff>=0&&diff<inst.n)active++;
      }
      instTotal+=monthlyAmt*active;
    }
  });

  var totalExp=expTotal+fixedTotal+instTotal;
  var balance=incTotal-totalExp;

  return {
    income:incTotal,
    expManual:expTotal,
    expFixed:fixedTotal,
    expInst:instTotal,
    totalExp:totalExp,
    balance:balance
  };
}

function setPeriod(p){currentPeriod=p;render();}

function renderYearChart(){
  var months=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  var yr=+thisYear();
  var maxVal=0;
  var data=months.map(function(_,i){
    var ym=yr+'-'+pad(i+1);
    var inc=INCOME.filter(function(x){return x.date.startsWith(ym);}).reduce(function(s,x){return s+(+x.amount||0);},0);
    var exp=EXPENSES.filter(function(x){return x.date.startsWith(ym);}).reduce(function(s,x){return s+(+x.amount||0);},0);
    var fixedAmt=FIXED.filter(function(f){return f.active!==false;}).reduce(function(s,f){return s+(+f.amount||0);},0);
    var instAmt=0;
    INSTALLMENTS.forEach(function(inst){
      if(!inst.startYM||!inst.n)return;
      var diff=ymDiff(inst.startYM,ym);
      if(diff>=0&&diff<inst.n)instAmt+=(+inst.amountPer||0);
    });
    var totalExp=exp+fixedAmt+instAmt;
    maxVal=Math.max(maxVal,inc,totalExp);
    return {inc:inc,exp:totalExp,label:months[i]};
  });
  if(maxVal===0)return '';
  var html='<div class="card" style="margin-top:4px"><div class="card-title">גרף שנתי</div><div class="chart-wrap">';
  data.forEach(function(d){
    var ih=maxVal>0?Math.round((d.inc/maxVal)*70):0;
    var eh=maxVal>0?Math.round((d.exp/maxVal)*70):0;
    html+='<div class="chart-col">'+
      '<div class="chart-bar-wrap">'+
        '<div class="chart-bar inc" style="height:'+ih+'px" title="הכנסות: '+fmtAmount(d.inc)+'"></div>'+
        '<div class="chart-bar exp" style="height:'+eh+'px" title="הוצאות: '+fmtAmount(d.exp)+'"></div>'+
      '</div>'+
      '<div class="chart-lbl">'+d.label+'</div>'+
    '</div>';
  });
  html+='</div>';
  html+='<div style="display:flex;gap:12px;margin-top:8px;font-size:.72rem;font-weight:600"><span><span style="color:var(--green)">■</span> הכנסות</span><span><span style="color:var(--red)">■</span> הוצאות</span></div>';
  html+='</div>';
  return html;
}

function renderInstCard(inst,curYM){
  var diff=ymDiff(inst.startYM,curYM);
  var paid=Math.min(Math.max(0,diff),inst.n);
  var isDone=paid>=inst.n;
  var pct=Math.round((paid/inst.n)*100);
  var endYM=addMonths(inst.startYM,inst.n-1);
  return '<div class="inst-card" onclick="openEditInst(\''+inst.id+'\')">' +
    '<div class="inst-header">' +
      '<div><div class="inst-name">'+escHtml(inst.name||'')+'</div>' +
      '<div style="font-size:.72rem;color:var(--label3);margin-top:2px">'+fmtMonth(inst.startYM)+' — '+fmtMonth(endYM)+'</div></div>' +
      '<div style="text-align:left"><div class="inst-monthly" style="font-size:1rem">'+fmtAmount(inst.amountPer)+'/חודש</div>' +
      '<div style="margin-top:4px"><span class="inst-badge '+(isDone?'done':'active')+'">'+(isDone?'✅ הסתיים':'⏳ פעיל')+'</span></div></div>' +
    '</div>' +
    '<div class="inst-detail">' +
      '<div class="inst-stat"><div class="inst-stat-val">'+paid+'</div><div class="inst-stat-lbl">שולם</div></div>' +
      '<div class="inst-stat"><div class="inst-stat-val" style="color:var(--blue)">'+(inst.n-paid)+'</div><div class="inst-stat-lbl">נותר</div></div>' +
      '<div class="inst-stat"><div class="inst-stat-val">'+inst.n+'</div><div class="inst-stat-lbl">סה״כ</div></div>' +
      '<div class="inst-stat"><div class="inst-stat-val">'+fmtAmount(inst.total)+'</div><div class="inst-stat-lbl">סכום כולל</div></div>' +
    '</div>' +
    '<div class="prog-bar"><div class="prog-fill '+(isDone?'done':'active')+'" style="width:'+pct+'%"></div></div>' +
    '<div style="text-align:left;font-size:.7rem;color:var(--label3);margin-top:4px">'+pct+'% שולם · נשאר '+fmtAmount((inst.n-paid)*(+inst.amountPer||0))+'</div>' +
  '</div>';
}

function addMonths(ym,n){
  var p=ym.split('-');
  var d=new Date(+p[0],+p[1]-1+n,1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1);
}

// ─── RENDER FIXED ───
function renderFixed(c){
  var total=FIXED.filter(function(f){return f.active!==false;}).reduce(function(s,f){return s+(+f.amount||0);},0);
  var html='<div class="sec-hdr"><span class="sec-title">📌 הוצאות קבועות</span><button class="add-btn" onclick="openAddFixed()">+ הוסף</button></div>';
  if(total>0){
    html+='<div class="card" style="background:var(--red-bg);border:none;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:.85rem;font-weight:700;color:var(--red)">סה״כ קבועות פעילות לחודש</span><span style="font-size:1.2rem;font-weight:800;color:var(--red)">'+fmtAmount(total)+'</span></div></div>';
  }
  if(FIXED.length===0){
    html+='<div class="empty"><div class="empty-ico">📌</div><div class="empty-txt">אין הוצאות קבועות<br>הוסף שכ״ד, ביטוח, מנוי...</div></div>';
  } else {
    html+='<div class="entry-list">';
    FIXED.forEach(function(f){
      var cat=EXPENSE_CATS.find(function(c){return c.id===f.cat;})||EXPENSE_CATS[EXPENSE_CATS.length-1];
      var isOn=f.active!==false;
      html+='<div class="fixed-item" onclick="openEditFixed(\''+f.id+'\')">' +
        '<div class="fixed-day">'+pad(f.day||1)+'</div>' +
        '<div class="entry-ico" style="background:'+cat.bg+';color:'+cat.color+'">'+cat.ico+'</div>' +
        '<div class="fixed-body">'+
          '<div class="fixed-name">'+escHtml(f.name||'')+'</div>'+
          '<div class="fixed-cat">'+cat.label+' · יום '+pad(f.day||1)+' לחודש</div>'+
        '</div>'+
        '<div class="fixed-amount"'+(isOn?'':' style="color:var(--label3)"')+'>'+fmtAmount(f.amount)+'</div>'+
        '<div class="toggle-sw'+(isOn?' on':'')+'" onclick="event.stopPropagation();toggleFixed(\''+f.id+'\','+isOn+')"></div>'+
      '</div>';
    });
    html+='</div>';
  }
  c.innerHTML=html;
}

// ─── TOGGLE FIXED ───
function toggleFixed(id,current){
  if(!db)return;
  db.collection('bud_fixed').doc(id).update({active:!current});
}

// ─── CAT PILLS ───
function buildCatPills(containerId,cats,selected,onSelect){
  var el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML='';
  cats.forEach(function(cat){
    var pill=document.createElement('div');
    pill.className='cat-pill'+(cat.id===selected?' sel':'');
    pill.innerHTML=cat.ico+' '+cat.label;
    pill.onclick=function(){
      onSelect(cat.id);
      el.querySelectorAll('.cat-pill').forEach(function(p){p.classList.remove('sel');});
      pill.classList.add('sel');
    };
    el.appendChild(pill);
  });
}

// ─── OPEN MODALS ───
function openAddIncome(){
  editingId=null;editingType='inc';
  document.getElementById('modalIncomeTitle').textContent='➕ הכנסה חדשה';

  document.getElementById('incAmount').value='';
  document.getElementById('incDate').value=today();
  selectedIncCat='salary';
  buildCatPills('incCatPills',INCOME_CATS,selectedIncCat,function(id){selectedIncCat=id;});
  document.getElementById('incomeBtnRow').innerHTML='<button class="btn-primary" onclick="saveIncome()">שמור</button>';
  openModal('modalIncome');
}

  document.getElementById('modalFixedTitle').textContent='📌 הוצאה קבועה חדשה';

  document.getElementById('fixedAmount').value='';
  document.getElementById('fixedDay').value='1';

  document.getElementById('fixedBtnRow').innerHTML='<button class="btn-primary" onclick="saveFixed()">שמור</button>';
  openModal('modalFixed');

function openEdit(type,id){
  if(type==='inc'){
    var e=INCOME.find(function(x){return x.id===id;});
    if(!e)return;
    editingId=id;editingType='inc';
    document.getElementById('modalIncomeTitle').textContent='✏️ עריכת הכנסה';
    document.getElementById('incDesc').value=e.desc||'';
    document.getElementById('incAmount').value=e.amount||'';
    document.getElementById('incDate').value=e.date||today();
    selectedIncCat=e.cat||'salary';
    buildCatPills('incCatPills',INCOME_CATS,selectedIncCat,function(id){selectedIncCat=id;});
    document.getElementById('incomeBtnRow').innerHTML='<button class="btn-primary btn-danger" onclick="deleteEntry(\'inc\',\''+id+'\')">מחק</button><button class="btn-primary" onclick="saveIncome()">עדכן</button>';
    openModal('modalIncome');
  } else {
    var e=EXPENSES.find(function(x){return x.id===id;});
    if(!e)return;
    editingId=id;editingType='exp';
    document.getElementById('modalExpTitle').textContent='✏️ עריכת הוצאה';
    document.getElementById('expDesc').value=e.desc||'';
    document.getElementById('expAmount').value=e.amount||'';
    document.getElementById('expDate').value=e.date||today();
    selectedExpCat=e.cat||'food';
    buildCatPills('expCatPills',EXPENSE_CATS,selectedExpCat,function(id){selectedExpCat=id;});
    document.getElementById('expBtnRow').innerHTML='<button class="btn-primary btn-danger" onclick="deleteEntry(\'exp\',\''+id+'\')">מחק</button><button class="btn-primary" onclick="saveExpense()">עדכן</button>';
    openModal('modalExpense');
  }
}

function openEditInst(id){
  var inst=INSTALLMENTS.find(function(x){return x.id===id;});
  if(!inst)return;
  editingId=id;
  document.getElementById('modalInstTitle').textContent='✏️ עריכת תשלום';
  document.getElementById('instName').value=inst.name||'';
  document.getElementById('instTotal').value=inst.total||'';
  document.getElementById('instN').value=inst.n||'';
  document.getElementById('instStart').value=inst.startYM||thisMonth();
  calcInstPreview();
  document.getElementById('instBtnRow').innerHTML='<button class="btn-primary btn-danger" onclick="deleteInst(\''+id+'\')">מחק</button><button class="btn-primary" onclick="saveInst()">עדכן</button>';
  openModal('modalInst');
}

function openEditFixed(id){
  var f=FIXED.find(function(x){return x.id===id;});
  if(!f)return;
  editingId=id;
  document.getElementById('modalFixedTitle').textContent='✏️ עריכת קבועה';
  document.getElementById('fixedName').value=f.name||'';
  document.getElementById('fixedAmount').value=f.amount||'';
  document.getElementById('fixedDay').value=f.day||1;
  selectedFixedCat=f.cat||'bills';
  buildCatPills('fixedCatPills',EXPENSE_CATS,selectedFixedCat,function(id){selectedFixedCat=id;});
  document.getElementById('fixedBtnRow').innerHTML='<button class="btn-primary btn-danger" onclick="deleteFixed(\''+id+'\')">מחק</button><button class="btn-primary" onclick="saveFixed()">עדכן</button>';
  openModal('modalFixed');
}

function calcInstPreview(){
  var total=+document.getElementById('instTotal').value||0;
  var n=+document.getElementById('instN').value||0;
  var prev=document.getElementById('instPreview');
  if(total>0&&n>0){
    var monthly=Math.round(total/n);
    document.getElementById('instPreviewAmt').textContent=fmtAmount(monthly)+' לחודש × '+n+' חודשים';
    prev.style.display='block';
  } else {
    prev.style.display='none';
  }
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// Click outside modal to close
document.querySelectorAll('.modal-overlay').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});
});

// ─── SAVE OPERATIONS ───
function saveIncome(){
  var desc=document.getElementById('incDesc').value.trim();
  var amount=+document.getElementById('incAmount').value;
  var date=document.getElementById('incDate').value;
  if(!amount||!date){showToast('נא למלא סכום ותאריך');return;}
  var data={desc:desc,amount:amount,date:date,cat:selectedIncCat,who:ME.name,uid:ME.uid,createdAt:Date.now()};
  if(!db){showToast('אין חיבור לשרת');return;}
  if(editingId){
    db.collection('bud_income').doc(editingId).update(data).then(function(){showToast('עודכן ✓');closeModal('modalIncome');});
  } else {
    db.collection('bud_income').add(data).then(function(){showToast('נשמר ✓');closeModal('modalIncome');});
  }
}

function saveExpense(){
  var desc=document.getElementById('expDesc').value.trim();
  var amount=+document.getElementById('expAmount').value;
  var date=document.getElementById('expDate').value;
  if(!amount||!date){showToast('נא למלא סכום ותאריך');return;}
  var data={desc:desc,amount:amount,date:date,cat:selectedExpCat,who:ME.name,uid:ME.uid,createdAt:Date.now()};

  if(editingId){
    db.collection('bud_expenses').doc(editingId).update(data).then(function(){showToast('עודכן ✓');closeModal('modalExpense');});
  } else {
    db.collection('bud_expenses').add(data).then(function(){showToast('נשמר ✓');closeModal('modalExpense');});
  }
}

function saveInst(){
  var name=document.getElementById('instName').value.trim();
  var total=+document.getElementById('instTotal').value;
  var n=+document.getElementById('instN').value;
  var startYM=document.getElementById('instStart').value;
  if(!name||!total||!n||!startYM){showToast('נא למלא את כל השדות');return;}
  var data={name:name,total:total,n:n,amountPer:Math.round(total/n),startYM:startYM,uid:ME.uid,createdAt:Date.now()};
  if(!db){showToast('אין חיבור לשרת');return;}
  if(editingId){
    db.collection('bud_installments').doc(editingId).update(data).then(function(){showToast('עודכן ✓');closeModal('modalInst');});
  } else {
    db.collection('bud_installments').add(data).then(function(){showToast('נשמר ✓');closeModal('modalInst');});
  }
}

function saveFixed(){
  var name=document.getElementById('fixedName').value.trim();
  var amount=+document.getElementById('fixedAmount').value;
  var day=+document.getElementById('fixedDay').value||1;
  if(!name||!amount){showToast('נא למלא שם וסכום');return;}
  var data={name:name,amount:amount,day:Math.max(1,Math.min(31,day)),cat:selectedFixedCat,active:true};
  if(!db){showToast('אין חיבור לשרת');return;}
  if(editingId){
    db.collection('bud_fixed').doc(editingId).update(data).then(function(){showToast('עודכן ✓');closeModal('modalFixed');});
  } else {
    db.collection('bud_fixed').add(data).then(function(){showToast('נשמר ✓');closeModal('modalFixed');});
  }
}

// ─── DELETE ───
function deleteEntry(type,id){
  if(!confirm('למחוק?'))return;
  var col=type==='inc'?'bud_income':'bud_expenses';
  db.collection(col).doc(id).delete().then(function(){showToast('נמחק');closeModal(type==='inc'?'modalIncome':'modalExpense');});
}
function deleteInst(id){
  if(!confirm('למחוק?'))return;
  db.collection('bud_installments').doc(id).delete().then(function(){showToast('נמחק');closeModal('modalInst');});
}
function deleteFixed(id){
  if(!confirm('למחוק?'))return;
  db.collection('bud_fixed').doc(id).delete().then(function(){showToast('נמחק');closeModal('modalFixed');});
}

// ─── UTILS ───
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// ─── INIT ───
(function init(){
  var uid=localStorage.getItem('bud_uid');
  var name=localStorage.getItem('bud_name');
  if(uid&&name){
    ME={uid:uid,name:name};
    setTimeout(function(){
      document.getElementById('splash').style.display='none';
      startApp();
    },800);
  } else {
    setTimeout(function(){
      document.getElementById('splash').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
    },1200);
  }
})();
</script>
