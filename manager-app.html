        var amtInp=document.createElement("input");amtInp.type="number";amtInp.value=selPlan.price;
        amtInp.style.cssText="width:100%;padding:12px;border-radius:12px;border:2px solid #2563EB;background:#EFF6FF;font-size:24px;font-weight:800;text-align:center;margin-bottom:14px;box-sizing:border-box;color:#2563EB;outline:none;";
        sh.appendChild(amtInp);

        function updateFinal(){
          var d=parseFloat(discInp.value)||0;
          var final2=selPlan.price;
          if(discType==="shekels")final2=Math.max(0,selPlan.price-d);
          else final2=Math.max(0,selPlan.price*(1-d/100));
          amtInp.value=Math.round(final2);
        }
        discInp.oninput=updateFinal;

        // Payment method - default CASH
        sh.appendChild(el("div","font-size:12px;color:#9CA3AF;font-weight:600;margin-bottom:8px;","\u05d0\u05de\u05e6\u05e2\u05d9 \u05ea\u05e9\u05dc\u05d5\u05dd"));
        var mg=div("display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;");
        [["\u05de\u05d6\u05d5\u05de\u05df","cash"],["\u05d1\u05d9\u05d8","bit"],["Paybox","paybox"],["\u05db\u05e8\u05d8\u05d9\u05e1","card"]].forEach(function(m){
          var isDefault=m[1]==="cash";
          var mb=btn(m[0],"padding:11px;border-radius:11px;border:2px solid "+(isDefault?"#2563EB":"#E5E7EB")+";background:"+(isDefault?"#EFF6FF":"#fff")+";cursor:pointer;font-size:13px;font-weight:700;color:"+(isDefault?"#2563EB":"#374151")+";",null);
          (function(mid,mbt){mb.onclick=function(){selMethod=mid;mg.querySelectorAll("button").forEach(function(b){b.style.borderColor="#E5E7EB";b.style.background="#fff";b.style.color="#374151";});mbt.style.borderColor="#2563EB";mbt.style.background="#EFF6FF";mbt.style.color="#2563EB";};})(m[1],mb);
          mg.appendChild(mb);
        });
        sh.appendChild(mg);

        ap(sh,shPbtn("\u05d0\u05e9\u05e8 \u05d5\u05e9\u05de\u05d5\u05e8",function(){
          var paid=parseFloat(amtInp.value)||0;
          var disc=parseFloat(discInp.value)||0;
          // FIX 4: sync with client card
          c.card+=selPlan.sessions;c.max+=selPlan.sessions;c.plan=selPlan.name;c.isNew=false;
          if(c.status!=="active")c.status="active";
          if(!cPurch[c.id])cPurch[c.id]=[];
          var discNote=disc>0?(" | \u05d4\u05e0\u05d7\u05d4: "+disc+(discType==="shekels"?"\u20AA":"%")):"";
          cPurch[c.id].unshift({id:"p"+Date.now(),date:new Date().toLocaleDateString("he-IL"),item:selPlan.name+" ("+selMethod+")"+discNote,amount:paid,rem:selPlan.sessions,cancelled:false,expiry:""});
          if(paid>0)INCOME.push({date:new Date(),amount:paid,method:selMethod,item:selPlan.name,client:c.name});
          saveClients();closeSheet();renderClient(c);showToast("\u05de\u05e0\u05d5\u05d9 \u05e0\u05d5\u05e1\u05e3 \u2713 | \u20AA"+paid);
        }),btn("\u05d7\u05d6\u05e8\u05d4","width:100%;padding:12px;border-radius:12px;border:none;background:#F4F6FB;color:#374151;font-size:14px;font-weight:600;cursor:pointer;",function(){step=1;showStep();}));
      }
    }
    showStep();
  });
}

function renderNotifs(){
  var ct=document.getElementById("ct");ct.innerHTML="";
  if(!renderNotifs._dismissed)renderNotifs._dismissed={};
  var items=[];
  CL.forEach(function(c){
    if(c.arch)return;
    if(c.isNew)items.push({icon:"\uD83D\uDC4B",msg:c.name+" - \u05dc\u05e7\u05d5\u05d7 \u05d7\u05d3\u05e9 \u05e0\u05e8\u05e9\u05dd",cid:c.id,type:"new"});
    else if(c.max>0&&c.card===0)items.push({icon:"\uD83D\uDD34",msg:c.name+" - \u05e0\u05d2\u05de\u05e8\u05d5 \u05d4\u05db\u05e0\u05d9\u05e1\u05d5\u05ea",cid:c.id,type:"d"});
    else if(c.max>0&&c.card>0&&c.card<=2)items.push({icon:"\uD83D\uDFE1",msg:c.name+" - \u05e0\u05d5\u05ea\u05e8\u05d5 "+c.card+" \u05db\u05e0\u05d9\u05e1\u05d5\u05ea",cid:c.id,type:"w"});
    if(c.debt>0)items.push({icon:"\uD83D\uDCB3",msg:c.name+" - \u05d7\u05d5\u05d1 \u20AA"+c.debt,cid:c.id,type:"debt"});
  });
  items=items.filter(function(it){return !renderNotifs._dismissed[it.cid+"_"+it.type];});
  var hdr=div("display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;");
  hdr.appendChild(el("div","font-size:11px;font-weight:700;color:#8A9ABE;text-transform:uppercase;letter-spacing:.5px;","\u05e2\u05d3\u05db\u05d5\u05e0\u05d9\u05dd ("+items.length+")"));
  if(items.length>0){var da=btn("\uD83D\uDDD1\uFE0F \u05de\u05d7\u05e7 \u05d4\u05db\u05dc","padding:5px 12px;border-radius:8px;border:none;background:#FEF2F2;color:#B91C1C;font-size:12px;font-weight:700;cursor:pointer;",function(){items.forEach(function(it){renderNotifs._dismissed[it.cid+"_"+it.type]=true;});renderNotifs();});hdr.appendChild(da);}
  ct.appendChild(hdr);
  if(!items.length){var emp=div("background:#fff;border-radius:14px;padding:30px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);");ap(emp,el("div","font-size:36px;margin-bottom:10px;","\u2705"),el("div","font-size:15px;font-weight:600;color:#1A1A2E;","\u05d0\u05d9\u05df \u05e2\u05d3\u05db\u05d5\u05e0\u05d9\u05dd"));ct.appendChild(emp);return;}
  var list=div("background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);");
  items.forEach(function(it){
    var wrap=div("position:relative;overflow:hidden;border-bottom:1px solid #F0F2F5;");
    var delbg=div("position:absolute;top:0;right:0;bottom:0;width:80px;background:#EF4444;display:flex;align-items:center;justify-content:center;cursor:pointer;");
    delbg.appendChild(el("div","color:#fff;font-size:13px;font-weight:700;","\u05de\u05d7\u05e7"));
    (function(item){delbg.onclick=function(){renderNotifs._dismissed[item.cid+"_"+item.type]=true;renderNotifs();};})(it);
    var row=div("display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;position:relative;cursor:pointer;");
    var ic=el("div","width:36px;height:36px;border-radius:50%;background:"+(it.type==="d"||it.type==="debt"?"#FEF2F2":"#FFF7ED")+";display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;",it.icon);
    var info=div("flex:1;");info.appendChild(el("div","font-size:14px;font-weight:600;color:#1A1A2E;",it.msg));
    var xb=btn("\u00D7","background:transparent;border:none;color:#C8D0DC;font-size:20px;cursor:pointer;padding:0 0 0 8px;flex-shrink:0;",null);
    (function(item){
      xb.onclick=function(e){e.stopPropagation();renderNotifs._dismissed[item.cid+"_"+item.type]=true;renderNotifs();};
      row.onclick=function(){openC(item.cid);};
      var sx=0;
      row.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});
      row.addEventListener("touchmove",function(e){var dx=e.touches[0].clientX-sx;if(dx<0)row.style.transform="translateX("+Math.max(dx,-80)+"px)";},{passive:true});
      row.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-sx;if(dx<-50){row.style.transform="translateX(-80px)";}else{row.style.transform="";}},{passive:true});
    })(it);
    ap(row,ic,info,xb);wrap.appendChild(delbg);wrap.appendChild(row);list.appendChild(wrap);
  });
  ct.appendChild(list);
}
renderNotifs._dismissed={};

// Early auth check - before Firestore loads
(function(){
  var _a=localStorage.getItem("na_mgr_auth");
  if(!_a||(Date.now()-parseInt(_a))>=(6*30*24*60*60*1000)){
    setTimeout(function(){
      var s=document.getElementById("splash");if(s)s.style.display="none";
      var ml=document.getElementById("mgr-login");if(ml)ml.style.display="flex";
    },1200);
    return; // skip Firestore load entirely until login
  }
})();

(function(){
  db.collection("clients").get().then(function(snap){
    snap.forEach(function(doc){var c=Object.assign({id:doc.id},doc.data());if(!CL.find(function(x){return x.id===c.id;}))CL.push(c);});
    try{var loc=JSON.parse(localStorage.getItem("na_clients")||"[]");loc.forEach(function(c){if(c.id&&!CL.find(function(x){return x.id===c.id;}))CL.push(c);});}catch(e){}
    finishInit();
  }).catch(function(err){
    console.error("Firestore load failed:",err);
    try{var s=localStorage.getItem("na_clients");if(s)CL=JSON.parse(s);}catch(e){}
    finishInit();
  });
  db.collection("clients").where("isNew","==",true).onSnapshot(function(snap){
    snap.docChanges().forEach(function(change){
      if(change.type==="added"){
        var c=Object.assign({id:change.doc.id},change.doc.data());
        if(!CL.find(function(x){return x.id===c.id;})){
          CL.unshift(c);
          setTimeout(function(){showToast("👤 לקוח חדש: "+c.name);var b=document.getElementById("bdot");if(b)b.style.display="block";if(tab==="notif")renderNotifs();else render();},500);
        }
      }
    });
  },function(e){console.error(e);});
  function finishInit(){
    var h=new Date().getHours();var gr=h>=5&&h<12?"בוקר טוב":h>=12&&h<17?"צהריים טובים":h>=17&&h<22?"ערב טוב":"לילה טוב";
    var gel=document.getElementById("hgreeting-mgr");if(gel)gel.textContent=gr+" 👋";
    document.getElementById("hbrand").textContent=T.brand;
    function updateClock(){var n=new Date();var tl=document.getElementById("time-lbl");if(tl)tl.textContent=(n.getHours()<10?"0":"")+n.getHours()+":"+(n.getMinutes()<10?"0":"")+n.getMinutes();var dl=document.getElementById("dt-lbl");if(dl){var days=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];dl.textContent=days[n.getDay()]+" "+n.getDate()+"/"+(n.getMonth()+1);}}
    updateClock();setInterval(updateClock,30000);
    setTimeout(function(){var sb=document.getElementById("sbar");if(sb)sb.style.width="100%";},50);
    setTimeout(function(){var s=document.getElementById("splash");if(s)s.style.display="none";},1800);
    // Manager auth check
    render();
  }
})();

  e.preventDefault();

  var bar=document.getElementById("install-bar");

});

  _installPrompt.userChoice.then(function(){_installPrompt=null;document.getElementById("install-bar").style.display="none";});
}
