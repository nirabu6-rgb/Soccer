function genTimeSlots(){
  var arr = [], h = 14, m = 0;
  while(h<23 || (h===23 && m===0)){
    arr.push((h<10?'0':'')+h+':'+(m===0?'00':m));
    m += 15;
    if(m===60){ m=0; h++; }
  }
  return arr;
}

/* ---------------- Alerts / reminders ---------------- */
var LOW_PUNCH_THRESHOLD = 2;
var MEDICAL_EXPIRY_WARN_DAYS = 14;
function daysBetween(dateStr){
  // returns (dateStr - today) in days, dateStr is 'YYYY-MM-DD'
  var d = new Date(dateStr+'T00:00:00');
  var today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((d.getTime()-today.getTime())/86400000);
}
function computeAlerts(){
  var alerts = [];
  AGE_GROUPS.forEach(function(cat){
    var t = CLUB_TEAMS[cat];
    if(!t || !t.players) return;
    t.players.forEach(function(pl){
      // 1. Low punch-card balance
      if(pl.sub_type==='punch' && typeof pl.remaining_punches==='number' && pl.remaining_punches<=LOW_PUNCH_THRESHOLD){
        alerts.push({type:'punch', severity:'warning', category:cat, playerName:pl.name,
          text:'לשחקן '+pl.name+' נותרו '+pl.remaining_punches+' ניקובים בכרטיסייה'});
      }
      // 2. Medical approval
      if(pl.medical_approval===false){
        alerts.push({type:'medical', severity:'danger', category:cat, playerName:pl.name,
          text:'לשחקן '+pl.name+' אין אישור רפואי בתוקף'});
      } else if(pl.medical_expiry){
        var diff = daysBetween(pl.medical_expiry);
        if(diff<0){
          alerts.push({type:'medical', severity:'danger', category:cat, playerName:pl.name,
            text:'אישור רפואי של '+pl.name+' פג תוקף'});
        } else if(diff<=MEDICAL_EXPIRY_WARN_DAYS){
          alerts.push({type:'medical', severity:'warning', category:cat, playerName:pl.name,
            text:'אישור רפואי של '+pl.name+' עומד לפוג ב-'+pl.medical_expiry});
        }
      }
      // 3. Injury status
      if(pl.injury_status==='injured' || pl.injury_status==='rehab'){
        alerts.push({type:'injury', severity:(pl.injury_status==='injured'?'danger':'warning'), category:cat, playerName:pl.name,
          text:(pl.injury_status==='injured'?'השחקן '+pl.name+' מוגדר כפצוע':'השחקן '+pl.name+' נמצא בתהליך שיקום')+
            (pl.injury_expected_return?(' · חזרה משוערת: '+pl.injury_expected_return):'')});
      }
    });
  });
  // 3. Consecutive absences: scan PITCHES (best-effort chronological order:
  // pitches in array order, days in DAYS order sun..sat, sessions in schedule order per day).
  // Note: there is no absolute date per session beyond day-of-week, so this is a
  // best-effort ordering proxy across all pitches/sessions rather than true calendar order.
  var streaks = {}; // name -> current consecutive absent streak
  var flagged = {}; // name -> already flagged (avoid duplicate alerts per player)
  PITCHES.forEach(function(p){
    DAYS.forEach(function(d){
      var sessions = (p.schedule && p.schedule[d.k]) || [];
      sessions.forEach(function(s){
        var attendance = s.attendance || {};
        for(var name in attendance){
          var val = attendance[name];
          if(val==='absent'){
            streaks[name] = (streaks[name]||0)+1;
            if(streaks[name]>=3 && !flagged[name]){
              flagged[name] = true;
              alerts.push({type:'absence', severity:'danger', category:findPlayerCategory(name), playerName:name,
                text:'לשחקן '+name+' 3 היעדרויות רצופות'});
            }
          } else {
            streaks[name] = 0;
          }
        }
      });
    });
  });
  return alerts;
}
function findPlayerCategory(name){
  for(var i=0;i<AGE_GROUPS.length;i++){
    var t = CLUB_TEAMS[AGE_GROUPS[i]];
    if(t && t.players && t.players.some(function(pl){ return pl.name===name; })) return AGE_GROUPS[i];
  }
  return '';
}
/* ---------------- Global search (hamburger drawer) ---------------- */
function globalSearch(query){
  var q = (query||'').trim().toLowerCase();
  var res = {players:[], coaches:[], teams:[]};
  if(!q) return res;
  AGE_GROUPS.forEach(function(cat){
    if(cat.toLowerCase().indexOf(q)!==-1){
      res.teams.push({name:cat, category:cat});
    }
    var t = CLUB_TEAMS[cat];
    if(!t) return;
    (t.players||[]).forEach(function(p){
      if(p.name && p.name.toLowerCase().indexOf(q)!==-1){
        res.players.push({name:p.name, category:cat});
      }
    });
    (t.staff||[]).forEach(function(s){
      if(s.name && s.name.toLowerCase().indexOf(q)!==-1){
        res.coaches.push({name:s.name, category:cat, role:s.role||''});
      }
    });
  });
  return res;
}
function globalSearchResultsHtml(res){
  var parts = [];
  if(res.players.length){
    parts.push('<div class="search-group-title">שחקנים</div>');

    });
  }
  if(res.coaches.length){
    parts.push('<div class="search-group-title">מאמנים</div>');
    res.coaches.forEach(function(c,i){
      parts.push('<button class="search-result-item" data-srtype="coach" data-sridx="'+i+'">🧑‍💼 '+c.name+'<span class="srm">'+c.category+'</span></button>');
    });
  }
  if(res.teams.length){
    parts.push('<div class="search-group-title">קבוצות</div>');
    res.teams.forEach(function(t,i){
      parts.push('<button class="search-result-item" data-srtype="team" data-sridx="'+i+'">👥 '+t.name+'</button>');
    });
  }
  if(!parts.length){
    parts.push('<div class="muted" style="padding:10px">לא נמצאו תוצאות</div>');
  }
  return parts.join('');
}

function alertsSectionHtml(alerts){

    (alerts.length>0 ? '<span class="badge">'+alerts.length+'</span>' : '')+'</div>';
  if(alerts.length===0){
    return head+'<div class="card muted" style="text-align:center">אין התראות כרגע</div>';
  }
  return head + alerts.map(function(a){
    return '<div class="card alert-card'+(a.severity==='danger'?' danger':'')+'">'+a.text+
      (a.category ? '<div class="muted" style="margin-top:4px;font-size:11px">'+a.category+'</div>' : '')+
    '</div>';
  }).join('');
}

];
function countPlayerAttendance(playerName){
  var present = 0, maxStreak = 0, curStreak = 0;
  PITCHES.forEach(function(p){
    DAYS.forEach(function(d){
      var sessions = (p.schedule && p.schedule[d.k]) || [];
      sessions.forEach(function(s){
        var att = s.attendance || {};
        var val = att[playerName];
        if(val===undefined) return;
        if(val==='present'){
          present++;
          curStreak++;
          if(curStreak>maxStreak) maxStreak = curStreak;
        } else {
          curStreak = 0;
        }
      });
    });
  });
  return {present:present, maxStreak:maxStreak};
}
function computePlayerBadges(player){
  var earned = {};
  var stats = countPlayerAttendance(player.name);
  if(stats.present>=10) earned.attend10 = true;
  if(stats.present>=25) earned.attend25 = true;
  if(stats.maxStreak>=5) earned.streak5 = true;
  if(player.skills){
    var allHigh = SKILL_ATTRS.every(function(sk){ return (player.skills[sk.k]||0)>=4; });
    if(allHigh) earned.fullskills = true;
  }
  if(player.badges && player.badges.indexOf('pom')!==-1) earned.pom = true;
  return earned;
}
function playerBadgeRowHtml(player){
  var earned = computePlayerBadges(player);
  return '<div class="pbadge-row">'+BADGES.map(function(b){
    var got = !!earned[b.id];
    return '<div class="pbadge-item '+(got?'':'locked')+'" title="'+b.t+' — '+b.d+'"><div class="ic">'+b.ic+'</div><div class="t">'+b.t+'</div></div>';

  var gridH = ((GRID_END_MIN-GRID_START_MIN)/15)*GRID_ROW_H;
  var hourLines = '';
  for(var hm=GRID_START_MIN; hm<=GRID_END_MIN; hm+=60){
    var top = ((hm-GRID_START_MIN)/15)*GRID_ROW_H;
    hourLines += '<div class="hour-line" style="top:'+top+'px">'+minToTime(hm)+'</div>';
  }
  var body = document.getElementById('pitchScreenBody');

    '<button class="btn ghost sm" id="btnAddSession" style="margin-bottom:10px">+ הוספת אימון</button>'+
    '<div class="week-grid-wrap">'+
      '<div class="week-dayhead"><div class="week-hourcol"></div>'+
        DAYS.map(function(d){ return '<div class="week-daycol-head">'+d.l+'</div>'; }).join('')+
      '</div>'+
      '<div class="week-grid">'+
        '<div class="week-hourcol" style="height:'+gridH+'px">'+hourLines+'</div>'+
        DAYS.map(function(d){
          var sessions = p.schedule[d.k] || [];
          var blocks = sessions.map(function(s,i){
            var top = ((timeToMin(s.start)-GRID_START_MIN)/15)*GRID_ROW_H;
            var h = ((timeToMin(s.end)-timeToMin(s.start))/15)*GRID_ROW_H;
            return '<div class="session-block" data-day="'+d.k+'" data-sessidx="'+i+'" style="top:'+top+'px;height:'+(h-2)+'px;background:'+(s.color||SESSION_COLORS[0])+'">'+
              '<b>'+s.category+'</b><br>'+s.start+'-'+s.end+
            '</div>';
          }).join('');
          return '<div class="week-daycol" data-day="'+d.k+'" style="height:'+gridH+'px">'+blocks+'</div>';
        }).join('')+

  document.getElementById('btnAddSession').onclick = function(){ openAddSessionModal(currentPitchDay||'sun', null); };
  document.querySelectorAll('.session-block').forEach(function(el){
    el.addEventListener('pointerdown', function(e){ e.stopPropagation(); });
    el.onclick = function(e){
      e.stopPropagation();
      openSessionDetailModal(el.dataset.day, parseInt(el.dataset.sessidx,10));
    };
  });
  document.querySelectorAll('.week-daycol').forEach(function(col){
    var pressTimer = null;
    col.addEventListener('pointerdown', function(e){
      if(e.target.closest && e.target.closest('.session-block')) return;
      var rect = col.getBoundingClientRect();
      var y = e.clientY - rect.top;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var startMin = GRID_START_MIN + Math.round(y/GRID_ROW_H)*15;
        if(startMin > GRID_END_MIN-15) startMin = GRID_END_MIN-15;
        openAddSessionModal(col.dataset.day, minToTime(startMin));
      }, 550);
    });
    ['pointerup','pointermove','pointercancel','pointerleave'].forEach(function(evt){
      col.addEventListener(evt, function(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });
    });
  });
}
function getTeamCoachName(cat){
  var t = CLUB_TEAMS[cat];
  return (t && t.staff && t.staff.length) ? t.staff[0].name : '';
}
function findScheduleConflict(day, start, end, category, targetPitchId, excludeSessionIdx){
  var newStart = timeToMin(start), newEnd = timeToMin(end);
  var newCoach = getTeamCoachName(category);
  for(var pi=0; pi<PITCHES.length; pi++){
    var pitch = PITCHES[pi];
    var sessions = (pitch.schedule && pitch.schedule[day]) || [];
    for(var si=0; si<sessions.length; si++){
      if(pitch.id===targetPitchId && si===excludeSessionIdx) continue;
      var s = sessions[si];
      var sStart = timeToMin(s.start), sEnd = timeToMin(s.end);
      var overlaps = (newStart < sEnd) && (newEnd > sStart);
      if(!overlaps) continue;
      if(pitch.id===targetPitchId){
        return {type:'pitch', pitch:pitch, session:s};
      }
      var sCoach = getTeamCoachName(s.category);
      if(newCoach && sCoach && newCoach===sCoach){
        return {type:'coach', pitch:pitch, session:s, coach:newCoach};
      }
    }
  }
  return null;
}
function openAddSessionModal(day, startTime){
  var start = startTime || TIME_SLOTS[0];

  var defEnd = TIME_SLOTS[Math.min(startIdx+4, TIME_SLOTS.length-1)];

    '</select></div>'+

      AGE_GROUPS.map(function(cat){ return '<option value="'+cat+'">'+cat+'</option>'; }).join('')+
    '</select></div>'+
    '<div class="field"><label>משעה</label><select id="sessionStartInput">'+
      TIME_SLOTS.map(function(t){ return '<option value="'+t+'"'+(t===start?' selected':'')+'>'+t+'</option>'; }).join('')+
    '</select></div>'+
    '<div class="field"><label>עד שעה</label><select id="sessionEndInput">'+
      TIME_SLOTS.map(function(t){ return '<option value="'+t+'"'+(t===defEnd?' selected':'')+'>'+t+'</option>'; }).join('')+
    '</select></div>'+

    var p = PITCHES[currentPitchIdx];

    var cat = document.getElementById('sessionCatInput').value;

    var en = document.getElementById('sessionEndInput').value;

    var conflict = findScheduleConflict(d, st, en, cat, p.id, -1);
    if(conflict){
      if(conflict.type==='pitch'){
        alert('מגרש זה תפוס כבר בשעה הזו (אימון '+conflict.session.category+', '+conflict.session.start+'-'+conflict.session.end+')');
      } else {
        alert('קיימת התנגשות: המאמן '+conflict.coach+' משובץ באותה שעה במגרש '+conflict.pitch.name);
      }
      return;
    }
    currentPitchDay = d;
    p.schedule[d].push({category:cat, start:st, end:en, color:SESSION_COLORS[0]});
    p.schedule[d].sort(function(a,b){ return a.start<b.start?-1:1; });

function chargePunch(pl){
  if(pl.sub_type==='punch' && typeof pl.remaining_punches==='number') pl.remaining_punches = Math.max(0, pl.remaining_punches-1);
}
function refundPunch(pl){
  if(pl.sub_type==='punch' && typeof pl.remaining_punches==='number') pl.remaining_punches = pl.remaining_punches+1;
}

      var gi = parseInt(btn.getAttribute('data-delguest'), 10);

function applyClubTheme(club){
  var color = club && club.color ? club.color : '';
  if(color){
    document.documentElement.style.setProperty('--accent', color);
  } else {
    document.documentElement.style.removeProperty('--accent');
  }
}
function setMyClubId(clubId){
  ME.clubId = clubId || '';
  if(ME.clubId) localStorage.setItem('fc_clubid', ME.clubId);
  else localStorage.removeItem('fc_clubid');
}
function loadMyClub(){
  if(!ME.uid){ return; }
  var lookupId = ME.role==='manager' ? ME.uid : (ME.clubId || '');
  if(!lookupId){
    Promise.resolve().then(function(){
      MY_CLUB = null;
      MY_CLUB_LOADED = true;
      applyClubTheme(null);
      if(TAB===3) renderTab(3);
    });
    return;
  }
  db.collection(P+'clubs').doc(lookupId).get().then(function(doc){
    MY_CLUB = doc.exists ? doc.data() : null;
    MY_CLUB_LOADED = true;
    applyClubTheme(MY_CLUB);
    if(MY_CLUB && MY_CLUB.coaches && MY_CLUB.coaches.length){
      loadClubCoachNames(MY_CLUB.coaches);
    } else if(TAB===3){
      renderTab(3);
    }
  });
}
function loadClubCoachNames(uids){
  CLUB_COACH_NAMES = {};
  var remaining = uids.length;
  if(remaining===0){ if(TAB===3) renderTab(3); return; }
  uids.forEach(function(uid){
    db.collection(P+'coaches').doc(uid).get().then(function(doc){
      CLUB_COACH_NAMES[uid] = doc.exists ? (doc.data().name || uid) : uid;
      remaining--;
      if(remaining<=0 && TAB===3) renderTab(3);
    });
  });
}
function createClub(name, color){
  if(ME.role!=='manager' || !name) return;
  var club = {adminUid:ME.uid, name:name, inviteCode:genCode(6), coaches:[], color: color || DEFAULT_ACCENT};
  db.collection(P+'clubs').doc(ME.uid).set(club).then(function(){
    MY_CLUB = club;
    MY_CLUB_LOADED = true;
    applyClubTheme(MY_CLUB);
    renderTab(3);
  });
}
function updateClubColor(newColor){
  if(ME.role!=='manager' || !MY_CLUB || !newColor) return;
  db.collection(P+'clubs').doc(ME.uid).set({color:newColor}, {merge:true}).then(function(){
    MY_CLUB.color = newColor;
    applyClubTheme(MY_CLUB);
    renderTab(3);
  });
}
function joinClubByCode(code){
  if(!code) return;
  db.collection(P+'clubs').where('inviteCode','==',code).get().then(function(snap){
    if(snap.empty){
      alert('קוד הזמנה לא נמצא');
      return;
    }
    var doc = snap.docs[0];
    var clubId = doc.id;
    setMyClubId(clubId);
    db.collection(P+'coaches').doc(ME.uid).set({clubId:ME.clubId}, {merge:true});
    var fv = (firebase.firestore && firebase.firestore.FieldValue) ? firebase.firestore.FieldValue : null;
    if(fv && fv.arrayUnion){
      doc.ref.update({coaches: fv.arrayUnion(ME.uid)});
    } else {
      var data = doc.data();
      var coaches = data.coaches || [];
      if(coaches.indexOf(ME.uid)===-1) coaches.push(ME.uid);
      doc.ref.set({coaches:coaches}, {merge:true});
    }
    MY_CLUB_LOADED = false;
    CLUB_TEAMS_LOADED = false;
    PITCHES_LOADED = false;
    loadMyClub();
    renderTab(3);
  });
}
function leaveClub(){
  if(!ME.clubId) return;
  var clubId = ME.clubId;
  setMyClubId('');
  db.collection(P+'coaches').doc(ME.uid).set({clubId:''}, {merge:true});
  db.collection(P+'clubs').doc(clubId).get().then(function(doc){
    if(!doc.exists) return;
    var fv = (firebase.firestore && firebase.firestore.FieldValue) ? firebase.firestore.FieldValue : null;
    if(fv && fv.arrayRemove){
      doc.ref.update({coaches: fv.arrayRemove(ME.uid)});
    } else {
      var data = doc.data();
      var coaches = (data.coaches || []).filter(function(u){ return u!==ME.uid; });
      doc.ref.set({coaches:coaches}, {merge:true});
    }
  });
  MY_CLUB = null;
  MY_CLUB_LOADED = true;
  CLUB_TEAMS_LOADED = false;
  PITCHES_LOADED = false;
  applyClubTheme(null);
  renderTab(3);
}
function removeCoachFromClub(uid){
  if(ME.role!=='manager' || !MY_CLUB) return;
  var ref = db.collection(P+'clubs').doc(ME.uid);
  var fv = (firebase.firestore && firebase.firestore.FieldValue) ? firebase.firestore.FieldValue : null;
  if(fv && fv.arrayRemove){
    ref.update({coaches: fv.arrayRemove(uid)});
  } else {
    var coaches = (MY_CLUB.coaches || []).filter(function(u){ return u!==uid; });
    ref.set({coaches:coaches}, {merge:true});
  }
  if(MY_CLUB.coaches){
    MY_CLUB.coaches = MY_CLUB.coaches.filter(function(u){ return u!==uid; });
  }
  delete CLUB_COACH_NAMES[uid];
  renderTab(3);
}

function wireTab(i){
  if(i===0){
    var nb = document.getElementById('btnNewPlan');
    if(nb) nb.onclick = function(){ openPlanBuilder(null); };
    var ndl = document.getElementById('btnOpenDrillLib');
    if(ndl) ndl.onclick = function(){ openDrillLib(); };

    var nwz = document.getElementById('btnAiWizard');

      btn.onclick = function(){ openPlanBuilder(parseInt(btn.dataset.viewplan,10)); };
    });

      btn.onclick = function(){
        var idx = parseInt(btn.dataset.delplan,10);
        var p = TRAINING_PLANS[idx];
        if(p && p.id) db.collection(P+'trainingplans').doc(p.id).delete();
        TRAINING_PLANS.splice(idx,1);
        renderTab(0);
      };
    });

    document.querySelectorAll('[data-openteam]').forEach(function(el){
      el.onclick = function(){ openTeamDetail(el.dataset.openteam); };
    });
  } else if(i===2){
    var nbp = document.getElementById('btnAddPitch');
    if(nbp) nbp.onclick = function(){ openAddPitchModal(); };
    document.querySelectorAll('[data-openpitch]').forEach(function(el){
      el.onclick = function(){ openPitchDetail(parseInt(el.dataset.openpitch,10)); };
    });
    document.querySelectorAll('[data-delpitch]').forEach(function(btn){
      btn.onclick = function(){
        var idx = parseInt(btn.dataset.delpitch,10);
        var p = PITCHES[idx];
        if(p && p.id) db.collection(P+'pitches').doc(p.id).delete();
        PITCHES.splice(idx,1);
        renderTab(2);
      };
    });
  } else if(i===3){
    var btnOpenReportArchive = document.getElementById('btnOpenReportArchive');
    if(btnOpenReportArchive) btnOpenReportArchive.onclick = function(){ openReportArchive(); };
    var btnCreateClub = document.getElementById('btnCreateClub');

      if(!name) return;
      var colorEl = document.getElementById('clubColorInput');
      var color = colorEl ? colorEl.value : DEFAULT_ACCENT;
      createClub(name, color);
    };
    var btnSaveClubColor = document.getElementById('btnSaveClubColor');
    if(btnSaveClubColor) btnSaveClubColor.onclick = function(){
      var colorEditEl = document.getElementById('clubColorEditInput');
      var newColor = colorEditEl ? colorEditEl.value : '';
      if(newColor) updateClubColor(newColor);
    };
    var btnJoinClub = document.getElementById('btnJoinClub');
    if(btnJoinClub) btnJoinClub.onclick = function(){
      var code = document.getElementById('joinClubInput').value.trim();
      if(!code) return;
      joinClubByCode(code);
    };
    var btnLeaveClub = document.getElementById('btnLeaveClub');
    if(btnLeaveClub) btnLeaveClub.onclick = function(){
      if(confirm('לעזוב את המועדון?')) leaveClub();
    };
    var btnCopyInvite = document.getElementById('btnCopyInvite');
    if(btnCopyInvite) btnCopyInvite.onclick = function(){
      var codeEl = document.getElementById('clubInviteCode');
      var code = codeEl ? codeEl.textContent : '';

/* ---------------- Pitch board (toolbox-based tactics editor) ---------------- */
var BASE_W = 600, BASE_H = 380;
var boardState = {elements:[], orientation:'h', view:'top', bgStyle:'classic'};
var boardHistory = [];
var addMode = null;
var pendingPlayerColor = '#1c2230';
var lineStart = null;
var selectedElId = null;
var editingPlan = null;
var editingDrills = [];
var editingDrillIndex = null;
var PLAYBACK_SPEED = 1;
var playState = {playing:false, timer:null, interval:null};

var PLAYER_COLORS = ['#1c2230','#e63946','#2a9d8f','#f4a300','#3b82f6','#ffffff'];
var TOOLBOX_ITEMS = [
  {type:'player', ic:'🧍', label:'שחקן'},
  {type:'gk', ic:'🧤', label:'שוער'},
  {type:'goal', ic:'🥅', label:'שער'},
  {type:'cone', ic:'🔺', label:'קונוס'},
  {type:'ball', ic:'⚽', label:'כדור'},
  {type:'arrow', ic:'➡️', label:'חץ'},
  {type:'line', ic:'➖', label:'קו'}
];
var POINT_TYPES = ['player','gk','goal','cone','ball'];
var LINE_TYPES = ['arrow','line'];

function pitchDims(orientation){
  return orientation==='v' ? {w:BASE_H, h:BASE_W} : {w:BASE_W, h:BASE_H};
}
function dispXY(x, y, orientation){
  return orientation==='v' ? {x:y, y:x} : {x:x, y:y};
}
function canonXY(x, y, orientation){
  return orientation==='v' ? {x:y, y:x} : {x:x, y:y};
}
function shapeMarkup(el, small){
  var sc = small ? 1 : (el.scale||1);
  if(el.type==='player' || el.type==='gk'){
    var color = el.type==='gk' ? '#f4c400' : el.color;
    if(small){
      return '<circle r="4" fill="'+color+'" stroke="#fff" stroke-width="0.5"/>';
    }
    var txtFill = color==='#ffffff' || color==='#f4c400' ? '#1c2230' : '#fff';
    var bw = 12*sc, bh = 14*sc, sw = 5.5*sc, sh = 6.5*sc;
    var sleeveL = '<rect x="'+(-bw/2-sw*0.7)+'" y="'+(-bh/2+1*sc)+'" width="'+(sw*0.8)+'" height="'+sh+'" rx="'+(1.2*sc)+'" fill="'+color+'" stroke="#fff" stroke-width="0.8"/>';
    var sleeveR = '<rect x="'+(bw/2-sw*0.1)+'" y="'+(-bh/2+1*sc)+'" width="'+(sw*0.8)+'" height="'+sh+'" rx="'+(1.2*sc)+'" fill="'+color+'" stroke="#fff" stroke-width="0.8"/>';
    var body = '<rect x="'+(-bw/2)+'" y="'+(-bh/2+1.5*sc)+'" width="'+bw+'" height="'+bh+'" rx="'+(2.5*sc)+'" fill="'+color+'" stroke="#fff" stroke-width="1"/>';
    var collar = '<path d="M'+(-2.4*sc)+','+(-bh/2+2*sc)+' L0,'+(-bh/2+4.6*sc)+' L'+(2.4*sc)+','+(-bh/2+2*sc)+'" fill="none" stroke="#fff" stroke-width="0.9"/>';
    var num = '<text x="0" y="'+(3.5*sc)+'" text-anchor="middle" font-size="'+(9*sc)+'" font-weight="bold" fill="'+txtFill+'">'+(el.num||'')+'</text>';
    var legs = '<path d="M'+(-3*sc)+','+(bh/2+1.5*sc)+' L'+(-3.5*sc)+','+(bh/2+5*sc)+' M'+(3*sc)+','+(bh/2+1.5*sc)+' L'+(3.5*sc)+','+(bh/2+5*sc)+'" fill="none" stroke="#3b2a1a" stroke-width="'+(2.2*sc)+'" stroke-linecap="round"/>';
    var head = '<circle cx="0" cy="'+(-bh/2-2.6*sc)+'" r="'+(2.6*sc)+'" fill="#e3ad7c" stroke="#3b2a1a" stroke-width="0.5"/>';
    return legs + sleeveL + sleeveR + body + collar + head + num;
  }
  if(el.type==='ball'){
    var r = (small?3:10)*sc;
    if(small){ return '<circle r="'+r+'" fill="#fff" stroke="#1c2230" stroke-width="0.5"/>'; }
    var pent = '';
    for(var i=0;i<5;i++){
      var ang = -Math.PI/2 + i*2*Math.PI/5;
      pent += (i===0?'M':'L')+(r*0.42*Math.cos(ang))+','+(r*0.42*Math.sin(ang))+' ';
    }
    pent += 'Z';
    var spokes = '';
    for(var k=0;k<5;k++){
      var a2 = -Math.PI/2 + k*2*Math.PI/5;
      spokes += '<line x1="'+(r*0.42*Math.cos(a2))+'" y1="'+(r*0.42*Math.sin(a2))+'" x2="'+(r*0.92*Math.cos(a2))+'" y2="'+(r*0.92*Math.sin(a2))+'" stroke="#1c2230" stroke-width="0.8"/>';
    }
    return '<circle r="'+r+'" fill="#fff" stroke="#1c2230" stroke-width="1"/>'+
      '<path d="'+pent+'" fill="#1c2230"/>'+spokes;
  }
  if(el.type==='goal'){
    var gw = (small?8:22)*sc, gh = (small?5:14)*sc;
    if(small){ return '<rect x="'+(-gw/2)+'" y="'+(-gh/2)+'" width="'+gw+'" height="'+gh+'" fill="none" stroke="#fff" stroke-width="1"/>'; }
    var net = '';
    var cols = 4, rows = 3;
    for(var c=1;c<cols;c++){
      var nx = -gw/2 + (gw/cols)*c;
      net += '<line x1="'+nx+'" y1="'+(-gh/2)+'" x2="'+nx+'" y2="'+(gh/2)+'" stroke="#fff" stroke-width="0.6" opacity="0.65"/>';
    }
    for(var rI=1;rI<rows;rI++){
      var ny = -gh/2 + (gh/rows)*rI;
      net += '<line x1="'+(-gw/2)+'" y1="'+ny+'" x2="'+(gw/2)+'" y2="'+ny+'" stroke="#fff" stroke-width="0.6" opacity="0.65"/>';
    }
    return '<rect x="'+(-gw/2)+'" y="'+(-gh/2)+'" width="'+gw+'" height="'+gh+'" fill="#1c2230" opacity="0.18" stroke="#fff" stroke-width="2.2"/>'+net;
  }
  if(el.type==='cone'){
    var s = (small?5:10)*sc;
    return '<path d="M0,-'+s+' L'+s+','+s+' L-'+s+','+s+' Z" fill="#f4731c" stroke="#fff" stroke-width="'+(small?0.5:1.5)+'"/>';
  }
  return '';
}
function selHighlight(el){
  var s = (el.type==='player'?15:12)*(el.scale||1);
  return '<rect x="-'+s+'" y="-'+s+'" width="'+(s*2)+'" height="'+(s*2)+'" fill="none" stroke="#fff200" stroke-width="2"/>';
}
var BG_STYLES = {
  classic: {a:'#3eac46', b:'#369b3d'},
  dark: {a:'#1f5c2a', b:'#1a4f24'},
  light: {a:'#6fc977', b:'#62b86a'},
  blue: {a:'#2e6fb0', b:'#27619c'}
};
function pitchSvgMarkup(elements, small, orientation, svgId, bgStyle){
  var dims = small ? {w:60,h:40} : pitchDims(orientation);
  var w = dims.w, h = dims.h;
  var sx = small ? 60/BASE_W : 1, sy = small ? 40/BASE_H : 1;
  var sw = small ? 1 : 2;
  var portrait = !small && orientation==='v';
  var boxDepth = portrait ? h*0.16 : w*0.16, boxH = portrait ? w*0.6 : h*0.6;
  var gaDepth = portrait ? h*0.06 : w*0.06, gaH = portrait ? w*0.3 : h*0.3;
  var bg = BG_STYLES[bgStyle] || BG_STYLES.classic;
  var stripes = '';
  var stripeCount = small ? 6 : 12;
  var stripeW = portrait ? h/stripeCount : w/stripeCount;
  for(var si=0; si<stripeCount; si++){
    stripes += portrait ?
      ('<rect x="0" y="'+(si*stripeW)+'" width="'+w+'" height="'+stripeW+'" fill="'+(si%2===0?bg.a:bg.b)+'"/>') :
      ('<rect x="'+(si*stripeW)+'" y="0" width="'+stripeW+'" height="'+h+'" fill="'+(si%2===0?bg.a:bg.b)+'"/>');
  }
  var lines = stripes+'<rect x="2" y="2" width="'+(w-4)+'" height="'+(h-4)+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
    (portrait ?
      ('<line x1="2" y1="'+(h/2)+'" x2="'+(w-2)+'" y2="'+(h/2)+'" stroke="#fff" stroke-width="'+sw+'"/>') :
      ('<line x1="'+(w/2)+'" y1="2" x2="'+(w/2)+'" y2="'+(h-2)+'" stroke="#fff" stroke-width="'+sw+'"/>')
    )+
    '<circle cx="'+(w/2)+'" cy="'+(h/2)+'" r="'+(small?6:40)+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
    (portrait ?
      ('<rect x="'+((w-boxH)/2)+'" y="2" width="'+boxH+'" height="'+boxDepth+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
       '<rect x="'+((w-boxH)/2)+'" y="'+(h-2-boxDepth)+'" width="'+boxH+'" height="'+boxDepth+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
       '<rect x="'+((w-gaH)/2)+'" y="2" width="'+gaH+'" height="'+gaDepth+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
       '<rect x="'+((w-gaH)/2)+'" y="'+(h-2-gaDepth)+'" width="'+gaH+'" height="'+gaDepth+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>') :
      ('<rect x="2" y="'+((h-boxH)/2)+'" width="'+boxDepth+'" height="'+boxH+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
       '<rect x="'+(w-2-boxDepth)+'" y="'+((h-boxH)/2)+'" width="'+boxDepth+'" height="'+boxH+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
       '<rect x="2" y="'+((h-gaH)/2)+'" width="'+gaDepth+'" height="'+gaH+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>'+
       '<rect x="'+(w-2-gaDepth)+'" y="'+((h-gaH)/2)+'" width="'+gaDepth+'" height="'+gaH+'" fill="none" stroke="#fff" stroke-width="'+sw+'"/>')
    );
  var linesHtml = elements.filter(function(el){ return LINE_TYPES.indexOf(el.type)>=0; }).map(function(el){
    var p1 = small ? {x:el.x1, y:el.y1} : dispXY(el.x1, el.y1, orientation);
    var p2 = small ? {x:el.x2, y:el.y2} : dispXY(el.x2, el.y2, orientation);
    var marker = el.type==='arrow' ? ' marker-end="url(#arrowhead)"' : '';
    var dash = el.type==='line' ? ' stroke-dasharray="5,4"' : '';
    return '<line x1="'+(p1.x*sx)+'" y1="'+(p1.y*sy)+'" x2="'+(p2.x*sx)+'" y2="'+(p2.y*sy)+'" stroke="#fff200" stroke-width="'+(small?1.5:3)+'"'+marker+dash+'/>';
  }).join('');
  var pointsHtml = elements.filter(function(el){ return POINT_TYPES.indexOf(el.type)>=0; }).map(function(el){
    var p = small ? {x:el.x, y:el.y} : dispXY(el.x, el.y, orientation);
    var dx = p.x*sx, dy = p.y*sy;
    var sel = (!small && el.id===selectedElId) ? selHighlight(el) : '';
    return '<g class="elem-token" data-id="'+el.id+'" data-type="'+el.type+'" transform="translate('+dx+','+dy+')" style="cursor:'+(small?'default':'grab')+'">'+sel+shapeMarkup(el, small)+'</g>';
  }).join('');
  return '<svg id="'+(svgId||'pitchSvg')+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#fff200"/></marker></defs>'+
    lines + linesHtml + pointsHtml +
  '</svg>';
}

function renderPlanBuilderModal(){
  var frameLabel = editingDrillIndex!==null ? ('פריים '+(editingDrillIndex+1)+' מתוך '+editingDrills.length) : ('פריים חדש #'+(editingDrills.length+1));

      }).join('')+'</div>'
    : '')+
  '<div class="muted" style="margin-bottom:10px;text-align:center">'+(addMode?'לחץ/י על המגרש כדי להוסיף':(selectedElId?'גרור/י להזיז, או הגדל/הקטן למטה':'גרור/י אלמנט קיים להזיז, או בחר/י כלי מעל'))+'</div>'+
  (selectedElId ? (
  '<div class="action-row">'+
    '<button id="btnGrowSelected">🔍+ הגדל</button>'+
    '<button id="btnShrinkSelected">🔍- הקטן</button>'+
    '<button id="btnDelSelected">🗑 מחק נבחר</button>'+
  '</div>') : '')+
  '<div class="action-row">'+
    '<button id="btnRotateBoard">🔄 סובב מגרש</button>'+

/* ---------------- AI-style plan wizard modal flow ---------------- */
function openWizardModal(){
  WIZ_STATE = {step:0, answers:{target:'',goal:WIZ_GOALS[0],freq:'3',injury:''}};
  if(!CLUB_TEAMS_LOADED) loadClubTeams();
  renderWizardModal();
}
function wizardAllPlayers(){
  var out = [];
  AGE_GROUPS.forEach(function(cat){
    var t = CLUB_TEAMS[cat];
    if(t && t.players) t.players.forEach(function(pl){ out.push({name:pl.name, category:cat, player:pl}); });
  });
  return out;
}
function wizardPrefillInjury(targetName){
  var found = wizardAllPlayers().filter(function(x){ return x.name===targetName; })[0];
  if(!found) return '';
  var pl = found.player;
  if(pl.injury_status==='injured' || pl.injury_status==='rehab'){
    return pl.injury_rehab_plan || (pl.injury_status==='injured' ? 'השחקן מוגדר כפצוע' : 'השחקן בתהליך שיקום');
  }
  return '';
}
function renderWizardModal(){
  var step = WIZ_STATE.step;

    '<div class="muted" style="margin-bottom:14px">שאלה '+(Math.min(step+1,totalSteps))+' מתוך '+totalSteps+'</div>';
  if(step >= totalSteps){
    var a = WIZ_STATE.answers;
    html += '<div class="card">'+
      '<div class="row"><span>מטרה</span><span class="muted">'+a.target+'</span></div>'+
      '<div class="row" style="margin-top:6px"><span>יעד</span><span class="muted">'+a.goal+'</span></div>'+
      '<div class="row" style="margin-top:6px"><span>תדירות</span><span class="muted">'+a.freq+' בשבוע</span></div>'+
      '<div class="row" style="margin-top:6px"><span>מגבלה רפואית</span><span class="muted">'+(a.injury||'אין')+'</span></div>'+

    openModal(html);
    document.getElementById('wizBack').onclick = function(){ WIZ_STATE.step--; renderWizardModal(); };
    document.getElementById('wizCreatePlan').onclick = function(){
      var plan = buildPlanFromWizard(WIZ_STATE.answers);
      closeModal();
      var idx = TRAINING_PLANS.length;
      TRAINING_PLANS.push(plan);
      openPlanBuilder(idx);
    };
    return;
  }
  var q = WIZ_QUESTIONS[step];
  var fieldHtml = '';
  if(q.key==='target'){
    var players = wizardAllPlayers();
    fieldHtml = '<div class="field"><label>'+q.label+'</label><select id="wizInput">'+
      '<option value="כל הקבוצה">כל הקבוצה</option>'+

    '</select></div>';
  } else if(q.key==='goal'){
    fieldHtml = '<div class="field"><label>'+q.label+'</label><select id="wizInput">'+
      WIZ_GOALS.map(function(g){ return '<option value="'+g+'">'+g+'</option>'; }).join('')+
    '</select></div>';
  } else if(q.key==='freq'){
    fieldHtml = '<div class="field"><label>'+q.label+'</label><select id="wizInput">'+
      [2,3,4,5,6].map(function(n){ return '<option value="'+n+'"'+(n===3?' selected':'')+'>'+n+' בשבוע</option>'; }).join('')+
    '</select></div>';
  } else if(q.key==='injury'){
    var prefill = WIZ_STATE.answers.injury || wizardPrefillInjury(WIZ_STATE.answers.target);
    fieldHtml = '<div class="field"><label>'+q.label+'</label><textarea id="wizInput" rows="2" placeholder="אין מגבלה">'+prefill+'</textarea></div>';
  }
  html += fieldHtml+
    '<button class="btn" id="wizNext" style="margin-top:8px">הבא ›</button>'+
    (step>0 ? '<button class="btn ghost" id="wizBack" style="margin-top:8px">‹ חזרה</button>' : '');
  openModal(html);
  document.getElementById('wizNext').onclick = function(){
    var el = document.getElementById('wizInput');

    WIZ_STATE.step++;
    renderWizardModal();
  };
  var backBtn = document.getElementById('wizBack');
  if(backBtn) backBtn.onclick = function(){ WIZ_STATE.step--; renderWizardModal(); };

function wizardPhaseTitles(goal){
  var titles = {
    'שיפור מהירות':['חימום דינמי','ספרינטים וכוח נפץ','משחק תרגיל קצר'],
    'טכניקה':['חימום עם כדור','תרגול שליטה ומסירות','משחק תרגיל יישומי'],
    'כוח':['חימום ומוביליות','תרגילי כוח פונקציונלי','שחרור ומתיחות'],
    'משחק קבוצתי':['חימום קבוצתי','תרגילי החזקה ומעברים','משחק קבוצתי מלא']
  };
  return titles[goal] || titles['טכניקה'];
}
function buildPlanFromWizard(a){
  var category = WIZ_GOAL_TO_CATEGORY[a.goal] || 'טכניקה';
  var phaseTitles = wizardPhaseTitles(a.goal);
  var matchingDrills = DRILL_LIB_LOADED ? DRILL_LIB.filter(function(d){ return d.category===category; }) : [];
  var phases = phaseTitles.map(function(title, i){
    var items = [];
    if(matchingDrills[i]){
      var d = matchingDrills[i];
      items.push({drillId:d.id, title:d.title, category:d.category, duration_min:d.duration_min||0, notes:''});
    } else {
      items.push({drillId:null, title:title, category:category, duration_min:15, notes:''});
    }
    return {name:title, items:items};
  });
  var nameTarget = a.target && a.target!=='כל הקבוצה' ? a.target : 'הקבוצה';
  var plan = {
    id: genCode(8),
    coachUid: ME.uid,
    name: 'תוכנית עוזר חכם — '+nameTarget+' · '+a.goal,
    drills: [],
    phases: phases,
    wizardMeta: {target:a.target, goal:a.goal, freq:a.freq, injury:a.injury}
  };
  db.collection(P+'trainingplans').doc(plan.id).set(plan);
  return plan;
}

/* ---------------- Season weeks (progressive lock) ---------------- */
function addPlanWeek(){
  if(!editingPlan.weeks) editingPlan.weeks = [];
  var status = editingPlan.weeks.length===0 ? 'open' : 'locked';
  editingPlan.weeks.push({label:'שבוע '+(editingPlan.weeks.length+1), status:status, notes:''});
  renderPlanBuilderModal();
}
function removePlanWeek(wIdx){
  if(!confirm('להסיר את השבוע?')) return;
  editingPlan.weeks.splice(wIdx,1);
  renderPlanBuilderModal();
}
function advancePlanWeek(wIdx){
  var weeks = editingPlan.weeks || [];
  if(!weeks[wIdx] || weeks[wIdx].status !== 'open') return;
  weeks[wIdx].status = 'done';
  for(var i=wIdx+1;i<weeks.length;i++){
    if(weeks[i].status === 'locked'){ weeks[i].status = 'open'; break; }
  }
  renderPlanBuilderModal();
}
function updatePlanWeekNotes(wIdx, notes){
  if(!editingPlan.weeks || !editingPlan.weeks[wIdx]) return;
  editingPlan.weeks[wIdx].notes = notes;
}

  };
  document.querySelectorAll('[data-loaddrill]').forEach(function(card){
    card.addEventListener('click', function(){
      loadDrillToBoard(parseInt(card.dataset.loaddrill,10));
    });
  });
  var playBtn = document.getElementById('btnPlayDrills');
  if(playBtn) playBtn.onclick = function(){ playDrills(); };
  var stopBtn = document.getElementById('btnStopDrills');
  if(stopBtn) stopBtn.onclick = function(){ stopPlayback(); };
  var speedInput = document.getElementById('playbackSpeed');
  if(speedInput) speedInput.onchange = function(){
    var v = parseFloat(speedInput.value);
    PLAYBACK_SPEED = (v && v>0) ? Math.max(0.25, Math.min(3, v)) : 1;
    speedInput.value = PLAYBACK_SPEED;
  };
  wirePitchSvg();
}
function getPlaybackSpeed(){
  return PLAYBACK_SPEED && PLAYBACK_SPEED>0 ? PLAYBACK_SPEED : 1;
}
function stopPlayback(){
  playState.playing = false;
  if(playState.timer){ clearTimeout(playState.timer); playState.timer = null; }
  if(playState.interval){ clearInterval(playState.interval); playState.interval = null; }
}
function animateFrameTransition(area, fromEls, toEls, onDone, speed){
  area.innerHTML = pitchSvgMarkup(toEls, false, 'h', 'playSvg', boardState.bgStyle);
  var fromById = {};
  fromEls.forEach(function(e){ if(POINT_TYPES.indexOf(e.type)>=0) fromById[e.id] = e; });
  var moves = [];
  toEls.forEach(function(e){
    if(POINT_TYPES.indexOf(e.type)<0) return;
    var prev = fromById[e.id];
    if(!prev) return;
    if(prev.x===e.x && prev.y===e.y) return;
    var token = area.querySelector('[data-id="'+e.id+'"]');
    if(!token) return;
    var p1 = dispXY(prev.x, prev.y, 'h');
    var p2 = dispXY(e.x, e.y, 'h');
    moves.push({token:token, x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y});
  });
  if(moves.length===0){ playState.timer = setTimeout(onDone, 700/speed); return; }
  var svgEl = area.querySelector('svg');
  if(svgEl){
    moves.forEach(function(m){
      var trail = document.createElementNS('http://www.w3.org/2000/svg','line');
      trail.setAttribute('x1', m.x1); trail.setAttribute('y1', m.y1);
      trail.setAttribute('x2', m.x2); trail.setAttribute('y2', m.y2);
      trail.setAttribute('stroke', '#fff200'); trail.setAttribute('stroke-width', '2');
      trail.setAttribute('stroke-dasharray', '4,4');
      trail.setAttribute('marker-end', 'url(#arrowhead)');
      trail.setAttribute('opacity', '0.85');
      svgEl.insertBefore(trail, m.token.parentNode===svgEl ? m.token : null);
    });
  }
  var steps = 24, dur = 900/speed, step = 0;
  moves.forEach(function(m){ m.token.setAttribute('transform','translate('+m.x1+','+m.y1+')'); });
  var iv = setInterval(function(){
    if(!playState.playing){ clearInterval(iv); return; }
    step++;
    var t = step/steps;
    if(t>1) t = 1;
    var ease = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
    moves.forEach(function(m){
      var x = m.x1 + (m.x2-m.x1)*ease;
      var y = m.y1 + (m.y2-m.y1)*ease;
      m.token.setAttribute('transform','translate('+x+','+y+')');
    });
    if(step>=steps){
      clearInterval(iv);
      playState.interval = null;
      playState.timer = setTimeout(onDone, 400/speed);
    }
  }, dur/steps);
  playState.interval = iv;
}
function playDrills(){
  stopPlayback();
  var area = document.getElementById('drillPlayArea');
  if(!area || editingDrills.length===0) return;
  playState.playing = true;
  area.innerHTML = pitchSvgMarkup(editingDrills[0].elements, false, 'h', 'playSvg', boardState.bgStyle);
  var i = 0;
  function nextFrame(){
    if(!playState.playing) return;
    if(i>=editingDrills.length-1){ playState.playing = false; return; }
    var from = editingDrills[i].elements, to = editingDrills[i+1].elements;
    i++;
    animateFrameTransition(area, from, to, nextFrame, getPlaybackSpeed());
  }
  playState.timer = setTimeout(nextFrame, 700/getPlaybackSpeed());
}
function svgPoint(svg, evt){
  var rect = svg.getBoundingClientRect();
  var vb = svg.viewBox.baseVal;
  var touch = (evt.changedTouches && evt.changedTouches[0]) || (evt.touches && evt.touches[0]);
  var clientX = touch ? touch.clientX : evt.clientX;
  var clientY = touch ? touch.clientY : evt.clientY;
  var x = (clientX - rect.left) / rect.width * vb.width;
  var y = (clientY - rect.top) / rect.height * vb.height;
  return {x:x, y:y};
}
var pitchDragging = null;
var pitchTapHandled = false;
function handlePitchTap(svg, evt){
  if(pitchDragging) return;
  if(evt.target && evt.target.closest && evt.target.closest('.elem-token')) return;
  if(!addMode) return;
  var pt = svgPoint(svg, evt);
  var canon = canonXY(pt.x, pt.y, boardState.orientation);
  if(POINT_TYPES.indexOf(addMode)>=0){
    pushHistory();
    var el = {id:genCode(6), type:addMode, x:canon.x, y:canon.y, scale:1};
    if(addMode==='player'){ el.color = pendingPlayerColor; el.num = nextPlayerNum(); }
    if(addMode==='gk'){ el.num = 'GK'; }
    boardState.elements.push(el);
    renderPlanBuilderModal();
  } else {
    if(!lineStart){
      lineStart = canon;
    } else {
      pushHistory();
      boardState.elements.push({id:genCode(6), type:addMode, x1:lineStart.x, y1:lineStart.y, x2:canon.x, y2:canon.y});
      lineStart = null;
      renderPlanBuilderModal();
    }
  }
}
function touchDist(touches){
  var dx = touches[0].clientX - touches[1].clientX;
  var dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function wirePitchSvg(){
  var svg = document.getElementById('pitchSvg');
  if(!svg) return;
  document.querySelectorAll('.elem-token').forEach(function(token){
    token.addEventListener('mousedown', function(e){ startDrag(token); e.stopPropagation(); });
    token.addEventListener('touchstart', function(e){
      var id = token.dataset.id;
      if(e.touches.length>=2){
        e.preventDefault();
        var el = boardState.elements.filter(function(x){return x.id===id;})[0];
        if(el && POINT_TYPES.indexOf(el.type)>=0){
          selectedElId = id;
          pitchDragging = null;
          pinchState = {id:id, initialDist:touchDist(e.touches), initialScale: el.scale||1};
        }
      } else {
        startDrag(token);
      }
      e.stopPropagation();
    }, {passive:false});
  });
  svg.addEventListener('click', function(e){
    if(pitchTapHandled){ pitchTapHandled = false; return; }
    handlePitchTap(svg, e);
  });
  svg.addEventListener('touchend', function(e){
    pitchTapHandled = true;
    e.preventDefault();
    handlePitchTap(svg, e);
  });
}
function startDrag(token){
  if(addMode) return;
  var id = token.dataset.id;
  selectedElId = id;
  pitchDragging = boardState.elements.filter(function(e){return e.id===id;})[0];
  if(pitchDragging) pushHistory();
}
function resizeSelected(delta){
  if(!selectedElId) return;
  var el = boardState.elements.filter(function(e){return e.id===selectedElId;})[0];
  if(!el || POINT_TYPES.indexOf(el.type)<0) return;
  pushHistory();
  el.scale = Math.max(0.5, Math.min(2.5, (el.scale||1)+delta));
  renderPlanBuilderModal();
}
var pinchState = null;
document.addEventListener('mousemove', onPitchDragMove);
document.addEventListener('touchmove', onPitchDragMove, {passive:false});
document.addEventListener('touchmove', onPitchPinchMove, {passive:false});
document.addEventListener('mouseup', onPitchDragEnd);
document.addEventListener('touchend', onPitchDragEnd);
document.addEventListener('touchend', onPitchPinchEnd);
function onPitchDragMove(e){
  if(!pitchDragging) return;
  var svg = document.getElementById('pitchSvg');
  if(!svg) return;
  e.preventDefault();
  var pt = svgPoint(svg, e);
  var dims = pitchDims(boardState.orientation);
  var dx = Math.max(10,Math.min(dims.w-10,pt.x));
  var dy = Math.max(10,Math.min(dims.h-10,pt.y));
  var canon = canonXY(dx, dy, boardState.orientation);
  pitchDragging.x = canon.x;
  pitchDragging.y = canon.y;
  var g = svg.querySelector('.elem-token[data-id="'+pitchDragging.id+'"]');
  if(g){ g.setAttribute('transform', 'translate('+dx+','+dy+')'); }
}
function onPitchDragEnd(){
  if(pitchDragging){ pitchDragging = null; renderPlanBuilderModal(); }
}
function onPitchPinchMove(e){
  if(!pinchState || e.touches.length<2) return;
  e.preventDefault();
  var el = boardState.elements.filter(function(x){return x.id===pinchState.id;})[0];
  if(!el) return;
  var d = touchDist(e.touches);
  el.scale = Math.max(0.5, Math.min(2.5, pinchState.initialScale * (d / pinchState.initialDist)));
  var svg = document.getElementById('pitchSvg');
  var g = svg && svg.querySelector('.elem-token[data-id="'+el.id+'"]');
  if(g){
    var sel = el.id===selectedElId ? selHighlight(el) : '';
    g.innerHTML = sel + shapeMarkup(el, false);
  }
}
function onPitchPinchEnd(e){
  if(pinchState && e.touches.length<2){
    pinchState = null;
    renderPlanBuilderModal();
  }
}
function genCode(len){
  var chars = 'abcdefghijklmnopqrstuvwxyz0123456789', s = '';
  for(var i=0;i<len;i++) s += chars.charAt(Math.floor(Math.random()*chars.length));
  return s;
}

function cleanPhoneForWa(phone){
  if(!phone) return '';
  var digits = (''+phone).replace(/\D/g,'');
  if(!digits) return '';
  if(digits.charAt(0)==='0') digits = '972'+digits.substring(1);
  else if(digits.indexOf('972')!==0 && digits.length<=10) digits = '972'+digits;
  return digits;
}
function planTextSummary(plan){
  var lines = [];
  lines.push('תוכנית אימון — '+(plan.name||'ללא שם'));
  var phases = plan.phases || [];
  if(phases.length){
    lines.push('');
    lines.push('שלבי האימון:');
    phases.forEach(function(ph){
      lines.push('• '+ph.name);
      (ph.items||[]).forEach(function(it){
        lines.push('   - '+it.title+(it.duration_min?' ('+it.duration_min+' דק׳)':'')+(it.notes?' — '+it.notes:''));
      });
    });
  }
  var weeks = plan.weeks || [];
  if(weeks.length){
    lines.push('');
    lines.push('שלבי עונה:');
    weeks.forEach(function(w){
      var statusT = w.status==='done' ? 'הושלם' : (w.status==='open' ? 'פתוח' : 'נעול');
      lines.push('• '+w.label+' ('+statusT+')'+(w.notes?' — '+w.notes:''));
    });
  }
  return lines.join('\n');
}
function playerReportSummaryText(player, category){
  var p = player;

  if(p.sub_type==='punch'){
    lines.push('כרטיסיית ניקובים: נותרו '+(typeof p.remaining_punches==='number'?p.remaining_punches:'-')+' מתוך '+(typeof p.total_punches==='number'?p.total_punches:'-'));
  } else if(p.sub_type==='monthly'){
    lines.push('מנוי חודשי: '+(p.sub_status==='active'?'פעיל':(p.sub_status==='frozen'?'מוקפא':'פג תוקף')));
  }
  lines.push('אישור רפואי: '+(p.medical_approval?('בתוקף'+(p.medical_expiry?' עד '+p.medical_expiry:'')):'אין אישור רפואי בתוקף'));
  var injStatus = p.injury_status || 'healthy';

    lines.push('סטטוס פציעה: '+INJURY_STATUS_INFO[injStatus].t+(p.injury_expected_return?' · חזרה משוערת '+p.injury_expected_return:''));

function attendancePctForPlayer(player, category){
  var stats = countPlayerAttendance(player.name);
  // total scheduled session-slots this player is assigned to attend, across the team's recurring weekly schedule
  var total = 0;
  PITCHES.forEach(function(pt){
    DAYS.forEach(function(d){
      var sessions = (pt.schedule && pt.schedule[d.k]) || [];
      sessions.forEach(function(s){
        var att = s.attendance || {};
        if(att[player.name]!==undefined) total++;
      });
    });
  });
  var pct = total>0 ? Math.round((stats.present/total)*100) : 0;
  return {pct:pct, present:stats.present, total:total, maxStreak:stats.maxStreak};
}

      ? '<div class="card" style="text-align:center;color:var(--sub)">עדיין לא נשמרו דוחות</div>'
      : COACH_REPORTS.slice().reverse().map(function(r){
          return '<div class="card">'+
            '<div class="row"><b>'+r.playerName+'</b><button class="logout-btn" data-delreport="'+r.id+'" title="מחק">🗑</button></div>'+
            '<div class="muted" style="margin-top:4px">'+r.month_label+' · נוכחות '+r.attendance_pct+'% · '+(r.created_at_label||'')+'</div>'+
            '<button class="btn ghost sm" data-viewreport="'+r.id+'" style="margin-top:8px">פתח דוח</button>'+
          '</div>';
        }).join('')
    );
  document.querySelectorAll('[data-viewreport]').forEach(function(btn){
    btn.onclick = function(){
      var rec = COACH_REPORTS.filter(function(r){ return r.id===btn.dataset.viewreport; })[0];
      if(rec){ currentReportRecord = rec; renderPlayerReportScreen(); document.getElementById('playerReportScreen').style.display = 'flex'; }
    };
  });
  document.querySelectorAll('[data-delreport]').forEach(function(btn){
    btn.onclick = function(){ deleteCoachReport(btn.dataset.delreport); };
  });
}
document.getElementById('btnClosePlayerReport').onclick = function(){ closePlayerReportScreen(); };
document.getElementById('btnCloseReportArchive').onclick = function(){ closeReportArchive(); };

/* ---------------- Modal helpers ---------------- */
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').onclick = function(e){
  if(e.target === document.getElementById('modalBg')) closeModal();
};
function goHome(){
  document.querySelectorAll('.nav-btn').forEach(function(b,i){ b.classList.toggle('sel', i===0); });
  renderTab(0);
}
document.getElementById('btnCloseTeamScreen').onclick = function(){ closeTeamDetail(); goHome(); };
document.getElementById('btnClosePitchScreen').onclick = function(){ closePitchDetail(); goHome(); };
document.getElementById('btnCloseDrillLib').onclick = function(){ closeDrillLib(); };
document.getElementById('btnCloseCoachTrainingLib').onclick = function(){ closeCoachTrainingLib(); };
</script>
